name: 馃敶 Generate Liverpool Lookout Content

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 8 * * *"
    - cron: "0 10 * * *"
    - cron: "0 12 * * *"
    - cron: "0 14 * * *"
    - cron: "0 16 * * *"
    - cron: "0 18 * * *"
    - cron: "0 20 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  generate:
    name: Generate Articles
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 脙聝脗垄脙聜脗卢脙聜脗聡脙聝脗炉脙聜脗赂脙聜脗聫 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 脙聝脗掳脙聜脗聼脙聜脗聬脙聜脗聧 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 脙聝脗掳脙聜脗聼脙聜脗聯脙聜脗娄 Install dependencies
        run: pip install anthropic requests

            - name: 脙垄脗聹脗聟 Check Python syntax
        run: python -m py_compile scripts/generate_articles.py

- name: 脙聝脗掳脙聜脗聼脙聜脗聯脙聜脗聺 Generate articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_articles.py

      - name: 脙聝脗掳脙聜脗聼脙聜脗職脙聜脗聙 Commit & push new articles
        run: |
          git config --local user.email "bot@liverpool-lookout.com"
          git config --local user.name "Liverpool Lookout Bot 脙聝脗掳脙聜脗聼脙聜脗陇脙聜脗聳"
          git add site/content/posts/
          if git diff --staged --quiet; then
            echo "No new articles to commit."
          else
            ARTICLE_COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "脙聝脗掳脙聜脗聼脙聜脗陇脙聜脗聳 Auto-publish ${ARTICLE_COUNT} articles 脙聝脗垄脙聜脗聙脙聜脗聰 $(date -u +'%d %b %Y %H:%M UTC')"
            git push
            echo "脙聝脗垄脙聜脗聹脙聜脗聟 Pushed ${ARTICLE_COUNT} new articles."
          fi
