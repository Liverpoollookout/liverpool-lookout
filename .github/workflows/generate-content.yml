name: Generate Liverpool Lookout Content

on:
  schedule:
    # Once daily at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  generate:
    name: Generate Articles
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Check Python syntax
        run: python -m py_compile scripts/generate_articles.py

      - name: Generate articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_articles.py

      - name: Strip images and SVGs from all existing posts
        run: |
          python - <<'EOF'
          import re, os, glob
          posts_dir = "site/content/posts"
          # Remove <div class="article-illustration">...</div> blocks (multiline)
          illus_pattern = re.compile(
              r'<div\s+class=["']article-illustration["'][^>]*>.*?</div>\s*',
              re.DOTALL | re.IGNORECASE
          )
          # Remove standalone <svg ...>...</svg> blocks
          svg_pattern = re.compile(
              r'<svg[\s\S]*?</svg>\s*',
              re.DOTALL | re.IGNORECASE
          )
          # Remove <img ...> tags
          img_pattern = re.compile(
              r'<img\s[^>]*/?>',
              re.IGNORECASE
          )
          cleaned = 0
          for path in glob.glob(os.path.join(posts_dir, "*.md")):
              with open(path, "r", encoding="utf-8") as f:
                  content = f.read()
              new = illus_pattern.sub("", content)
              new = svg_pattern.sub("", new)
              new = img_pattern.sub("", new)
              # Collapse more than 2 consecutive blank lines
              new = re.sub(r'\n{3,}', "\n\n", new)
              if new != content:
                  with open(path, "w", encoding="utf-8") as f:
                      f.write(new)
                  cleaned += 1
          print(f"Cleaned images/SVGs from {cleaned} posts")
          EOF

      - name: Commit and push
        run: |
          git config --local user.email "bot@liverpool-lookout.com"
          git config --local user.name "Liverpool Lookout Bot"
          git add site/content/posts/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "Auto-publish ${COUNT} articles - $(date -u +'%d %b %Y %H:%M UTC')"
            git push
            echo "Pushed ${COUNT} changes."
          fi
