name: Generate Liverpool Lookout Content

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 8 * * *"
    - cron: "0 10 * * *"
    - cron: "0 12 * * *"
    - cron: "0 14 * * *"
    - cron: "0 16 * * *"
    - cron: "0 18 * * *"
    - cron: "0 20 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  generate:
    name: Generate Articles
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Check Python syntax
        run: python -m py_compile scripts/generate_articles.py

      - name: Generate articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_articles.py

      - name: Fix existing SVG files (sanitize XML entities)
        run: |
          python - <<'EOF'
          import re, os, glob
          img_dir = "site/static/images/articles"
          pattern = re.compile(r'&(?!amp;|lt;|gt;|quot;|apos;|#\\d+;|#x[0-9a-fA-F]+;)')
          fixed = 0
          for path in glob.glob(os.path.join(img_dir, "*.svg")):
              with open(path, "r", encoding="utf-8") as f:
                  content = f.read()
              new_content = pattern.sub("&amp;", content)
              if new_content != content:
                  with open(path, "w", encoding="utf-8") as f:
                      f.write(new_content)
                  fixed += 1
                  print(f"Fixed: {os.path.basename(path)}")
          print(f"Total fixed: {fixed}")
          EOF

      - name: Commit and push new articles
        run: |
          git config --local user.email "bot@liverpool-lookout.com"
          git config --local user.name "Liverpool Lookout Bot"
                      git add site/content/posts/ site/static/images/
          if git diff --staged --quiet; then
            echo "No new articles to commit."
          else
            ARTICLE_COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "Auto-publish ${ARTICLE_COUNT} articles - $(date -u +'%d %b %Y %H:%M UTC')"
            git push
            echo "Pushed ${ARTICLE_COUNT} new articles."
          fi
