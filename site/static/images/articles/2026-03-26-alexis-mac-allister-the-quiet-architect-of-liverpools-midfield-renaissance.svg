<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative background elements -->
  <circle cx="100" cy="80" r="60" fill="#C8102E" opacity="0.1"/>
  <circle cx="700" cy="350" r="80" fill="#F6EB61" opacity="0.08"/>
  
  <!-- Sketch style frame -->
  <rect x="80" y="40" width="640" height="340" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.4" stroke-dasharray="8,4"/>
  
  <!-- Player figure - sketched style -->
  <!-- Head -->
  <circle cx="400" cy="110" r="35" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="395" y1="100" x2="390" y2="115" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <line x1="405" y1="100" x2="410" y2="115" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <circle cx="395" cy="105" r="2.5" fill="#FFFFFF"/>
  <circle cx="405" cy="105" r="2.5" fill="#FFFFFF"/>
  
  <!-- Hair sketch -->
  <path d="M 375 95 Q 370 80 385 75 Q 400 70 415 75 Q 430 80 425 95" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Body - Liverpool red kit -->
  <ellipse cx="400" cy="180" rx="45" ry="55" fill="#C8102E" opacity="0.8" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- Kit details -->
  <line x1="400" y1="140" x2="400" y2="220" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <path d="M 375 160 Q 370 170 368 185" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <path d="M 425 160 Q 430 170 432 185" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Left arm -->
  <line x1="360" y1="165" x2="310" y2="210" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="310" cy="210" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Right arm -->
  <line x1="440" y1="165" x2="490" y2="210" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="490" cy="210" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Left leg -->
  <line x1="380" y1="230" x2="360" y2="330" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="350" y="330" width="20" height="40" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Right leg -->
  <line x1="420" y1="230" x2="440" y2="330" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="430" y="330" width="20" height="40" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Football at feet -->
  <circle cx="450" cy="370" r="15" fill="none" stroke="#F6EB61" stroke-width="2.5"/>
  <line x1="450" y1="355" x2="450" y2="385" stroke="#F6EB61" stroke-width="1.5" opacity="0.6"/>
  <line x1="435" y1="370" x2="465" y2="370" stroke="#F6EB61" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Accent lines - sketchy style -->
  <path d="M 320 130 Q 330 125 340 128" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M 480 135 Q 470 128 460 132" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  
  <!-- Player name text -->
  <text x="400" y="395" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#F6EB61" text-anchor="middle" letter-spacing="2">
    MAC ALLISTER
  </text>
  
  <!-- Decorative underline -->
  <line x1="250" y1="408" x2="550" y2="408" stroke="#C8102E" stroke-width="2.5" opacity="0.8"/>
  <line x1="260" y1="413" x2="540" y2="413" stroke="#F6EB61" stroke-width="1" opacity="0.6"/>
  
  <!-- Corner accent marks -->
  <g opacity="0.5">
    <line x1="90" y1="50" x2="120" y2="50" stroke="#F6EB61" stroke-width="2"/>
    <line x1="90" y1="50" x2="90" y2="80" stroke="#F6EB61" stroke-width="2"/>
    
    <line x1="710" y1="50" x2="680" y2="50" stroke="#F6EB61" stroke-width="2"/>
    <line x1="710" y1="50" x2="710" y2="80" stroke="#F6EB61" stroke-width="2"/>
  </g>
</svg>