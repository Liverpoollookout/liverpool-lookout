<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch lines -->
  <line x1="400" y1="50" x2="400" y2="370" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
  <circle cx="400" cy="210" r="60" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.4"/>
  <circle cx="400" cy="210" r="4" fill="#F6EB61" opacity="0.6"/>
  
  <!-- Anfield Shankly Gates sketch -->
  <g opacity="0.15">
    <rect x="300" y="80" width="200" height="80" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="330" y1="80" x2="330" y2="160" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="360" y1="80" x2="360" y2="160" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="390" y1="80" x2="390" y2="160" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="420" y1="80" x2="420" y2="160" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="450" y1="80" x2="450" y2="160" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="480" y1="80" x2="480" y2="160" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>
  
  <!-- Liverpool Player - Kenny Dalglish style figure -->
  <g>
    <!-- Head -->
    <circle cx="200" cy="120" r="25" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <circle cx="190" cy="115" r="3" fill="#FFFFFF"/>
    <circle cx="210" cy="115" r="3" fill="#FFFFFF"/>
    <path d="M 200 125 Q 195 130 200 135" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    
    <!-- Body - Liverpool Red Kit -->
    <ellipse cx="200" cy="165" rx="20" ry="35" fill="none" stroke="#C8102E" stroke-width="3"/>
    
    <!-- Liverpool shirt details -->
    <line x1="200" y1="145" x2="200" y2="185" stroke="#C8102E" stroke-width="2"/>
    <circle cx="200" cy="155" r="4" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    
    <!-- Arms -->
    <line x1="180" y1="160" x2="140" y2="140" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <line x1="220" y1="160" x2="260" y2="145" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Legs -->
    <line x1="190" y1="200" x2="185" y2="260" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <line x1="210" y1="200" x2="215" y2="260" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Football at feet -->
    <circle cx="220" cy="275" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 220 263 L 220 287 M 208 275 L 232 275" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>
  
  <!-- Opposing player silhouette -->
  <g opacity="0.4">
    <circle cx="580" cy="120" r="22" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <ellipse cx="580" cy="160" rx="18" ry="32" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <line x1="562" y1="158" x2="520" y2="140" stroke="#FFFFFF" stroke-width="2.5"/>
    <line x1="598" y1="158" x2="640" y2="150" stroke="#FFFFFF" stroke-width="2.5"/>
    <line x1="575" y1="192" x2="570" y2="255" stroke="#FFFFFF" stroke-width="2.5"/>
    <line x1="585" y1="192" x2="590" y2="255" stroke="#FFFFFF" stroke-width="2.5"/>
  </g>
  
  <!-- Action lines/motion -->
  <g stroke="#F6EB61" stroke-width="2" opacity="0.7">
    <path d="M 260 160 Q 300 140 340 155" fill="none" stroke-dasharray="5,5"/>
    <polygon points="340,155 335,150 338,160" fill="#F6EB61"/>
  </g>
  
  <!-- Anfield crowd effect -->
  <g opacity="0.08">
    <circle cx="100" cy="350" r="8" fill="#C8102E"/>
    <circle cx="130" cy="360" r="6" fill="#C8102E"/>
    <circle cx="160" cy="355" r="7" fill="#C8102E"/>
    <circle cx="650" cy="340" r="9" fill="#C8102E"/>
    <circle cx="700" cy="355" r="7" fill="#C8102E"/>
    <circle cx="750" cy="345" r="6" fill="#C8102E"/>
  </g>
  
  <!-- Title/Label -->
  <text x="400" y="390" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#C8102E">
    ANFIELD LEGEND
  </text>
  
  <!-- Decorative corner accents -->
  <line x1="20" y1="20" x2="60" y2="20" stroke="#F6EB61" stroke-width="3"/>
  <line x1="20" y1="20" x2="20" y2="60" stroke="#F6EB61" stroke-width="3"/>
  
  <line x1="780" y1="400" x2="740" y2="400" stroke="#F6EB61" stroke-width="3"/>
  <line x1="780" y1="400" x2="780" y2="360" stroke="#F6EB61" stroke-width="3"/>
</svg>