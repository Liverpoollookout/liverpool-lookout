<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative corner elements -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  <circle cx="750" cy="370" r="35" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  
  <!-- Football pitch outline -->
  <rect x="80" y="60" width="640" height="300" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  
  <!-- Pitch center line -->
  <line x1="400" y1="60" x2="400" y2="360" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3" stroke-dasharray="5,5"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="45" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
  <circle cx="400" cy="210" r="3" fill="#FFFFFF" opacity="0.4"/>
  
  <!-- Left penalty area -->
  <rect x="80" y="120" width="60" height="180" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
  <path d="M 110 140 Q 130 140 130 210 Q 130 280 110 280" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Right penalty area -->
  <rect x="660" y="120" width="60" height="180" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
  <path d="M 690 140 Q 670 140 670 210 Q 670 280 690 280" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Tactical formation - Liverpool players (red) -->
  <!-- Goalkeeper -->
  <circle cx="110" cy="210" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="110" y="215" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold">GK</text>
  
  <!-- Defense line (4 players) -->
  <circle cx="200" cy="140" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="200" cy="210" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="200" cy="280" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="280" cy="175" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Midfield line (3 players) -->
  <circle cx="380" cy="130" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="350" cy="210" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="420" cy="280" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Attack line (3 players) -->
  <circle cx="550" cy="160" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="520" cy="240" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="580" cy="210" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Opposing players (navy outline) -->
  <circle cx="680" cy="140" r="11" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <circle cx="680" cy="210" r="11" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <circle cx="680" cy="280" r="11" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Movement arrows showing tactical play -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61" opacity="0.7"/>
    </marker>
  </defs>
  
  <!-- Pass/movement lines -->
  <path d="M 350 210 L 520 240" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.6"/>
  <path d="M 550 160 L 580 210" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.6" stroke-dasharray="3,3"/>
  
  <!-- Title text -->
  <text x="400" y="390" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">MATCH REPORT</text>
  <text x="400" y="410" font-size="14" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">Slot's Tactical Setup</text>
  
  <!-- Rating stars accent (top right) -->
  <g opacity="0.6">
    <polygon points="650,30 655,45 672,45 659,55 665,70 650,60 635,70 641,55 628,45 645,45" fill="#F6EB61"/>
    <polygon points="710,20 713,30 725,30 715,37 718,47 710,40 702,47 705,37 695,30 707,30" fill="#F6EB61"/>
  </g>
  
  <!-- Sketch effect lines -->
  <path d="M 90 90 Q 95 85 100 90" stroke="#C8102E" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M 720 350 Q 730 355 735 345" stroke="#F6EB61" stroke-width="1" fill="none" opacity="0.2"/>
</svg>