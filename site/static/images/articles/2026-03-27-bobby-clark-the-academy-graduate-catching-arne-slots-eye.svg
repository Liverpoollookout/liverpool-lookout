<svg viewBox="0 0 800 420" class="article-svg" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch lines subtle background -->
  <line x1="400" y1="0" x2="400" y2="420" stroke="#1a2d47" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="210" r="60" fill="none" stroke="#1a2d47" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="210" r="3" fill="#1a2d47" opacity="0.3"/>
  
  <!-- Title section background -->
  <rect x="0" y="0" width="800" height="80" fill="#C8102E" opacity="0.15"/>
  
  <!-- Main player figure - sketched style -->
  <!-- Head -->
  <circle cx="200" cy="120" r="28" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <circle cx="193" cy="118" r="3" fill="#C8102E"/>
  <circle cx="207" cy="118" r="3" fill="#C8102E"/>
  <path d="M 200 130 Q 197 135 200 140" fill="none" stroke="#C8102E" stroke-width="2"/>
  
  <!-- Body - Liverpool red kit -->
  <path d="M 200 148 Q 185 160 180 190 L 180 250" fill="none" stroke="#C8102E" stroke-width="3"/>
  <path d="M 200 148 Q 215 160 220 190 L 220 250" fill="none" stroke="#C8102E" stroke-width="3"/>
  
  <!-- Jersey details -->
  <line x1="185" y1="160" x2="215" y2="160" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <line x1="183" y1="170" x2="217" y2="170" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <line x1="185" y1="180" x2="215" y2="180" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Arms -->
  <path d="M 185 155 L 155 180" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 215 155 L 245 180" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Legs -->
  <line x1="180" y1="250" x2="170" y2="310" stroke="#0a1628" stroke-width="3"/>
  <line x1="220" y1="250" x2="230" y2="310" stroke="#0a1628" stroke-width="3"/>
  
  <!-- Football at foot -->
  <circle cx="235" cy="320" r="10" fill="none" stroke="#F6EB61" stroke-width="2.5"/>
  <path d="M 230 320 L 240 320 M 235 315 L 235 325" stroke="#F6EB61" stroke-width="1.5"/>
  
  <!-- Scouts/Development arrows - right side -->
  <g>
    <!-- Development arrow 1 -->
    <path d="M 350 140 L 500 140" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="5,5"/>
    <polygon points="505,140 495,135 495,145" fill="#FFFFFF"/>
    <text x="360" y="130" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">ACADEMY</text>
    
    <!-- Development arrow 2 -->
    <path d="M 350 210 L 500 210" fill="none" stroke="#F6EB61" stroke-width="2.5"/>
    <polygon points="505,210 495,205 495,215" fill="#F6EB61"/>
    <text x="330" y="200" font-family="Arial, sans-serif" font-size="12" fill="#F6EB61" font-weight="bold">POTENTIAL</text>
    
    <!-- Development arrow 3 -->
    <path d="M 350 280 L 500 280" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="5,5"/>
    <polygon points="505,280 495,275 495,285" fill="#FFFFFF"/>
    <text x="310" y="270" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">FIRST TEAM</text>
  </g>
  
  <!-- Stats boxes - right side -->
  <g>
    <!-- Box 1 -->
    <rect x="520" y="120" width="260" height="70" fill="none" stroke="#C8102E" stroke-width="2" rx="4"/>
    <text x="535" y="140" font-family="Arial, sans-serif" font-size="11" fill="#F6EB61" font-weight="bold">Pace:</text>
    <rect x="600" y="135" width="160" height="6" fill="none" stroke="#FFFFFF" stroke-width="1" rx="2"/>
    <rect x="600" y="135" width="128" height="6" fill="#C8102E" rx="2"/>
    <text x="535" y="165" font-family="Arial, sans-serif" font-size="11" fill="#F6EB61" font-weight="bold">Technique:</text>
    <rect x="600" y="160" width="160" height="6" fill="none" stroke="#FFFFFF" stroke-width="1" rx="2"/>
    <rect x="600" y="160" width="136" height="6" fill="#C8102E" rx="2"/>
  </g>
  
  <!-- Box 2 -->
  <g>
    <rect x="520" y="210" width="260" height="70" fill="none" stroke="#C8102E" stroke-width="2" rx="4"/>
    <text x="535" y="230" font-family="Arial, sans-serif" font-size="11" fill="#F6EB61" font-weight="bold">Positioning:</text>
    <rect x="600" y="225" width="160" height="6" fill="none" stroke="#FFFFFF" stroke-width="1" rx="2"/>
    <rect x="600" y="225" width="144" height="6" fill="#C8102E" rx="2"/>
    <text x="535" y="255" font-family="Arial, sans-serif" font-size="11" fill="#F6EB61" font-weight="bold">Decision Making:</text>
    <rect x="600" y="250" width="160" height="6" fill="none" stroke="#FFFFFF" stroke-width="1" rx="2"/>
    <rect x="600" y="250" width="120" height="6" fill="#C8102E" rx="2"/>
  </g>
  
  <!-- Title text -->
  <text x="50" y="50" font-family="Arial, sans-serif" font-size="28" fill="#FFFFFF" font-weight="bold">ACADEMY SCOUT</text>
  <text x="50" y="75" font-family="Arial, sans-serif" font-size="14" fill="#F6EB61">First-Team Potential Analysis</text>
  
  <!-- Liverpool badge accent -->
  <circle cx="750" cy="360" r="30" fill="none" stroke="#C8102E" stroke-width="2"/>
  <circle cx="750" cy="360" r="25" fill="none" stroke="#F6EB61" stroke-width="1" opacity="0.6"/>
  <text x="742" y="368" font-family="Arial, sans-serif" font-size="16" fill="#C8102E" font-weight="bold">LFC</text>
  
  <!-- Decorative sketchy elements -->
  <path d="M 100 350 Q 120 330 140 350" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.5"/>
  <path d="M 650 340 Q 670 320 690 340" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
</svg>