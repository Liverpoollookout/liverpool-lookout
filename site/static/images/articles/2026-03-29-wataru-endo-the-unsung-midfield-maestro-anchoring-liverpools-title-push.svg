<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Sketch texture overlay -->
  <defs>
    <filter id="sketch">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5"/>
    </filter>
  </defs>
  
  <!-- Player silhouette - Wataru Endo in Liverpool kit -->
  <!-- Head -->
  <circle cx="400" cy="100" r="35" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.9"/>
  
  <!-- Hair/head detail -->
  <path d="M 370 85 Q 365 70 400 65 Q 435 70 430 85" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.8"/>
  
  <!-- Neck -->
  <line x1="400" y1="133" x2="400" y2="155" stroke="#F6EB61" stroke-width="3"/>
  
  <!-- Body - Liverpool red kit -->
  <rect x="360" y="155" width="80" height="90" fill="#C8102E" opacity="0.85"/>
  
  <!-- Shirt collar detail -->
  <path d="M 375 155 L 370 170 M 425 155 L 430 170" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Shirt center stripe -->
  <line x1="400" y1="155" x2="400" y2="245" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Arms -->
  <!-- Left arm -->
  <path d="M 360 170 Q 320 160 310 210" fill="none" stroke="#F6EB61" stroke-width="7" stroke-linecap="round"/>
  
  <!-- Right arm -->
  <path d="M 440 170 Q 480 165 500 215" fill="none" stroke="#F6EB61" stroke-width="7" stroke-linecap="round"/>
  
  <!-- Shorts -->
  <rect x="365" y="245" width="70" height="45" fill="#0a1628" stroke="#C8102E" stroke-width="2" opacity="0.9"/>
  
  <!-- Shorts detail -->
  <line x1="400" y1="245" x2="400" y2="290" stroke="#F6EB61" stroke-width="1" opacity="0.6"/>
  
  <!-- Legs -->
  <!-- Left leg -->
  <path d="M 375 290 L 370 360" fill="none" stroke="#F6EB61" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Right leg -->
  <path d="M 425 290 L 430 360" fill="none" stroke="#F6EB61" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Feet -->
  <ellipse cx="370" cy="365" rx="8" ry="6" fill="#0a1628" stroke="#FFFFFF" stroke-width="1.5"/>
  <ellipse cx="430" cy="365" rx="8" ry="6" fill="#0a1628" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Football at feet -->
  <circle cx="400" cy="375" r="10" fill="none" stroke="#F6EB61" stroke-width="2"/>
  <path d="M 390 375 Q 400 370 410 375" fill="none" stroke="#F6EB61" stroke-width="1" opacity="0.6"/>
  
  <!-- Sketch lines for dynamic effect -->
  <line x1="290" y1="180" x2="310" y2="200" stroke="#C8102E" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="510" y1="190" x2="490" y2="210" stroke="#C8102E" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="350" y1="310" x2="330" y2="330" stroke="#F6EB61" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="450" y1="310" x2="470" y2="330" stroke="#F6EB61" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>
  
  <!-- Player name text -->
  <text x="400" y="410" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#F6EB61" text-anchor="middle" letter-spacing="2">WATARU ENDO</text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="80" r="3" fill="#C8102E" opacity="0.5"/>
  <circle cx="150" cy="120" r="2" fill="#F6EB61" opacity="0.5"/>
  <circle cx="700" cy="100" r="3" fill="#C8102E" opacity="0.5"/>
  <circle cx="750" cy="140" r="2" fill="#F6EB61" opacity="0.5"/>
  
  <!-- Corner accent lines -->
  <line x1="20" y1="20" x2="60" y2="20" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
  <line x1="20" y1="20" x2="20" y2="60" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
  
  <line x1="780" y1="400" x2="740" y2="400" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
  <line x1="780" y1="400" x2="780" y2="360" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
</svg>