<svg viewBox="0 0 800 420" class="article-svg" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Sketch-style pitch outline -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.6">
    <rect x="50" y="40" width="700" height="340" stroke-dasharray="5,5"/>
    <line x1="400" y1="40" x2="400" y2="380"/>
    <circle cx="400" cy="210" r="50" stroke-dasharray="5,5"/>
    <circle cx="400" cy="210" r="3" fill="#FFFFFF"/>
  </g>
  
  <!-- Left penalty area -->
  <g stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.4" stroke-dasharray="3,3">
    <rect x="50" y="100" width="100" height="220"/>
    <rect x="50" y="135" width="50" height="150"/>
  </g>
  
  <!-- Right penalty area -->
  <g stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.4" stroke-dasharray="3,3">
    <rect x="750" y="100" width="-100" height="220"/>
    <rect x="750" y="135" width="-50" height="150"/>
  </g>
  
  <!-- Player position dots with sketched style -->
  <!-- Liverpool formation -->
  <g>
    <!-- Goalkeeper -->
    <circle cx="80" cy="210" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <text x="80" y="215" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold">GK</text>
    
    <!-- Defenders -->
    <circle cx="180" cy="120" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="180" cy="210" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="180" cy="300" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="260" cy="160" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="260" cy="260" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Midfielders -->
    <circle cx="380" cy="90" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="350" cy="180" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="450" cy="180" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="380" cy="330" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Forwards -->
    <circle cx="600" cy="140" r="12" fill="#C8102E" stroke="#F6EB61" stroke-width="2.5"/>
    <circle cx="600" cy="280" r="12" fill="#C8102E" stroke="#F6EB61" stroke-width="2.5"/>
    <circle cx="700" cy="210" r="12" fill="#C8102E" stroke="#F6EB61" stroke-width="2.5"/>
  </g>
  
  <!-- Tactical arrows showing movement -->
  <g stroke="#F6EB61" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 350 180 Q 400 150 580 140" marker-end="url(#arrowhead)"/>
    <path d="M 450 180 Q 500 200 680 210" marker-end="url(#arrowhead)"/>
    <path d="M 380 330 Q 450 280 600 280" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <!-- Match Report Title -->
  <text x="400" y="30" font-size="28" fill="#C8102E" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">
    MATCH REPORT
  </text>
  
  <!-- Tactical Analysis Label -->
  <rect x="40" y="385" width="720" height="25" fill="none" stroke="#F6EB61" stroke-width="2" stroke-dasharray="4,4" opacity="0.8"/>
  <text x="50" y="405" font-size="13" fill="#F6EB61" font-weight="bold" font-family="Arial, sans-serif">
    Slot's Tactical Setup • Player Ratings • Key Moments
  </text>
  
  <!-- Decorative corner elements -->
  <g stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.3">
    <path d="M 30 20 L 50 20 L 50 40"/>
    <path d="M 770 20 L 750 20 L 750 40"/>
    <path d="M 30 400 L 50 400 L 50 380"/>
    <path d="M 770 400 L 750 400 L 750 380"/>
  </g>
</svg>