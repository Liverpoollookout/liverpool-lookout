<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Anfield pitch outline sketch -->
  <g stroke="#F6EB61" stroke-width="2" fill="none" opacity="0.6">
    <rect x="80" y="60" width="640" height="300" stroke-dasharray="5,5"/>
    <line x1="410" y1="60" x2="410" y2="360"/>
    <circle cx="410" cy="210" r="50"/>
    <circle cx="410" cy="210" r="3" fill="#F6EB61"/>
  </g>
  
  <!-- Sketched player figure - Kenny Dalglish iconic moment -->
  <g>
    <!-- Head -->
    <circle cx="320" cy="130" r="25" stroke="#C8102E" stroke-width="3" fill="none"/>
    
    <!-- Hair sketch -->
    <path d="M 300 115 Q 320 105 340 115" stroke="#C8102E" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Body - Liverpool kit -->
    <ellipse cx="320" cy="190" rx="35" ry="50" stroke="#C8102E" stroke-width="3" fill="#C8102E" opacity="0.2"/>
    
    <!-- Kit details -->
    <line x1="320" y1="160" x2="320" y2="240" stroke="#C8102E" stroke-width="2"/>
    <path d="M 290 175 L 320 190 L 350 175" stroke="#FFFFFF" stroke-width="2" fill="none"/>
    
    <!-- Arms -->
    <line x1="285" y1="180" x2="240" y2="160" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    <line x1="355" y1="180" x2="400" y2="170" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Left hand ball -->
    <circle cx="235" cy="155" r="8" stroke="#FFFFFF" stroke-width="2" fill="none"/>
    <path d="M 230 152 Q 235 155 238 158" stroke="#FFFFFF" stroke-width="1" fill="none"/>
    
    <!-- Legs -->
    <line x1="300" y1="240" x2="290" y2="320" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    <line x1="340" y1="240" x2="350" y2="320" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Feet -->
    <ellipse cx="288" cy="325" rx="12" ry="8" stroke="#0a1628" stroke-width="2" fill="#0a1628"/>
    <ellipse cx="352" cy="325" rx="12" ry="8" stroke="#0a1628" stroke-width="2" fill="#0a1628"/>
    
    <!-- Motion lines for dynamic feel -->
    <path d="M 200 140 L 180 135" stroke="#C8102E" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M 200 160 L 175 165" stroke="#C8102E" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- Iconic moment - ball trajectory -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 235 155 Q 320 80 500 120" stroke-dasharray="4,4" stroke-linecap="round"/>
    <circle cx="500" cy="120" r="4" fill="#FFFFFF"/>
  </g>
  
  <!-- Title background banner -->
  <rect x="420" y="40" width="340" height="100" fill="#C8102E" opacity="0.1" stroke="#C8102E" stroke-width="2"/>
  
  <!-- Player name text -->
  <text x="590" y="75" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#C8102E" text-anchor="middle">
    KENNY
  </text>
  <text x="590" y="110" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    DALGLISH
  </text>
  
  <!-- Decorative elements - Stars for legend status -->
  <g fill="#F6EB61">
    <polygon points="520,140 524,150 535,150 527,157 531,168 520,161 509,168 513,157 505,150 516,150"/>
    <polygon points="620,160 623,168 632,168 626,174 629,182 620,176 611,182 614,174 608,168 617,168"/>
    <polygon points="480,240 482,246 489,246 484,250 486,256 480,252 474,256 476,250 471,246 478,246"/>
  </g>
  
  <!-- Bottom accent line -->
  <line x1="80" y1="380" x2="720" y2="380" stroke="#F6EB61" stroke-width="3" opacity="0.7"/>
</svg>