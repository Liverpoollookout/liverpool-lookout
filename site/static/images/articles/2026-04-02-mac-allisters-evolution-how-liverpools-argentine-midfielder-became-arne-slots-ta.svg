<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Sketch texture overlay -->
  <defs>
    <filter id="sketch">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" />
    </filter>
  </defs>
  
  <!-- Head -->
  <circle cx="280" cy="100" r="35" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.9" filter="url(#sketch)"/>
  
  <!-- Hair details -->
  <path d="M 250 80 Q 280 60 310 80" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
  
  <!-- Body - Liverpool red kit -->
  <path d="M 280 135 L 220 180 L 200 280 L 220 320 L 240 320 L 260 280 L 280 270 L 300 280 L 320 320 L 340 320 L 360 280 L 340 180 Z" 
        fill="#C8102E" stroke="#FFFFFF" stroke-width="2.5" opacity="0.95"/>
  
  <!-- Left arm -->
  <line x1="220" y1="160" x2="140" y2="200" stroke="#FFFFFF" stroke-width="2.5" opacity="0.9"/>
  <circle cx="135" cy="210" r="8" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- Right arm -->
  <line x1="340" y1="160" x2="420" y2="190" stroke="#FFFFFF" stroke-width="2.5" opacity="0.9"/>
  <circle cx="425" cy="200" r="8" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- Left leg -->
  <line x1="230" y1="320" x2="220" y2="380" stroke="#FFFFFF" stroke-width="2.5" opacity="0.9"/>
  <ellipse cx="218" cy="390" rx="6" ry="10" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- Right leg -->
  <line x1="330" y1="320" x2="340" y2="380" stroke="#FFFFFF" stroke-width="2.5" opacity="0.9"/>
  <ellipse cx="342" cy="390" rx="6" ry="10" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- Jersey number details -->
  <rect x="260" y="190" width="40" height="50" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.7"/>
  <text x="280" y="225" font-size="28" font-weight="bold" fill="#F6EB61" text-anchor="middle" opacity="0.8" font-family="Arial, sans-serif">10</text>
  
  <!-- Liverpool crest suggestion -->
  <circle cx="280" cy="155" r="12" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Sketch lines for movement/energy -->
  <line x1="100" y1="200" x2="140" y2="210" stroke="#C8102E" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  <line x1="420" y1="180" x2="460" y2="190" stroke="#C8102E" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  
  <!-- Accent lines -->
  <path d="M 250 140 Q 280 120 310 140" fill="none" stroke="#F6EB61" stroke-width="1" opacity="0.4"/>
  <path d="M 240 250 L 320 250" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Name text background box -->
  <rect x="420" y="80" width="340" height="80" fill="#0a1628" stroke="#F6EB61" stroke-width="2" rx="5" opacity="0.9"/>
  
  <!-- Accent corners -->
  <line x1="420" y1="80" x2="450" y2="80" stroke="#C8102E" stroke-width="2"/>
  <line x1="420" y1="80" x2="420" y2="110" stroke="#C8102E" stroke-width="2"/>
  <line x1="760" y1="160" x2="730" y2="160" stroke="#C8102E" stroke-width="2"/>
  <line x1="760" y1="160" x2="760" y2="130" stroke="#C8102E" stroke-width="2"/>
  
  <!-- Player name -->
  <text x="590" y="115" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">Alexis</text>
  <text x="590" y="150" font-size="36" font-weight="bold" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif">Mac Allister</text>
  
  <!-- Small decorative elements -->
  <circle cx="430" cy="95" r="3" fill="#F6EB61" opacity="0.7"/>
  <circle cx="750" cy="105" r="3" fill="#F6EB61" opacity="0.7"/>
  <circle cx="440" cy="155" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="740" cy="145" r="2" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- Bottom accent line -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
</svg>