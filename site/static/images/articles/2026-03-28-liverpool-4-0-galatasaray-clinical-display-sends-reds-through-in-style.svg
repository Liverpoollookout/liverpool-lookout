<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <defs>
    <filter id="sketch">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5"/>
    </filter>
  </defs>
  
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch outline -->
  <g filter="url(#sketch)" stroke="#F6EB61" stroke-width="3" fill="none">
    <!-- Pitch rectangle -->
    <rect x="80" y="60" width="640" height="300" stroke-dasharray="5,5" opacity="0.8"/>
    
    <!-- Center line -->
    <line x1="400" y1="60" x2="400" y2="360"/>
    
    <!-- Center circle -->
    <circle cx="400" cy="210" r="50" stroke-dasharray="5,5"/>
    
    <!-- Center spot -->
    <circle cx="400" cy="210" r="4" fill="#F6EB61"/>
    
    <!-- Left penalty box -->
    <rect x="80" y="120" width="100" height="180"/>
    
    <!-- Left goal box -->
    <rect x="80" y="150" width="50" height="120"/>
    
    <!-- Right penalty box -->
    <rect x="720" y="120" width="-100" height="180"/>
    
    <!-- Right goal box -->
    <rect x="720" y="150" width="-50" height="120"/>
  </g>
  
  <!-- Player positions - sketched circles with numbers -->
  <!-- Goalkeeper -->
  <g filter="url(#sketch)">
    <circle cx="90" cy="210" r="20" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <text x="90" y="215" font-size="16" font-weight="bold" fill="#C8102E" text-anchor="middle">1</text>
  </g>
  
  <!-- Defenders -->
  <g filter="url(#sketch)">
    <circle cx="180" cy="130" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <text x="180" y="135" font-size="14" font-weight="bold" fill="#C8102E" text-anchor="middle">4</text>
    
    <circle cx="180" cy="210" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <text x="180" y="215" font-size="14" font-weight="bold" fill="#C8102E" text-anchor="middle">6</text>
    
    <circle cx="180" cy="290" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <text x="180" y="295" font-size="14" font-weight="bold" fill="#C8102E" text-anchor="middle">26</text>
  </g>
  
  <!-- Midfielders -->
  <g filter="url(#sketch)">
    <circle cx="300" cy="100" r="16" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <text x="300" y="105" font-size="12" font-weight="bold" fill="#C8102E" text-anchor="middle">8</text>
    
    <circle cx="300" cy="210" r="16" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <text x="300" y="215" font-size="12" font-weight="bold" fill="#C8102E" text-anchor="middle">3</text>
    
    <circle cx="300" cy="320" r="16" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <text x="300" y="325" font-size="12" font-weight="bold" fill="#C8102E" text-anchor="middle">21</text>
  </g>
  
  <!-- Forwards -->
  <g filter="url(#sketch)">
    <circle cx="420" cy="150" r="17" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <text x="420" y="156" font-size="13" font-weight="bold" fill="#C8102E" text-anchor="middle">10</text>
    
    <circle cx="420" cy="270" r="17" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <text x="420" y="276" font-size="13" font-weight="bold" fill="#C8102E" text-anchor="middle">9</text>
  </g>
  
  <!-- Tactical arrows showing movement -->
  <g filter="url(#sketch)" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 300 210 L 380 180" marker-end="url(#arrowhead)"/>
    <path d="M 300 100 L 350 140" marker-end="url(#arrowhead)"/>
    <path d="M 300 320 L 350 280" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FFFFFF"/>
    </marker>
  </defs>
  
  <!-- Title and match report text -->
  <g filter="url(#sketch)">
    <text x="400" y="395" font-size="20" font-weight="bold" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif">MATCH REPORT</text>
    <text x="400" y="415" font-size="12" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">Slot Tactics • Player Ratings • Key Moments</text>
  </g>
  
  <!-- Decorative elements -->
  <g filter="url(#sketch)" stroke="#F6EB61" stroke-width="1.5" fill="none" opacity="0.4">
    <circle cx="50" cy="50" r="25" stroke-dasharray="3,3"/>
    <circle cx="750" cy="370" r="30" stroke-dasharray="3,3"/>
  </g>
</svg>