<svg viewBox="0 0 800 420" class="article-svg" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative pitch lines -->
  <line x1="400" y1="0" x2="400" y2="420" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="210" r="60" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.2"/>
  
  <!-- Medical/Fitness themed elements -->
  <!-- Clipboard sketch -->
  <rect x="80" y="80" width="120" height="160" fill="none" stroke="#FFFFFF" stroke-width="3" rx="8"/>
  <rect x="90" y="95" width="100" height="130" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Checkmarks and status indicators -->
  <circle cx="110" cy="120" r="8" fill="none" stroke="#C8102E" stroke-width="2"/>
  <path d="M 105 120 L 110 125 L 118 115" stroke="#C8102E" stroke-width="2" fill="none"/>
  
  <circle cx="110" cy="155" r="8" fill="none" stroke="#F6EB61" stroke-width="2"/>
  <line x1="105" y1="155" x2="115" y2="155" stroke="#F6EB61" stroke-width="2"/>
  
  <circle cx="110" cy="190" r="8" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  <line x1="105" y1="185" x2="115" y2="195" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  <line x1="115" y1="185" x2="105" y2="195" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  
  <!-- Player silhouette in Liverpool red -->
  <g transform="translate(380, 100)">
    <!-- Head -->
    <circle cx="0" cy="0" r="25" fill="none" stroke="#C8102E" stroke-width="3"/>
    
    <!-- Body -->
    <line x1="0" y1="25" x2="0" y2="70" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Arms -->
    <line x1="0" y1="40" x2="-35" y2="30" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="40" x2="35" y2="30" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Legs -->
    <line x1="0" y1="70" x2="-20" y2="120" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="70" x2="20" y2="120" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Liverpool Kit indicator - red jersey accent -->
    <rect x="-15" y="30" width="30" height="25" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
  </g>
  
  <!-- Fitness status indicators -->
  <g transform="translate(600, 120)">
    <!-- Status bars -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">STATUS</text>
    
    <!-- Available bar -->
    <rect x="0" y="20" width="140" height="20" fill="none" stroke="#F6EB61" stroke-width="2" rx="4"/>
    <rect x="2" y="22" width="120" height="16" fill="#C8102E" rx="3"/>
    <text x="70" y="35" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">AVAILABLE</text>
    
    <!-- Recovery bar -->
    <rect x="0" y="50" width="140" height="20" fill="none" stroke="#F6EB61" stroke-width="2" rx="4"/>
    <rect x="2" y="52" width="80" height="16" fill="#F6EB61" opacity="0.8" rx="3"/>
    <text x="70" y="65" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">RECOVERY</text>
    
    <!-- Out bar -->
    <rect x="0" y="80" width="140" height="20" fill="none" stroke="#FFFFFF" stroke-width="2" rx="4" opacity="0.5"/>
    <rect x="2" y="82" width="30" height="16" fill="#FFFFFF" opacity="0.3" rx="3"/>
    <text x="70" y="95" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">OUT</text>
  </g>
  
  <!-- Title -->
  <text x="400" y="350" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#C8102E" text-anchor="middle">INJURY &amp; FITNESS UPDATE</text>
  
  <!-- Subtitle -->
  <text x="400" y="385" font-family="Arial, sans-serif" font-size="16" fill="#F6EB61" text-anchor="middle" opacity="0.9">Availability for Next Fixture</text>
  
  <!-- Decorative corner elements -->
  <path d="M 20 20 L 50 20 L 20 50" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
  <path d="M 780 20 L 750 20 L 780 50" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
  <path d="M 20 400 L 50 400 L 20 370" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
  <path d="M 780 400 L 750 400 L 780 370" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
</svg>