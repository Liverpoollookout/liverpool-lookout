<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative corner elements -->
  <circle cx="50" cy="50" r="30" fill="#F6EB61" opacity="0.1"/>
  <circle cx="750" cy="370" r="40" fill="#C8102E" opacity="0.08"/>
  
  <!-- Sketch style player figure - Diogo Jota -->
  <g id="player-sketch" transform="translate(200, 80)">
    <!-- Head -->
    <circle cx="100" cy="40" r="28" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.9"/>
    
    <!-- Hair sketch -->
    <path d="M 75 25 Q 100 10 125 25" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
    <path d="M 80 20 Q 100 5 120 20" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Face features -->
    <circle cx="90" cy="35" r="3" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="110" cy="35" r="3" fill="#FFFFFF" opacity="0.8"/>
    <path d="M 85 48 Q 100 52 115 48" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Neck -->
    <line x1="95" y1="68" x2="95" y2="85" stroke="#FFFFFF" stroke-width="2.5" opacity="0.8"/>
    <line x1="105" y1="68" x2="105" y2="85" stroke="#FFFFFF" stroke-width="2.5" opacity="0.8"/>
    
    <!-- Body - Liverpool kit -->
    <ellipse cx="100" cy="125" rx="35" ry="45" fill="#C8102E" opacity="0.85"/>
    
    <!-- Kit details -->
    <path d="M 85 100 L 80 140" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
    <path d="M 115 100 L 120 140" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
    <path d="M 100 110 L 100 150" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Liverpool crest impression (simple badge) -->
    <circle cx="100" cy="120" r="8" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
    <path d="M 97 117 L 103 120 L 97 123" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
    
    <!-- Arms -->
    <line x1="70" y1="110" x2="40" y2="140" stroke="#FFFFFF" stroke-width="2.5" opacity="0.8"/>
    <line x1="130" y1="110" x2="160" y2="140" stroke="#FFFFFF" stroke-width="2.5" opacity="0.8"/>
    
    <!-- Hands -->
    <circle cx="38" cy="142" r="6" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
    <circle cx="162" cy="142" r="6" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
    
    <!-- Legs -->
    <line x1="85" y1="165" x2="78" y2="220" stroke="#FFFFFF" stroke-width="2.5" opacity="0.8"/>
    <line x1="115" y1="165" x2="122" y2="220" stroke="#FFFFFF" stroke-width="2.5" opacity="0.8"/>
    
    <!-- Shorts (red kit) -->
    <rect x="80" y="155" width="40" height="20" fill="#C8102E" opacity="0.85"/>
    <path d="M 85 175 L 85 185" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
    <path d="M 115 175 L 115 185" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Socks -->
    <rect x="76" y="218" width="8" height="15" fill="#FFFFFF" opacity="0.7"/>
    <rect x="120" y="218" width="8" height="15" fill="#FFFFFF" opacity="0.7"/>
    
    <!-- Boots -->
    <ellipse cx="82" cy="237" rx="7" ry="6" fill="#0a1628" opacity="0.8"/>
    <ellipse cx="126" cy="237" rx="7" ry="6" fill="#0a1628" opacity="0.8"/>
    
    <!-- Action lines (movement) -->
    <path d="M 30 130 L 20 125" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
    <path d="M 35 150 L 22 148" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
    <path d="M 170 135 L 185 128" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
    <path d="M 165 155 L 180 152" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Player name - stylized text -->
  <g id="name-section">
    <!-- Background accent -->
    <rect x="480" y="100" width="280" height="100" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.4" stroke-dasharray="5,5"/>
    
    <!-- Name text -->
    <text x="620" y="145" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#C8102E" text-anchor="middle" opacity="0.95">DIOGO</text>
    <text x="620" y="195" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#FFFFFF" text-anchor="middle" opacity="0.95">JOTA</text>
    
    <!-- Accent line -->
    <line x1="480" y1="210" x2="760" y2="210" stroke="#F6EB61" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Decorative sketchy elements -->
  <g id="decorative-sketches" opacity="0.4">
    <path d="M 50 200 Q 80 180 100 200 T 150 200" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <path d="M 700 100 Q 720 120 700 140" fill="none" stroke="#C8102E" stroke-width="1.5"/>
    <circle cx="670" cy="320" r="25" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
    <path d="M 100 380 L 150 385 L 130 395 L 145 400" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- Extra sketch details for drawing effect -->
  <g id="sketch-texture" opacity="0.15">
    <line x1="0" y1="0" x2="800" y2="420" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="0" y2="420" stroke="#FFFFFF" stroke-width="0.5"/>
  </g>
</svg>