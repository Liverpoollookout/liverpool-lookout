<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Title text -->
  <text x="400" y="40" font-size="32" font-weight="bold" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif">
    INJURY UPDATE
  </text>
  
  <!-- Decorative line -->
  <line x1="100" y1="60" x2="700" y2="60" stroke="#F6EB61" stroke-width="2"/>
  
  <!-- Stylised pitch diagram -->
  <g opacity="0.6">
    <!-- Pitch outline -->
    <rect x="120" y="100" width="560" height="280" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Center line -->
    <line x1="400" y1="100" x2="400" y2="380" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Center circle -->
    <circle cx="400" cy="240" r="40" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Center spot -->
    <circle cx="400" cy="240" r="3" fill="#FFFFFF" opacity="0.5"/>
  </g>
  
  <!-- Player figures with availability status -->
  <!-- Available player 1 -->
  <g>
    <circle cx="200" cy="160" r="25" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="200" y1="185" x2="200" y2="230" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="200" y1="200" x2="170" y2="210" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="200" y1="200" x2="230" y2="210" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="200" y1="230" x2="180" y2="270" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="200" y1="230" x2="220" y2="270" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Check mark -->
    <path d="M 240 155 L 250 165 L 265 145" stroke="#F6EB61" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Available player 2 -->
  <g>
    <circle cx="600" cy="160" r="25" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="600" y1="185" x2="600" y2="230" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="600" y1="200" x2="570" y2="210" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="600" y1="200" x2="630" y2="210" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="600" y1="230" x2="580" y2="270" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="600" y1="230" x2="620" y2="270" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Check mark -->
    <path d="M 640 155 L 650 165 L 665 145" stroke="#F6EB61" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Injured player (center) -->
  <g>
    <circle cx="400" cy="180" r="25" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <line x1="400" y1="205" x2="400" y2="250" stroke="#FFFFFF" stroke-width="2.5"/>
    <line x1="400" y1="220" x2="370" y2="230" stroke="#FFFFFF" stroke-width="2.5"/>
    <line x1="400" y1="220" x2="430" y2="230" stroke="#FFFFFF" stroke-width="2.5"/>
    <line x1="400" y1="250" x2="380" y2="290" stroke="#FFFFFF" stroke-width="2.5"/>
    <line x1="400" y1="250" x2="420" y2="290" stroke="#FFFFFF" stroke-width="2.5"/>
    <!-- X mark for injury -->
    <line x1="440" y1="155" x2="460" y2="175" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    <line x1="460" y1="155" x2="440" y2="175" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Status labels -->
  <text x="200" y="310" font-size="14" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">
    AVAILABLE
  </text>
  
  <text x="400" y="330" font-size="14" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">
    SIDELINED
  </text>
  
  <text x="600" y="310" font-size="14" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">
    AVAILABLE
  </text>
  
  <!-- Recovery timeline indicator -->
  <g>
    <rect x="150" y="360" width="500" height="30" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4" rx="5"/>
    <text x="160" y="380" font-size="12" fill="#FFFFFF" font-family="Arial, sans-serif" opacity="0.7">
      Expected Return →
    </text>
    <circle cx="600" cy="375" r="5" fill="#F6EB61"/>
  </g>
  
  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="15" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.5"/>
  <circle cx="770" cy="390" r="15" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.5"/>
</svg>