<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Sketch style title background -->
  <rect x="20" y="20" width="760" height="80" fill="none" stroke="#F6EB61" stroke-width="2" stroke-dasharray="5,5" rx="8"/>
  
  <!-- Title text -->
  <text x="400" y="55" font-size="32" font-weight="bold" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif">
    INJURY &amp; FITNESS UPDATE
  </text>
  <text x="400" y="85" font-size="16" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">
    Next Fixture Availability
  </text>
  
  <!-- Left side - Medical checklist sketch -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none">
    <!-- Clipboard outline -->
    <rect x="40" y="130" width="120" height="240" rx="8" stroke="#F6EB61" stroke-width="2.5"/>
    <line x1="50" y1="160" x2="150" y2="160" stroke="#C8102E" stroke-width="1.5"/>
    <line x1="50" y1="185" x2="150" y2="185" stroke="#C8102E" stroke-width="1.5"/>
    <line x1="50" y1="210" x2="150" y2="210" stroke="#C8102E" stroke-width="1.5"/>
    <line x1="50" y1="235" x2="150" y2="235" stroke="#C8102E" stroke-width="1.5"/>
    <line x1="50" y1="260" x2="150" y2="260" stroke="#C8102E" stroke-width="1.5"/>
    <line x1="50" y1="285" x2="150" y2="285" stroke="#C8102E" stroke-width="1.5"/>
    
    <!-- Checkmarks -->
    <polyline points="55,160 60,167 70,155" stroke="#FFFFFF" stroke-width="2" fill="none"/>
    <polyline points="55,185 60,192 70,180" stroke="#FFFFFF" stroke-width="2" fill="none"/>
    <polyline points="55,210 60,217 70,205" stroke="#FFFFFF" stroke-width="2" fill="none"/>
    <polyline points="55,235 60,242 70,230" stroke="#FFFFFF" stroke-width="2" fill="none"/>
    <polyline points="55,260 60,267 70,255" stroke="#FFFFFF" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Center - Player figure sketch in Liverpool kit -->
  <g>
    <!-- Head -->
    <circle cx="350" cy="160" r="28" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <!-- Simple face -->
    <circle cx="342" cy="155" r="3" fill="#C8102E"/>
    <circle cx="358" cy="155" r="3" fill="#C8102E"/>
    <line x1="345" y1="165" x2="355" y2="165" stroke="#C8102E" stroke-width="1.5"/>
    
    <!-- Body - Liverpool Red Jersey -->
    <ellipse cx="350" cy="215" rx="35" ry="45" fill="#C8102E" opacity="0.8"/>
    <!-- Jersey outline -->
    <ellipse cx="350" cy="215" rx="35" ry="45" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <!-- White chest stripe -->
    <rect x="340" y="195" width="20" height="40" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <!-- Jersey number outline -->
    <circle cx="350" cy="215" r="12" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <text x="350" y="220" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">1</text>
    
    <!-- Left arm -->
    <line x1="318" y1="205" x2="285" y2="240" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right arm -->
    <line x1="382" y1="205" x2="415" y2="240" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Left leg -->
    <line x1="330" y1="260" x2="320" y2="330" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right leg -->
    <line x1="370" y1="260" x2="380" y2="330" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Left boot -->
    <ellipse cx="320" cy="335" rx="8" ry="6" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Right boot -->
    <ellipse cx="380" cy="335" rx="8" ry="6" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Heartbeat monitor line -->
    <polyline points="300,120 310,120 315,110 320,135 325,125 335,125" 
              fill="none" stroke="#F6EB61" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Right side - Status indicators -->
  <g>
    <!-- Status boxes -->
    <!-- Available -->
    <rect x="620" y="150" width="150" height="50" rx="6" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="3,3"/>
    <circle cx="640" cy="172" r="6" fill="#7FBA00" opacity="0.9"/>
    <text x="660" y="180" font-size="13" fill="#FFFFFF" font-family="Arial, sans-serif" font-weight="bold">Available</text>
    
    <!-- Doubtful -->
    <rect x="620" y="215" width="150" height="50" rx="6" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="3,3"/>
    <circle cx="640" cy="237" r="6" fill="#FFB81C" opacity="0.9"/>
    <text x="660" y="245" font-size="13" fill="#FFFFFF" font-family="Arial, sans-serif" font-weight="bold">Doubtful</text>
    
    <!-- Unavailable -->
    <rect x="620" y="280" width="150" height="50" rx="6" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="3,3"/>
    <circle cx="640" cy="302" r="6" fill="#C8102E" opacity="0.9"/>
    <text x="660" y="310" font-size="13" fill="#FFFFFF" font-family="Arial, sans-serif" font-weight="bold">Out</text>
  </g>
  
  <!-- Bottom section - Medical cross -->
  <g stroke="#F6EB61" stroke-width="2.5" fill="none">
    <rect x="50" y="370" width="80" height="30" rx="4"/>
    <line x1="70" y1="375" x2="70" y2="395"/>
    <line x1="60" y1="385" x2="80" y2="385"/>
  </g>
  <text x="150" y="390" font-size="11" fill="#FFFFFF" font-family="Arial, sans-serif">MEDICAL TEAM ASSESSMENT</text>
  
  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="4" fill="#C8102E" opacity="0.6"/>
  <circle cx="770" cy="390" r="4" fill="#F6EB61" opacity="0.6"/>
  <line x1="0" y1="410" x2="800" y2="410" stroke="#F6EB61" stroke-width="1" opacity="0.5"/>
</svg>