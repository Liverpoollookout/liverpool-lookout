<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative corner elements -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  <circle cx="750" cy="370" r="30" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  
  <!-- Main title text -->
  <text x="400" y="60" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">
    TRANSFER RUMOURS
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="95" font-size="14" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" opacity="0.9">
    Outgoings &amp; Departures
  </text>
  
  <!-- Left figure (player silhouette) -->
  <g opacity="0.85">
    <!-- Head -->
    <circle cx="150" cy="140" r="25" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Body in red kit -->
    <rect x="135" y="170" width="30" height="50" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Left arm pointing left -->
    <line x1="135" y1="180" x2="90" y2="165" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Right arm -->
    <line x1="165" y1="180" x2="200" y2="175" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Left leg -->
    <line x1="140" y1="220" x2="130" y2="290" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Right leg -->
    <line x1="160" y1="220" x2="170" y2="290" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Liverpool crest on chest -->
    <circle cx="150" cy="190" r="8" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>
  
  <!-- Left arrow pointing outward (exit) -->
  <defs>
    <marker id="arrowheadRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#C8102E"/>
    </marker>
    <marker id="arrowheadWhite" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FFFFFF"/>
    </marker>
  </defs>
  
  <line x1="50" y1="210" x2="100" y2="210" stroke="#C8102E" stroke-width="3" marker-end="url(#arrowheadRed)" stroke-dasharray="5,5"/>
  <text x="70" y="235" font-size="12" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">
    OUT
  </text>
  
  <!-- Center divider line -->
  <line x1="400" y1="130" x2="400" y2="310" stroke="#F6EB61" stroke-width="2" opacity="0.5" stroke-dasharray="8,4"/>
  
  <!-- Right figure (player silhouette) -->
  <g opacity="0.6">
    <!-- Head -->
    <circle cx="650" cy="140" r="25" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <!-- Body -->
    <rect x="635" y="170" width="30" height="50" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <!-- Left arm -->
    <line x1="635" y1="180" x2="600" y2="175" stroke="#FFFFFF" stroke-width="2.5"/>
    <!-- Right arm pointing right -->
    <line x1="665" y1="180" x2="710" y2="165" stroke="#FFFFFF" stroke-width="2.5"/>
    <!-- Left leg -->
    <line x1="640" y1="220" x2="630" y2="290" stroke="#FFFFFF" stroke-width="2.5"/>
    <!-- Right leg -->
    <line x1="660" y1="220" x2="670" y2="290" stroke="#FFFFFF" stroke-width="2.5"/>
  </g>
  
  <!-- Right arrow pointing outward (uncertainty) -->
  <line x1="700" y1="210" x2="750" y2="210" stroke="#FFFFFF" stroke-width="3" marker-end="url(#arrowheadWhite)" stroke-dasharray="5,5" opacity="0.7"/>
  <text x="730" y="235" font-size="12" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" opacity="0.7">
    UNCERTAIN
  </text>
  
  <!-- Contract status boxes -->
  <g>
    <!-- Box 1 -->
    <rect x="50" y="310" width="280" height="80" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.7"/>
    <text x="60" y="335" font-size="13" fill="#C8102E" font-family="Arial, sans-serif" font-weight="bold">
      Contract Expiring
    </text>
    <text x="60" y="358" font-size="11" fill="#FFFFFF" font-family="Arial, sans-serif" opacity="0.8">
      Players with expiring contracts
    </text>
    <text x="60" y="378" font-size="11" fill="#FFFFFF" font-family="Arial, sans-serif" opacity="0.8">
      under review for renewal
    </text>
  </g>
  
  <g>
    <!-- Box 2 -->
    <rect x="470" y="310" width="280" height="80" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.7"/>
    <text x="480" y="335" font-size="13" fill="#F6EB61" font-family="Arial, sans-serif" font-weight="bold">
      Transfer Talk
    </text>
    <text x="480" y="358" font-size="11" fill="#FFFFFF" font-family="Arial, sans-serif" opacity="0.8">
      Potential departures linked
    </text>
    <text x="480" y="378" font-size="11" fill="#FFFFFF" font-family="Arial, sans-serif" opacity="0.8">
      to other clubs
    </text>
  </g>
  
  <!-- Decorative sketch marks -->
  <path d="M 200 120 Q 220 110 240 120" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.4"/>
  <path d="M 560 120 Q 580 110 600 120" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.4"/>
  
  <!-- LFC Badge accent -->
  <circle cx="400" cy="270" r="3" fill="#C8102E"/>
  <circle cx="400" cy="270" r="8" fill="none" stroke="#C8102E" stroke-width="1" opacity="0.5"/>
</svg>