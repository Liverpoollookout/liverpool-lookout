<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Sketch texture overlay -->
  <defs>
    <filter id="roughen">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5"/>
    </filter>
  </defs>
  
  <!-- Stadium lights suggestion -->
  <circle cx="150" cy="80" r="30" fill="#F6EB61" opacity="0.3"/>
  <circle cx="650" cy="90" r="35" fill="#F6EB61" opacity="0.2"/>
  
  <!-- Sketched Anfield pitch outline -->
  <rect x="100" y="120" width="600" height="260" fill="none" stroke="#2d5016" stroke-width="3" opacity="0.6"/>
  <line x1="400" y1="120" x2="400" y2="380" stroke="#2d5016" stroke-width="2" opacity="0.5"/>
  <circle cx="400" cy="250" r="50" fill="none" stroke="#2d5016" stroke-width="2" opacity="0.5"/>
  <circle cx="400" cy="250" r="3" fill="#2d5016" opacity="0.6"/>
  
  <!-- Penalty areas sketch -->
  <rect x="100" y="200" width="80" height="100" fill="none" stroke="#2d5016" stroke-width="1.5" opacity="0.4"/>
  <rect x="620" y="200" width="80" height="100" fill="none" stroke="#2d5016" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Legendary Player - Kenny Dalglish inspired figure -->
  <!-- Head -->
  <circle cx="280" cy="160" r="25" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Hair sketch -->
  <path d="M 260 145 Q 260 130 280 130 Q 300 130 300 145" fill="none" stroke="#C8102E" stroke-width="2"/>
  
  <!-- Body/Shirt -->
  <ellipse cx="280" cy="210" rx="35" ry="50" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Liverpool shirt details -->
  <line x1="280" y1="170" x2="280" y2="250" stroke="#C8102E" stroke-width="2"/>
  <circle cx="280" cy="180" r="8" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Left arm -->
  <path d="M 250 200 L 200 240" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="195" cy="245" r="8" fill="none" stroke="#C8102E" stroke-width="2"/>
  
  <!-- Right arm holding ball -->
  <path d="M 310 200 L 360 180" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="365" cy="175" r="12" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="365" cy="175" r="9" fill="none" stroke="#C8102E" stroke-width="1.5"/>
  
  <!-- Left leg -->
  <path d="M 260 260 L 250 330" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="240" y="330" width="20" height="15" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Right leg -->
  <path d="M 300 260 L 310 330" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="300" y="330" width="20" height="15" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Motion lines around figure -->
  <path d="M 220 210 L 180 200" stroke="#F6EB61" stroke-width="1.5" opacity="0.7" stroke-dasharray="5,5"/>
  <path d="M 340 185 L 380 160" stroke="#F6EB61" stroke-width="1.5" opacity="0.7" stroke-dasharray="5,5"/>
  
  <!-- Iconic moment - goal scoring action -->
  <path d="M 100 250 L 130 240 L 150 255" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.8"/>
  <text x="155" y="265" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F6EB61" opacity="0.9">GOAL</text>
  
  <!-- Player name label -->
  <rect x="160" y="360" width="240" height="40" fill="#C8102E" opacity="0.8" rx="5"/>
  <text x="280" y="387" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">KENNY DALGLISH</text>
  
  <!-- Historical period indicator -->
  <text x="650" y="400" font-family="Arial, sans-serif" font-size="14" fill="#F6EB61" opacity="0.7" text-anchor="end">1977 - 1990</text>
  
  <!-- Decorative Liver bird silhouette hint -->
  <path d="M 720 50 Q 740 40 750 60 Q 745 70 730 75 Q 720 72 720 60 Z" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
</svg>