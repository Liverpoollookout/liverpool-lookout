<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative pitch lines -->
  <line x1="0" y1="210" x2="800" y2="210" stroke="#F6EB61" stroke-width="2" opacity="0.3" stroke-dasharray="10,10"/>
  <circle cx="400" cy="210" r="60" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.2"/>
  
  <!-- Left side - Departing player silhouette -->
  <g id="player-leaving">
    <!-- Head -->
    <circle cx="150" cy="100" r="25" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    
    <!-- Body in Liverpool kit -->
    <rect x="125" y="130" width="50" height="60" fill="#C8102E" opacity="0.7" rx="5"/>
    <line x1="150" y1="130" x2="150" y2="190" stroke="#FFFFFF" stroke-width="1.5"/>
    
    <!-- Arms -->
    <line x1="125" y1="145" x2="80" y2="120" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    <line x1="175" y1="145" x2="220" y2="120" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Legs -->
    <line x1="135" y1="190" x2="130" y2="260" stroke="#0a1628" stroke-width="3" stroke-linecap="round"/>
    <line x1="165" y1="190" x2="170" y2="260" stroke="#0a1628" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Arrow pointing left - EXIT -->
  <defs>
    <marker id="arrowLeft" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10" fill="none" stroke="#F6EB61" stroke-width="2" stroke-linecap="round"/>
    </marker>
    <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="#F6EB61" stroke-width="2" stroke-linecap="round"/>
    </marker>
  </defs>
  
  <!-- Exit arrow -->
  <line x1="260" y1="150" x2="120" y2="150" stroke="#F6EB61" stroke-width="3" marker-end="url(#arrowLeft)" stroke-dasharray="8,6" opacity="0.8"/>
  <text x="180" y="135" font-size="14" fill="#F6EB61" font-weight="bold" text-anchor="middle" opacity="0.9">OUTGOING</text>
  
  <!-- Center - Question mark representing uncertainty -->
  <circle cx="400" cy="150" r="35" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.6"/>
  <text x="400" y="170" font-size="48" fill="#FFFFFF" font-weight="bold" text-anchor="middle" opacity="0.5">?</text>
  
  <!-- Right side - Uncertain player -->
  <g id="player-uncertain">
    <!-- Head -->
    <circle cx="650" cy="100" r="25" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    
    <!-- Body in Liverpool kit -->
    <rect x="625" y="130" width="50" height="60" fill="#C8102E" opacity="0.5" rx="5"/>
    <line x1="650" y1="130" x2="650" y2="190" stroke="#FFFFFF" stroke-width="1.5"/>
    
    <!-- Arms questioning pose -->
    <line x1="625" y1="145" x2="575" y2="120" stroke="#C8102E" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="675" y1="145" x2="725" y2="120" stroke="#C8102E" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Legs -->
    <line x1="635" y1="190" x2="630" y2="260" stroke="#0a1628" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="665" y1="190" x2="670" y2="260" stroke="#0a1628" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Uncertain arrow -->
  <path d="M 540 150 Q 550 140 560 150" stroke="#F6EB61" stroke-width="2.5" fill="none" stroke-dasharray="5,5" opacity="0.7"/>
  <path d="M 740 150 Q 750 140 760 150" stroke="#F6EB61" stroke-width="2.5" fill="none" stroke-dasharray="5,5" opacity="0.7"/>
  
  <!-- Title section -->
  <text x="400" y="320" font-size="28" fill="#FFFFFF" font-weight="bold" text-anchor="middle" letter-spacing="1">TRANSFER RUMOURS</text>
  <text x="400" y="355" font-size="18" fill="#F6EB61" font-weight="bold" text-anchor="middle">Contract Situations &amp; Potential Departures</text>
  
  <!-- Decorative corner accents -->
  <line x1="30" y1="30" x2="70" y2="30" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
  <line x1="30" y1="30" x2="30" y2="70" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
  
  <line x1="770" y1="390" x2="730" y2="390" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
  <line x1="770" y1="390" x2="770" y2="350" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
  
  <!-- Liverpool FC badge circle outline -->
  <circle cx="400" cy="210" r="8" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.4"/>
</svg>