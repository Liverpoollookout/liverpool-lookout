<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch outline -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none">
    <rect x="80" y="40" width="640" height="340" stroke-width="2.5"/>
    <!-- Center line -->
    <line x1="400" y1="40" x2="400" y2="380"/>
    <!-- Center circle -->
    <circle cx="400" cy="210" r="50" stroke-width="2"/>
    <!-- Center spot -->
    <circle cx="400" cy="210" r="3" fill="#FFFFFF"/>
    <!-- Left box -->
    <rect x="80" y="120" width="100" height="180" stroke-width="2"/>
    <!-- Left goal area -->
    <rect x="80" y="160" width="40" height="100" stroke-width="2"/>
    <!-- Right box -->
    <rect x="620" y="120" width="100" height="180" stroke-width="2"/>
    <!-- Right goal area -->
    <rect x="680" y="160" width="40" height="100" stroke-width="2"/>
  </g>
  
  <!-- Player 1 - Left side (sketched figure) -->
  <g>
    <!-- Head -->
    <circle cx="200" cy="150" r="15" fill="none" stroke="#C8102E" stroke-width="2"/>
    <!-- Body -->
    <line x1="200" y1="165" x2="200" y2="220" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Arms -->
    <line x1="200" y1="175" x2="170" y2="160" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="200" y1="175" x2="230" y2="160" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Legs -->
    <line x1="200" y1="220" x2="185" y2="270" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="200" y1="220" x2="215" y2="270" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Jersey number background -->
    <rect x="195" y="190" width="10" height="12" fill="#C8102E"/>
  </g>
  
  <!-- Player 2 - Center (sketched figure) -->
  <g>
    <!-- Head -->
    <circle cx="400" cy="120" r="15" fill="none" stroke="#C8102E" stroke-width="2"/>
    <!-- Body -->
    <line x1="400" y1="135" x2="400" y2="190" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Arms -->
    <line x1="400" y1="145" x2="370" y2="130" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="400" y1="145" x2="430" y2="130" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Legs -->
    <line x1="400" y1="190" x2="385" y2="240" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="400" y1="190" x2="415" y2="240" stroke="#C8102E" stroke-width="2.5"/>
  </g>
  
  <!-- Player 3 - Right side (sketched figure) -->
  <g>
    <!-- Head -->
    <circle cx="600" cy="170" r="15" fill="none" stroke="#C8102E" stroke-width="2"/>
    <!-- Body -->
    <line x1="600" y1="185" x2="600" y2="240" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Arms -->
    <line x1="600" y1="195" x2="570" y2="180" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="600" y1="195" x2="630" y2="180" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Legs -->
    <line x1="600" y1="240" x2="585" y2="290" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="600" y1="240" x2="615" y2="290" stroke="#C8102E" stroke-width="2.5"/>
  </g>
  
  <!-- Tactical arrows showing movement/positioning -->
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#C8102E"/>
    </marker>
    <marker id="arrowgold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <!-- Movement arrows -->
  <line x1="200" y1="270" x2="200" y2="310" stroke="#F6EB61" stroke-width="2" marker-end="url(#arrowgold)" stroke-dasharray="4,2"/>
  <line x1="400" y1="240" x2="400" y2="300" stroke="#F6EB61" stroke-width="2" marker-end="url(#arrowgold)" stroke-dasharray="4,2"/>
  <line x1="600" y1="290" x2="600" y2="330" stroke="#F6EB61" stroke-width="2" marker-end="url(#arrowgold)" stroke-dasharray="4,2"/>
  
  <!-- Title text area background -->
  <rect x="50" y="350" width="700" height="50" fill="none" stroke="#F6EB61" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Main title -->
  <text x="400" y="375" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#C8102E" text-anchor="middle">MATCH REPORT</text>
  
  <!-- Subtitle - Slot's Tactical Setup -->
  <text x="400" y="395" font-family="Arial, sans-serif" font-size="12" fill="#F6EB61" text-anchor="middle">Slot's Formation | Player Ratings | Key Moments</text>
  
  <!-- Corner accents -->
  <circle cx="75" cy="35" r="8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="725" cy="35" r="8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="75" cy="385" r="8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="725" cy="385" r="8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
</svg>