<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Title -->
  <text x="400" y="35" font-size="28" font-weight="bold" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">MATCH PREVIEW</text>
  
  <!-- Football Pitch -->
  <rect x="50" y="70" width="700" height="280" fill="#1a3a2a" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Pitch Lines -->
  <line x1="400" y1="70" x2="400" y2="350" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="400" cy="210" r="35" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="400" cy="210" r="3" fill="#FFFFFF"/>
  
  <!-- Penalty Areas -->
  <rect x="50" y="130" width="120" height="160" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <rect x="630" y="130" width="120" height="160" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Goal Areas -->
  <rect x="50" y="160" width="50" height="100" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <rect x="700" y="160" width="50" height="100" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Liverpool Formation (Left side) - Red -->
  <!-- Goalkeeper -->
  <circle cx="90" cy="210" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="90" y="235" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">GK</text>
  
  <!-- Defenders (4-3-3) -->
  <circle cx="180" cy="130" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="180" cy="210" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="180" cy="290" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="250" cy="170" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="250" cy="250" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Midfielders -->
  <circle cx="320" cy="100" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="320" cy="210" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="320" cy="320" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Forwards -->
  <circle cx="380" cy="140" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="380" cy="210" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="380" cy="280" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Connecting lines between players (formation) -->
  <line x1="90" y1="210" x2="180" y2="210" stroke="#C8102E" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="130" x2="250" y2="170" stroke="#C8102E" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="290" x2="250" y2="250" stroke="#C8102E" stroke-width="1" opacity="0.5"/>
  <line x1="250" y1="170" x2="320" y2="100" stroke="#C8102E" stroke-width="1" opacity="0.5"/>
  <line x1="320" y1="210" x2="380" y2="210" stroke="#C8102E" stroke-width="1" opacity="0.5"/>
  
  <!-- Opposition Formation (Right side) - Navy/White outline -->
  <!-- Goalkeeper -->
  <circle cx="710" cy="210" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Defenders -->
  <circle cx="620" cy="130" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="620" cy="210" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="620" cy="290" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="550" cy="170" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="550" cy="250" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Opposition Midfielders -->
  <circle cx="480" cy="100" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="480" cy="210" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="480" cy="320" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Opposition Forwards -->
  <circle cx="420" cy="140" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="420" cy="210" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="420" cy="280" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Key Battle Indicators -->
  <path d="M 350 140 L 420 140" stroke="#F6EB61" stroke-width="2" stroke-dasharray="3,3"/>
  <path d="M 350 210 L 420 210" stroke="#F6EB61" stroke-width="2" stroke-dasharray="3,3"/>
  <path d="M 350 280 L 420 280" stroke="#F6EB61" stroke-width="2" stroke-dasharray="3,3"/>
  
  <!-- Key Players Labels -->
  <text x="320" y="365" font-size="12" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">LIVERPOOL</text>
  <text x="480" y="365" font-size="12" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">OPPOSITION</text>
  
  <!-- Formation Labels -->
  <text x="150" y="60" font-size="14" fill="#C8102E" font-family="Arial, sans-serif" font-weight="bold">4-3-3</text>
  <text x="650" y="60" font-size="14" fill="#FFFFFF" font-family="Arial, sans-serif" font-weight="bold">4-3-3</text>
  
  <!-- Decorative corner elements -->
  <path d="M 60 85 L 60 75 L 70 75" stroke="#F6EB61" stroke-width="2" fill="none"/>
  <path d="M 740 85 L 740 75 L 730 75" stroke="#F6EB61" stroke-width="2" fill="none"/>
  <path d="M 60 335 L 60 345 L 70 345" stroke="#F6EB61" stroke-width="2" fill="none"/>
  <path d="M 740 335 L 740 345 L 730 345" stroke="#F6EB61" stroke-width="2" fill="none"/>
</svg>