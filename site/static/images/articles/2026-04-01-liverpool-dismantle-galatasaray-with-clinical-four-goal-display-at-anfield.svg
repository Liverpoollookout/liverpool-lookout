<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Football pitch outline -->
  <rect x="80" y="60" width="640" height="300" fill="none" stroke="#2d5a3d" stroke-width="2"/>
  
  <!-- Pitch center line -->
  <line x1="400" y1="60" x2="400" y2="360" stroke="#2d5a3d" stroke-width="2"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="45" fill="none" stroke="#2d5a3d" stroke-width="2"/>
  
  <!-- Center spot -->
  <circle cx="400" cy="210" r="3" fill="#2d5a3d"/>
  
  <!-- Goal areas -->
  <rect x="80" y="140" width="80" height="140" fill="none" stroke="#2d5a3d" stroke-width="1.5"/>
  <rect x="640" y="140" width="80" height="140" fill="none" stroke="#2d5a3d" stroke-width="1.5"/>
  
  <!-- Penalty areas -->
  <rect x="80" y="110" width="120" height="200" fill="none" stroke="#2d5a3d" stroke-width="1.5"/>
  <rect x="600" y="110" width="120" height="200" fill="none" stroke="#2d5a3d" stroke-width="1.5"/>
  
  <!-- Goal lines -->
  <line x1="80" y1="60" x2="80" y2="360" stroke="#2d5a3d" stroke-width="2"/>
  <line x1="720" y1="60" x2="720" y2="360" stroke="#2d5a3d" stroke-width="2"/>
  
  <!-- Player formation - stylized sketched players in Liverpool red -->
  <!-- Back line (4 players) -->
  <g stroke="#C8102E" stroke-width="2" fill="none">
    <!-- Left back -->
    <circle cx="150" cy="150" r="12"/>
    <line x1="150" y1="162" x2="140" y2="200"/>
    <line x1="150" y1="162" x2="160" y2="200"/>
    <line x1="150" y1="162" x2="145" y2="240"/>
    <line x1="150" y1="162" x2="155" y2="240"/>
    
    <!-- Left center back -->
    <circle cx="250" cy="130" r="12" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="250" y1="142" x2="240" y2="180"/>
    <line x1="250" y1="142" x2="260" y2="180"/>
    <line x1="250" y1="142" x2="245" y2="220"/>
    <line x1="250" y1="142" x2="255" y2="220"/>
    
    <!-- Right center back -->
    <circle cx="550" cy="130" r="12" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="550" y1="142" x2="540" y2="180"/>
    <line x1="550" y1="142" x2="560" y2="180"/>
    <line x1="550" y1="142" x2="545" y2="220"/>
    <line x1="550" y1="142" x2="555" y2="220"/>
    
    <!-- Right back -->
    <circle cx="650" cy="150" r="12"/>
    <line x1="650" y1="162" x2="640" y2="200"/>
    <line x1="650" y1="162" x2="660" y2="200"/>
    <line x1="650" y1="162" x2="645" y2="240"/>
    <line x1="650" y1="162" x2="655" y2="240"/>
  </g>
  
  <!-- Midfield line (3 players) -->
  <g stroke="#C8102E" stroke-width="2" fill="none">
    <!-- Left mid -->
    <circle cx="220" cy="260" r="11"/>
    <line x1="220" y1="271" x2="210" y2="310"/>
    <line x1="220" y1="271" x2="230" y2="310"/>
    <line x1="220" y1="271" x2="215" y2="340"/>
    <line x1="220" y1="271" x2="225" y2="340"/>
    
    <!-- Center mid -->
    <circle cx="400" cy="280" r="11" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="400" y1="291" x2="390" y2="330"/>
    <line x1="400" y1="291" x2="410" y2="330"/>
    <line x1="400" y1="291" x2="395" y2="350"/>
    <line x1="400" y1="291" x2="405" y2="350"/>
    
    <!-- Right mid -->
    <circle cx="580" cy="260" r="11"/>
    <line x1="580" y1="271" x2="570" y2="310"/>
    <line x1="580" y1="271" x2="590" y2="310"/>
    <line x1="580" y1="271" x2="575" y2="340"/>
    <line x1="580" y1="271" x2="585" y2="340"/>
  </g>
  
  <!-- Forward (1 player) -->
  <g stroke="#C8102E" stroke-width="2" fill="none">
    <circle cx="400" cy="70" r="12" stroke="#C8102E" stroke-width="3"/>
    <line x1="400" y1="82" x2="390" y2="120"/>
    <line x1="400" y1="82" x2="410" y2="120"/>
    <line x1="400" y1="82" x2="395" y2="150"/>
    <line x1="400" y1="82" x2="405" y2="150"/>
  </g>
  
  <!-- Tactical arrows showing movement -->
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <!-- Forward movement arrow -->
  <path d="M 400 85 Q 410 100 405 140" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowred)" stroke-dasharray="4,2"/>
  
  <!-- Midfield pass arrow -->
  <path d="M 320 280 L 380 260" stroke="#F6EB61" stroke-width="1.5" fill="none" marker-end="url(#arrowred)" opacity="0.7" stroke-dasharray="3,2"/>
  
  <!-- Title and text -->
  <text x="400" y="395" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#C8102E" text-anchor="middle">MATCH ANALYSIS</text>
  
  <!-- Slot tactical label -->
  <text x="50" y="30" font-family="Arial, sans-serif" font-size="13" fill="#F6EB61" font-weight="bold">SLOT'S 4-3-1-2</text>
  
  <!-- Key moments badges -->
  <circle cx="720" cy="80" r="18" fill="#C8102E" opacity="0.8"/>
  <text x="720" y="87" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">KEY</text>
  
  <circle cx="720" cy="130" r="18" fill="#C8102E" opacity="0.8"/>
  <text x="720" y="137" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">45'</text>
  
  <circle cx="720" cy="180" r="18" fill="#C8102E" opacity="0.8"/>
  <text x="720" y="187" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">90'</text>
  
  <!-- Decorative corner elements -->
  <line x1="20" y1="20" x2="60" y2="20" stroke="#F6EB61" stroke-width="2" opacity="0.5"/>
  <line x1="20" y1="20" x2="20" y2="60" stroke="#F6EB61" stroke-width="2" opacity="0.5"/>
  
  <line x1="780" y1="400" x2="740" y2="400" stroke="#F6EB61" stroke-width="2" opacity="0.5"/>
  <line x1="780" y1="400" x2="780" y2="360" stroke="#F6EB61" stroke-width="2" opacity="0.5"/>
</svg>