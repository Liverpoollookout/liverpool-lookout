<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Title -->
  <text x="400" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#F6EB61" font-family="Arial, sans-serif">MATCH PREVIEW</text>
  
  <!-- Pitch outline -->
  <rect x="50" y="70" width="700" height="320" fill="none" stroke="#2d5a3d" stroke-width="3"/>
  
  <!-- Center line -->
  <line x1="400" y1="70" x2="400" y2="390" stroke="#2d5a3d" stroke-width="2"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="230" r="40" fill="none" stroke="#2d5a3d" stroke-width="2"/>
  
  <!-- Center spot -->
  <circle cx="400" cy="230" r="4" fill="#2d5a3d"/>
  
  <!-- Goal areas left -->
  <rect x="50" y="150" width="80" height="160" fill="none" stroke="#2d5a3d" stroke-width="2"/>
  <rect x="50" y="180" width="50" height="100" fill="none" stroke="#2d5a3d" stroke-width="2"/>
  
  <!-- Goal areas right -->
  <rect x="670" y="150" width="80" height="160" fill="none" stroke="#2d5a3d" stroke-width="2"/>
  <rect x="700" y="180" width="50" height="100" fill="none" stroke="#2d5a3d" stroke-width="2"/>
  
  <!-- Liverpool Formation - Left side (4-3-3) -->
  <g id="liverpool-formation">
    <!-- Goalkeeper -->
    <circle cx="80" cy="230" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <text x="80" y="235" font-size="10" font-weight="bold" text-anchor="middle" fill="#FFFFFF" font-family="Arial">GK</text>
    
    <!-- Defenders (4) -->
    <circle cx="180" cy="120" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <text x="180" y="125" font-size="9" text-anchor="middle" fill="#FFFFFF" font-family="Arial">1</text>
    
    <circle cx="180" cy="180" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <text x="180" y="185" font-size="9" text-anchor="middle" fill="#FFFFFF" font-family="Arial">2</text>
    
    <circle cx="180" cy="280" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <text x="180" y="285" font-size="9" text-anchor="middle" fill="#FFFFFF" font-family="Arial">3</text>
    
    <circle cx="180" cy="340" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <text x="180" y="345" font-size="9" text-anchor="middle" fill="#FFFFFF" font-family="Arial">4</text>
    
    <!-- Midfielders (3) -->
    <circle cx="310" cy="110" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <text x="310" y="115" font-size="9" text-anchor="middle" fill="#FFFFFF" font-family="Arial">5</text>
    
    <circle cx="310" cy="230" r="14" fill="#C8102E" stroke="#F6EB61" stroke-width="2.5"/>
    <text x="310" y="236" font-size="9" font-weight="bold" text-anchor="middle" fill="#FFFFFF" font-family="Arial">★</text>
    
    <circle cx="310" cy="350" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <text x="310" y="355" font-size="9" text-anchor="middle" fill="#FFFFFF" font-family="Arial">6</text>
    
    <!-- Forwards (3) -->
    <circle cx="500" cy="100" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <text x="500" y="105" font-size="9" text-anchor="middle" fill="#FFFFFF" font-family="Arial">7</text>
    
    <circle cx="500" cy="230" r="14" fill="#C8102E" stroke="#F6EB61" stroke-width="2.5"/>
    <text x="500" y="236" font-size="9" font-weight="bold" text-anchor="middle" fill="#FFFFFF" font-family="Arial">★</text>
    
    <circle cx="500" cy="360" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    <text x="500" y="365" font-size="9" text-anchor="middle" fill="#FFFFFF" font-family="Arial">9</text>
  </g>
  
  <!-- Opposition Formation - Right side (4-2-3-1) -->
  <g id="opposition-formation" opacity="0.6">
    <!-- Goalkeeper -->
    <circle cx="720" cy="230" r="12" fill="#FFFFFF" stroke="#0a1628" stroke-width="2"/>
    <text x="720" y="235" font-size="10" font-weight="bold" text-anchor="middle" fill="#0a1628" font-family="Arial">GK</text>
    
    <!-- Defenders -->
    <circle cx="620" cy="120" r="11" fill="#FFFFFF" stroke="#0a1628" stroke-width="2"/>
    <circle cx="620" cy="180" r="11" fill="#FFFFFF" stroke="#0a1628" stroke-width="2"/>
    <circle cx="620" cy="280" r="11" fill="#FFFFFF" stroke="#0a1628" stroke-width="2"/>
    <circle cx="620" cy="340" r="11" fill="#FFFFFF" stroke="#0a1628" stroke-width="2"/>
    
    <!-- Midfielders -->
    <circle cx="490" cy="160" r="11" fill="#FFFFFF" stroke="#0a1628" stroke-width="2"/>
    <circle cx="490" cy="300" r="11" fill="#FFFFFF" stroke="#0a1628" stroke-width="2"/>
    <circle cx="550" cy="100" r="10" fill="#FFFFFF" stroke="#0a1628" stroke-width="2"/>
    <circle cx="550" cy="230" r="10" fill="#FFFFFF" stroke="#0a1628" stroke-width="2"/>
    <circle cx="550" cy="360" r="10" fill="#FFFFFF" stroke="#0a1628" stroke-width="2"/>
    
    <!-- Forward -->
    <circle cx="650" cy="230" r="11" fill="#FFFFFF" stroke="#0a1628" stroke-width="2"/>
  </g>
  
  <!-- Key player battle indicators -->
  <line x1="330" y1="230" x2="480" y2="230" stroke="#F6EB61" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Formation labels -->
  <text x="310" y="410" font-size="13" font-weight="bold" text-anchor="middle" fill="#C8102E" font-family="Arial">LIVERPOOL 4-3-3</text>
  <text x="550" y="410" font-size="13" font-weight="bold" text-anchor="center" fill="#FFFFFF" font-family="Arial">OPP. 4-2-3-1</text>
  
  <!-- Legend -->
  <text x="60" y="405" font-size="11" fill="#F6EB61" font-family="Arial">★ = Key Battle</text>
</svg>