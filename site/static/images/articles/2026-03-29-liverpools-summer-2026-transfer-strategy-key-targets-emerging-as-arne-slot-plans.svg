<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <defs>
    <style>
      .sketch-stroke { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .sketch-fill { fill-opacity: 0.8; }
      .text-main { font-family: Arial, sans-serif; font-size: 32px; font-weight: bold; }
      .text-sub { font-family: Arial, sans-serif; font-size: 14px; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative corner elements -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  <circle cx="750" cy="370" r="40" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  
  <!-- Left player silhouette (outgoing/target) -->
  <g opacity="0.6">
    <!-- Head -->
    <circle cx="150" cy="90" r="20" fill="none" stroke="#FFFFFF" stroke-width="2" class="sketch-stroke"/>
    <!-- Body -->
    <rect x="135" y="115" width="30" height="50" fill="none" stroke="#FFFFFF" stroke-width="2" class="sketch-stroke"/>
    <!-- Left arm -->
    <line x1="135" y1="130" x2="100" y2="120" stroke="#FFFFFF" stroke-width="2" class="sketch-stroke"/>
    <!-- Right arm -->
    <line x1="165" y1="130" x2="200" y2="120" stroke="#FFFFFF" stroke-width="2" class="sketch-stroke"/>
    <!-- Left leg -->
    <line x1="145" y1="165" x2="140" y2="220" stroke="#FFFFFF" stroke-width="2" class="sketch-stroke"/>
    <!-- Right leg -->
    <line x1="155" y1="165" x2="160" y2="220" stroke="#FFFFFF" stroke-width="2" class="sketch-stroke"/>
  </g>
  
  <!-- Central player silhouette (in Liverpool kit) -->
  <g>
    <!-- Head -->
    <circle cx="400" cy="80" r="22" fill="#C8102E" class="sketch-fill"/>
    <circle cx="400" cy="80" r="22" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Body (red Liverpool kit) -->
    <rect x="383" y="108" width="34" height="55" fill="#C8102E" class="sketch-fill"/>
    <rect x="383" y="108" width="34" height="55" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Chest detail -->
    <line x1="400" y1="108" x2="400" y2="163" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Left arm -->
    <line x1="383" y1="125" x2="330" y2="115" stroke="#C8102E" stroke-width="10"/>
    <line x1="330" y1="115" x2="320" y2="140" stroke="#C8102E" stroke-width="8"/>
    
    <!-- Right arm -->
    <line x1="417" y1="125" x2="470" y2="115" stroke="#C8102E" stroke-width="10"/>
    <line x1="470" y1="115" x2="480" y2="140" stroke="#C8102E" stroke-width="8"/>
    
    <!-- Left leg -->
    <line x1="390" y1="163" x2="385" y2="235" stroke="#C8102E" stroke-width="9"/>
    <line x1="385" y1="235" x2="385" y2="260" stroke="#FFFFFF" stroke-width="7"/>
    
    <!-- Right leg -->
    <line x1="410" y1="163" x2="415" y2="235" stroke="#C8102E" stroke-width="9"/>
    <line x1="415" y1="235" x2="415" y2="260" stroke="#FFFFFF" stroke-width="7"/>
    
    <!-- Boot details -->
    <circle cx="385" cy="262" r="5" fill="#000000"/>
    <circle cx="415" cy="262" r="5" fill="#000000"/>
  </g>
  
  <!-- Directional arrows showing transfer flow -->
  <!-- Arrow from left to center -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <path d="M 220 150 Q 310 180 375 140" fill="none" stroke="#F6EB61" stroke-width="3" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  
  <!-- Arrow pointing right (to Anfield) -->
  <path d="M 440 140 Q 530 180 620 150" fill="none" stroke="#C8102E" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Right side - Anfield silhouette indicator -->
  <g opacity="0.5">
    <!-- Stadium posts -->
    <line x1="680" y1="120" x2="680" y2="200" stroke="#FFFFFF" stroke-width="3" class="sketch-stroke"/>
    <line x1="720" y1="120" x2="720" y2="200" stroke="#FFFFFF" stroke-width="3" class="sketch-stroke"/>
    <!-- Crossbar -->
    <line x1="675" y1="120" x2="725" y2="120" stroke="#FFFFFF" stroke-width="2" class="sketch-stroke"/>
    <!-- Net -->
    <line x1="675" y1="125" x2="680" y2="195" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <line x1="725" y1="125" x2="720" y2="195" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <line x1="685" y1="160" x2="715" y2="160" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Text labels -->
  <text x="400" y="310" text-anchor="middle" class="text-main" fill="#C8102E">
    TRANSFER TARGETS
  </text>
  
  <text x="400" y="340" text-anchor="middle" class="text-sub" fill="#F6EB61">
    ANFIELD BOUND
  </text>
  
  <!-- Fee indicator -->
  <rect x="320" y="355" width="160" height="40" fill="none" stroke="#F6EB61" stroke-width="2" class="sketch-stroke"/>
  <text x="400" y="375" text-anchor="middle" class="text-sub" fill="#FFFFFF">
    FEE ESTIMATES
  </text>
  
  <!-- Decorative dashes -->
  <line x1="100" y1="30" x2="200" y2="30" stroke="#C8102E" stroke-width="2" opacity="0.4"/>
  <line x1="600" y1="390" x2="700" y2="390" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
</svg>