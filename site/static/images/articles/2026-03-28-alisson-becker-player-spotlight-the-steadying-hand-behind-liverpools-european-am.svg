<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative corner elements -->
  <circle cx="50" cy="50" r="30" fill="#F6EB61" opacity="0.1"/>
  <circle cx="750" cy="370" r="40" fill="#C8102E" opacity="0.1"/>
  
  <!-- Sketch lines for texture -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
  
  <!-- Head -->
  <circle cx="400" cy="120" r="45" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <circle cx="400" cy="120" r="43" fill="none" stroke="#C8102E" stroke-width="1" opacity="0.5"/>
  
  <!-- Hair sketch lines -->
  <path d="M 360 95 Q 355 75 375 70" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.7"/>
  <path d="M 425 70 Q 445 75 440 95" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Face features -->
  <circle cx="385" cy="115" r="3" fill="#FFFFFF"/>
  <circle cx="415" cy="115" r="3" fill="#FFFFFF"/>
  <path d="M 390 130 Q 400 135 410 130" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Goalkeeper gloves sketch -->
  <ellipse cx="340" cy="200" rx="25" ry="35" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <ellipse cx="460" cy="200" rx="25" ry="35" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- Glove details -->
  <path d="M 330 190 L 325 210 M 335 185 L 335 220" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  <path d="M 470 190 L 475 210 M 465 185 L 465 220" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  
  <!-- Body - Liverpool kit -->
  <path d="M 370 165 L 350 270 L 370 280 L 430 280 L 450 270 L 430 165 Z" fill="#C8102E" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Kit details -->
  <line x1="400" y1="165" x2="400" y2="280" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <line x1="370" y1="210" x2="430" y2="210" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  
  <!-- Arms -->
  <path d="M 370 180 L 340 200" fill="none" stroke="#C8102E" stroke-width="3"/>
  <path d="M 430 180 L 460 200" fill="none" stroke="#C8102E" stroke-width="3"/>
  
  <!-- Legs -->
  <line x1="380" y1="280" x2="375" y2="340" stroke="#0a1628" stroke-width="3" opacity="0.8"/>
  <line x1="420" y1="280" x2="425" y2="340" stroke="#0a1628" stroke-width="3" opacity="0.8"/>
  
  <!-- Feet -->
  <ellipse cx="375" cy="345" rx="12" ry="8" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <ellipse cx="425" cy="345" rx="12" ry="8" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  
  <!-- Accent lines for sketch effect -->
  <path d="M 360 250 Q 370 260 380 250" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
  <path d="M 420 250 Q 430 260 440 250" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
  
  <!-- Name label with background -->
  <rect x="200" y="360" width="400" height="45" fill="none" stroke="#F6EB61" stroke-width="2"/>
  <rect x="205" y="365" width="390" height="35" fill="#0a1628" opacity="0.8"/>
  
  <!-- Name text -->
  <text x="400" y="395" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#C8102E" text-anchor="middle">ALISSON BECKER</text>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="350" r="4" fill="#F6EB61" opacity="0.6"/>
  <circle cx="650" cy="350" r="4" fill="#F6EB61" opacity="0.6"/>
  
  <!-- Additional sketch elements for goalkeeper -->
  <path d="M 310 220 L 305 240" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.6"/>
  <path d="M 490 220 L 495 240" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.6"/>
</svg>