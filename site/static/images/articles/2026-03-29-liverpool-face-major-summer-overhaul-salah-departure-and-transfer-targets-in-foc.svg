<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Title text -->
  <text x="400" y="40" font-size="32" font-weight="bold" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">TRANSFER RUMOURS</text>
  
  <!-- Left arrow coming in -->
  <g stroke="#C8102E" stroke-width="3" fill="none">
    <line x1="50" y1="180" x2="150" y2="180" stroke-linecap="round"/>
    <polygon points="150,180 135,170 140,180 135,190" fill="#C8102E"/>
  </g>
  
  <!-- Central player silhouette in Liverpool red -->
  <g>
    <!-- Head -->
    <circle cx="400" cy="140" r="25" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    
    <!-- Body - simplified sketchy style -->
    <path d="M 400 165 Q 395 200 390 240" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 400 165 Q 405 200 410 240" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Torso -->
    <ellipse cx="400" cy="190" rx="28" ry="35" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    
    <!-- Arms -->
    <path d="M 375 180 Q 330 160 310 140" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 425 180 Q 470 160 490 140" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Legs -->
    <path d="M 390 240 L 385 310" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 410 240 L 415 310" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Liverpool badge on chest -->
    <circle cx="400" cy="190" r="12" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <text x="400" y="195" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">LFC</text>
  </g>
  
  <!-- Right arrow going out -->
  <g stroke="#FFFFFF" stroke-width="3" fill="none">
    <line x1="650" y1="180" x2="750" y2="180" stroke-linecap="round"/>
    <polygon points="750,180 735,170 740,180 735,190" fill="#FFFFFF"/>
  </g>
  
  <!-- Question marks for uncertainty -->
  <text x="150" y="110" font-size="24" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">?</text>
  <text x="650" y="110" font-size="24" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">?</text>
  
  <!-- Contract status lines -->
  <g stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-dasharray="5,5" opacity="0.7">
    <line x1="200" y1="280" x2="600" y2="280"/>
  </g>
  
  <!-- Status labels -->
  <text x="100" y="330" font-size="14" fill="#FFFFFF" font-family="Arial, sans-serif">Contract Status</text>
  <text x="100" y="350" font-size="12" fill="#F6EB61" font-family="Arial, sans-serif">Contract Situation</text>
  <text x="100" y="365" font-size="12" fill="#F6EB61" font-family="Arial, sans-serif">Departure Rumours</text>
  
  <!-- Decorative corner elements -->
  <rect x="20" y="20" width="3" height="30" fill="#C8102E"/>
  <rect x="20" y="20" width="30" height="3" fill="#C8102E"/>
  
  <rect x="760" y="20" width="3" height="30" fill="#C8102E"/>
  <rect x="747" y="20" width="30" height="3" fill="#C8102E"/>
  
  <rect x="20" y="390" width="3" height="30" fill="#FFFFFF"/>
  <rect x="20" y="397" width="30" height="3" fill="#FFFFFF"/>
  
  <rect x="760" y="390" width="3" height="30" fill="#FFFFFF"/>
  <rect x="747" y="397" width="30" height="3" fill="#FFFFFF"/>
</svg>