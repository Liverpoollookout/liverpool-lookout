<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative corner lines -->
  <line x1="20" y1="20" x2="80" y2="20" stroke="#F6EB61" stroke-width="2"/>
  <line x1="20" y1="20" x2="20" y2="80" stroke="#F6EB61" stroke-width="2"/>
  <line x1="780" y1="20" x2="720" y2="20" stroke="#F6EB61" stroke-width="2"/>
  <line x1="780" y1="20" x2="780" y2="80" stroke="#F6EB61" stroke-width="2"/>
  
  <!-- Pitch outline -->
  <rect x="40" y="50" width="720" height="320" fill="none" stroke="#C8102E" stroke-width="3" stroke-dasharray="5,5"/>
  
  <!-- Center line -->
  <line x1="400" y1="50" x2="400" y2="370" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="45" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
  
