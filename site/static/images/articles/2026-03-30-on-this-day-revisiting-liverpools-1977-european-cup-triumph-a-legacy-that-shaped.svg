<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Anfield stadium curved stand suggestion -->
  <path d="M 50 100 Q 100 80 150 100 L 150 350 Q 100 360 50 350 Z" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  
  <!-- Historic moment: Kenny Dalglish - The Greatest -->
  <!-- Sketch-style player figure in Liverpool red -->
  
  <!-- Head -->
  <circle cx="250" cy="100" r="25" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Hair detail -->
  <path d="M 230 85 Q 250 70 270 85" fill="none" stroke="#C8102E" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Facial features -->
  <circle cx="242" cy="98" r="2.5" fill="#C8102E"/>
  <circle cx="258" cy="98" r="2.5" fill="#C8102E"/>
  <path d="M 245 108 Q 250 112 255 108" fill="none" stroke="#C8102E" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Body/Liverpool Kit -->
  <path d="M 250 125 L 220 180" fill="none" stroke="#C8102E" stroke-width="6" stroke-linecap="round"/>
  <path d="M 250 125 L 280 180" fill="none" stroke="#C8102E" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Red shirt detail -->
  <ellipse cx="250" cy="145" rx="20" ry="25" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
  
  <!-- Liverpool emblem suggestion (simplified) -->
  <path d="M 245 140 L 255 140 M 250 135 L 250 145" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Arms with ball control -->
  <path d="M 230 135 L 195 160" fill="none" stroke="#C8102E" stroke-width="5" stroke-linecap="round"/>
  <path d="M 270 135 L 305 165" fill="none" stroke="#C8102E" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Legs in motion -->
  <path d="M 225 180 L 210 250" fill="none" stroke="#C8102E" stroke-width="5" stroke-linecap="round"/>
  <path d="M 275 180 L 290 250" fill="none" stroke="#C8102E" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Football at feet -->
  <circle cx="305" cy="165" r="8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M 303 161 L 307 169" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Dynamic motion lines -->
  <path d="M 180 170 L 150 165" stroke="#F6EB61" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M 320 185 L 355 180" stroke="#F6EB61" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Anfield pitch elements -->
  <line x1="450" y1="80" x2="750" y2="80" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <line x1="450" y1="340" x2="750" y2="340" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  
  <!-- Center circle suggestion -->
  <circle cx="600" cy="210" r="35" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Penalty spot -->
  <circle cx="680" cy="210" r="2" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- Goalkeeper area -->
  <rect x="720" y="160" width="30" height="100" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  
  <!-- Title text -->
  <text x="400" y="400" font-size="28" font-weight="bold" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif">KENNY DALGLISH</text>
  
  <!-- Subtitle detail -->
  <text x="400" y="385" font-size="12" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" opacity="0.8">Anfield Legend</text>
  
  <!-- Decorative gold accent lines -->
  <line x1="80" y1="30" x2="180" y2="30" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
  <line x1="620" y1="30" x2="720" y2="30" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
</svg>