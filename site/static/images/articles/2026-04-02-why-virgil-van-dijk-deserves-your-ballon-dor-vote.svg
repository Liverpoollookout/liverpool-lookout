<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative corner elements -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  <circle cx="750" cy="370" r="30" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  
  <!-- Main sketch frame -->
  <rect x="80" y="40" width="640" height="340" fill="none" stroke="#F6EB61" stroke-width="3" stroke-dasharray="8,4" opacity="0.6"/>
  
  <!-- Liverpool FC crest-inspired circle -->
  <circle cx="200" cy="130" r="60" fill="none" stroke="#C8102E" stroke-width="3"/>
  <circle cx="200" cy="130" r="55" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Shaded bird/flame element inside circle -->
  <path d="M 185 100 Q 180 115 185 130 Q 190 140 200 142 Q 210 140 215 130 Q 220 115 215 100 Z" fill="#C8102E" opacity="0.8"/>
  <path d="M 190 115 Q 192 125 200 128 Q 208 125 210 115" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Opinion/thought bubble elements -->
  <circle cx="500" cy="100" r="25" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.8"/>
  <circle cx="460" cy="130" r="18" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  <circle cx="525" cy="145" r="15" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  
  <!-- Connected thought lines -->
  <path d="M 475 125 L 490 120" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  <path d="M 510 135 L 520 140" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Sketched text element representing discussion -->
  <g opacity="0.7">
    <line x1="320" y1="240" x2="500" y2="240" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="320" y1="255" x2="480" y2="255" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="320" y1="270" x2="460" y2="270" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>
  
  <!-- Dynamic arrows representing opinion flow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <path d="M 250 180 Q 300 200 350 190" fill="none" stroke="#F6EB61" stroke-width="2.5" marker-end="url(#arrowhead)" opacity="0.8"/>
  <path d="M 350 280 Q 300 260 250 270" fill="none" stroke="#C8102E" stroke-width="2.5" marker-end="url(#arrowhead)" opacity="0.8"/>
  
  <!-- Sketchy lines for drawing effect -->
  <line x1="100" y1="50" x2="110" y2="48" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <line x1="690" y1="370" x2="700" y2="368" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <line x1="680" y1="60" x2="695" y2="65" stroke="#C8102E" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Main text - OPINION -->
  <text x="400" y="330" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#C8102E" text-anchor="middle" letter-spacing="2">OPINION</text>
  
  <!-- Liverpool FC subtext -->
  <text x="400" y="365" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="#FFFFFF" text-anchor="middle" opacity="0.9">Liverpool FC</text>
  
  <!-- Small decorative footer line -->
  <line x1="250" y1="385" x2="550" y2="385" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
</svg>