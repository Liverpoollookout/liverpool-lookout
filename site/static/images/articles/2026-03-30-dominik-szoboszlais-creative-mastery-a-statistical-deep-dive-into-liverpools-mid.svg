<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch outline -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none">
    <rect x="80" y="60" width="640" height="300" stroke-width="3"/>
    <!-- Center line -->
    <line x1="400" y1="60" x2="400" y2="360"/>
    <!-- Center circle -->
    <circle cx="400" cy="210" r="40" stroke-width="2"/>
    <!-- Center spot -->
    <circle cx="400" cy="210" r="3" fill="#FFFFFF"/>
    <!-- Left penalty area -->
    <rect x="80" y="130" width="80" height="160"/>
    <!-- Right penalty area -->
    <rect x="640" y="130" width="80" height="160"/>
    <!-- Left goal area -->
    <rect x="80" y="160" width="40" height="100"/>
    <!-- Right goal area -->
    <rect x="680" y="160" width="40" height="100"/>
    <!-- Left goal -->
    <circle cx="80" cy="210" r="8" fill="none" stroke="#F6EB61" stroke-width="2"/>
    <!-- Right goal -->
    <circle cx="720" cy="210" r="8" fill="none" stroke="#F6EB61" stroke-width="2"/>
  </g>
  
  <!-- Statistical visualization - bar charts on pitch -->
  <!-- Left side stats bars -->
  <g stroke="#C8102E" stroke-width="3" fill="none">
    <line x1="150" y1="100" x2="220" y2="100" stroke-width="4" stroke="#C8102E"/>
    <line x1="150" y1="130" x2="210" y2="130" stroke-width="4" stroke="#C8102E"/>
    <line x1="150" y1="160" x2="200" y2="160" stroke-width="4" stroke="#C8102E"/>
    <line x1="150" y1="190" x2="230" y2="190" stroke-width="4" stroke="#C8102E"/>
    <line x1="150" y1="220" x2="215" y2="220" stroke-width="4" stroke="#C8102E"/>
  </g>
  
  <!-- Right side stats bars -->
  <g stroke="#C8102E" stroke-width="3" fill="none">
    <line x1="580" y1="100" x2="650" y2="100" stroke-width="4" stroke="#C8102E"/>
    <line x1="590" y1="130" x2="650" y2="130" stroke-width="4" stroke="#C8102E"/>
    <line x1="570" y1="160" x2="650" y2="160" stroke-width="4" stroke="#C8102E"/>
    <line x1="595" y1="190" x2="650" y2="190" stroke-width="4" stroke="#C8102E"/>
    <line x1="575" y1="220" x2="650" y2="220" stroke-width="4" stroke="#C8102E"/>
  </g>
  
  <!-- Data points as circles -->
  <g fill="#C8102E" opacity="0.8">
    <circle cx="220" cy="100" r="5"/>
    <circle cx="210" cy="130" r="5"/>
    <circle cx="200" cy="160" r="5"/>
    <circle cx="230" cy="190" r="5"/>
    <circle cx="215" cy="220" r="5"/>
    <circle cx="650" cy="100" r="5"/>
    <circle cx="650" cy="130" r="5"/>
    <circle cx="650" cy="160" r="5"/>
    <circle cx="650" cy="190" r="5"/>
    <circle cx="650" cy="220" r="5"/>
  </g>
  
  <!-- Connecting trend line -->
  <polyline points="220,100 210,130 200,160 230,190 215,220" stroke="#F6EB61" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Player silhouette sketches -->
  <!-- Left player (simple sketch) -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none">
    <circle cx="130" cy="280" r="12"/>
    <line x1="130" y1="292" x2="130" y2="320"/>
    <line x1="130" y1="300" x2="110" y2="315"/>
    <line x1="130" y1="300" x2="150" y2="315"/>
    <line x1="130" y1="320" x2="115" y2="345"/>
    <line x1="130" y1="320" x2="145" y2="345"/>
  </g>
  
  <!-- Right player (simple sketch) -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none">
    <circle cx="670" cy="280" r="12"/>
    <line x1="670" y1="292" x2="670" y2="320"/>
    <line x1="670" y1="300" x2="650" y2="315"/>
    <line x1="670" y1="300" x2="690" y2="315"/>
    <line x1="670" y1="320" x2="655" y2="345"/>
    <line x1="670" y1="320" x2="685" y2="345"/>
  </g>
  
  <!-- Title text -->
  <text x="400" y="400" font-size="24" font-weight="bold" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif">
    PLAYER STATISTICS
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="420" font-size="14" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">
    Deep Dive Analysis
  </text>
  
  <!-- Decorative corners with LFC red -->
  <g stroke="#C8102E" stroke-width="2" fill="none">
    <line x1="50" y1="20" x2="90" y2="20"/>
    <line x1="50" y1="20" x2="50" y2="50"/>
    <line x1="750" y1="20" x2="710" y2="20"/>
    <line x1="750" y1="20" x2="750" y2="50"/>
  </g>
</svg>