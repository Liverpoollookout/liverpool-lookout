<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch diagram background -->
  <rect x="80" y="40" width="640" height="340" fill="#1a4d2e" stroke="#FFFFFF" stroke-width="2" opacity="0.9"/>
  
  <!-- Center line -->
  <line x1="400" y1="40" x2="400" y2="380" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="60" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Center spot -->
  <circle cx="400" cy="210" r="4" fill="#FFFFFF"/>
  
  <!-- Goal areas -->
  <rect x="80" y="130" width="100" height="160" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <rect x="620" y="130" width="100" height="160" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Penalty areas -->
  <rect x="80" y="100" width="130" height="220" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <rect x="590" y="100" width="130" height="220" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Corner arcs -->
  <path d="M 80 40 A 20 20 0 0 1 100 40" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <path d="M 720 40 A 20 20 0 0 0 700 40" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <path d="M 80 380 A 20 20 0 0 0 100 380" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <path d="M 720 380 A 20 20 0 0 1 700 380" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Player positions - Liverpool red (#C8102E) -->
  <!-- Goalkeeper -->
  <circle cx="110" cy="210" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="110" y="230" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial">GK</text>
  
  <!-- Defenders -->
  <circle cx="200" cy="140" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="200" cy="210" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="200" cy="280" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="280" cy="175" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Midfielders -->
  <circle cx="350" cy="120" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="350" cy="210" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="350" cy="300" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Attackers -->
  <circle cx="480" cy="160" r="11" fill="#C8102E" stroke="#F6EB61" stroke-width="2"/>
  <circle cx="480" cy="260" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="550" cy="210" r="11" fill="#C8102E" stroke="#F6EB61" stroke-width="2"/>
  
  <!-- Tactical arrows showing movement -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <!-- Key movement arrows -->
  <path d="M 350 120 Q 420 140 480 160" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.8" stroke-dasharray="4,4"/>
  <path d="M 550 210 Q 600 210 650 210" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.8" stroke-dasharray="4,4"/>
  
  <!-- Title section -->
  <rect x="50" y="360" width="700" height="50" fill="#C8102E" rx="5"/>
  <text x="400" y="380" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="Arial">MATCH ANALYSIS</text>
  <text x="400" y="403" font-size="12" fill="#F6EB61" text-anchor="middle" font-family="Arial">Slot Tactical Setup • Key Moments • Player Ratings</text>
  
  <!-- Decorative Liverpool badge elements -->
  <circle cx="100" cy="360" r="8" fill="#F6EB61"/>
  <circle cx="700" cy="360" r="8" fill="#F6EB61"/>
  
  <!-- Sketch effect lines -->
  <line x1="85" y1="35" x2="95" y2="33" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <line x1="705" y1="42" x2="720" y2="38" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <line x1="90" y1="375" x2="100" y2="378" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
</svg>