<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative corner elements -->
  <circle cx="50" cy="50" r="30" fill="#F6EB61" opacity="0.1"/>
  <circle cx="750" cy="370" r="40" fill="#C8102E" opacity="0.1"/>
  
  <!-- Sketch-style player figure -->
  <!-- Head -->
  <circle cx="400" cy="110" r="35" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.9"/>
  
  <!-- Hair sketch detail -->
  <path d="M 380 80 Q 400 70 420 80" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
  <path d="M 375 85 Q 400 75 425 85" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Facial features sketch -->
  <circle cx="390" cy="105" r="3" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="410" cy="105" r="3" fill="#FFFFFF" opacity="0.8"/>
  <path d="M 385 120 Q 400 125 415 120" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
  
  <!-- Neck -->
  <line x1="395" y1="145" x2="395" y2="165" stroke="#FFFFFF" stroke-width="2.5" opacity="0.8"/>
  <line x1="405" y1="145" x2="405" y2="165" stroke="#FFFFFF" stroke-width="2.5" opacity="0.8"/>
  
  <!-- Liverpool red kit - torso -->
  <path d="M 360 165 L 360 280 Q 360 295 375 295 L 425 295 Q 440 295 440 280 L 440 165 Z" 
        fill="#C8102E" stroke="#FFFFFF" stroke-width="2.5" opacity="0.95"/>
  
  <!-- Kit details - white trim -->
  <line x1="360" y1="165" x2="440" y2="165" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
  <circle cx="400" cy="195" r="8" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Arms -->
  <!-- Left arm -->
  <path d="M 360 175 Q 320 180 300 220" fill="none" stroke="#FFFFFF" stroke-width="3.5" opacity="0.85"/>
  <circle cx="300" cy="220" r="6" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- Right arm -->
  <path d="M 440 175 Q 480 180 500 220" fill="none" stroke="#FFFFFF" stroke-width="3.5" opacity="0.85"/>
  <circle cx="500" cy="220" r="6" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- Legs -->
  <!-- Left leg -->
  <path d="M 380 295 L 375 370" fill="none" stroke="#FFFFFF" stroke-width="3.5" opacity="0.85"/>
  <rect x="365" y="370" width="20" height="35" fill="#C8102E" stroke="#FFFFFF" stroke-width="2" opacity="0.9"/>
  
  <!-- Right leg -->
  <path d="M 420 295 L 425 370" fill="none" stroke="#FFFFFF" stroke-width="3.5" opacity="0.85"/>
  <rect x="415" y="370" width="20" height="35" fill="#C8102E" stroke="#FFFFFF" stroke-width="2" opacity="0.9"/>
  
  <!-- Accent lines for depth -->
  <path d="M 365 200 Q 370 240 375 280" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  <path d="M 435 200 Q 430 240 425 280" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Player name text -->
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        text-anchor="middle" fill="#F6EB61" opacity="0.95">GAKPO</text>
  
  <!-- Decorative lines -->
  <line x1="280" y1="355" x2="340" y2="355" stroke="#C8102E" stroke-width="2" opacity="0.7"/>
  <line x1="460" y1="355" x2="520" y2="355" stroke="#C8102E" stroke-width="2" opacity="0.7"/>
  
  <!-- Subtle background pattern -->
  <g opacity="0.05">
    <circle cx="150" cy="150" r="60" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <circle cx="650" cy="250" r="80" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  </g>
</svg>