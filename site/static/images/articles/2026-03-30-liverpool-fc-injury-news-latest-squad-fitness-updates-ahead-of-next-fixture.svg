<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Sketch texture overlay -->
  <defs>
    <filter id="roughen">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5"/>
    </filter>
  </defs>
  
  <!-- Title text -->
  <text x="400" y="50" font-size="36" font-weight="bold" text-anchor="middle" fill="#F6EB61" font-family="Arial, sans-serif">
    Fitness Update
  </text>
  
  <!-- Horizontal divider line -->
  <line x1="150" y1="70" x2="650" y2="70" stroke="#C8102E" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Medical clipboard sketch -->
  <rect x="80" y="120" width="140" height="200" fill="none" stroke="#FFFFFF" stroke-width="2.5" rx="5"/>
  <rect x="85" y="125" width="130" height="15" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="95" cy="132" r="3" fill="#FFFFFF"/>
  <circle cx="205" cy="132" r="3" fill="#FFFFFF"/>
  
  <!-- Clipboard lines (status checks) -->
  <line x1="95" y1="160" x2="195" y2="160" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <line x1="95" y1="180" x2="195" y2="180" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <line x1="95" y1="200" x2="195" y2="200" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <line x1="95" y1="220" x2="195" y2="220" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <line x1="95" y1="240" x2="160" y2="240" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Checkmarks -->
  <g stroke="#F6EB61" stroke-width="2.5" fill="none">
    <polyline points="105,168 110,173 120,158"/>
    <polyline points="105,188 110,193 120,178"/>
    <polyline points="105,208 110,213 120,198"/>
  </g>
  
  <!-- Central Player Figure -->
  <!-- Head -->
  <circle cx="400" cy="150" r="28" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- Body in Liverpool Red Kit -->
  <ellipse cx="400" cy="210" rx="32" ry="45" fill="none" stroke="#C8102E" stroke-width="3"/>
  
  <!-- Arms -->
  <line x1="370" y1="190" x2="330" y2="210" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="430" y1="190" x2="470" y2="210" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Legs -->
  <line x1="385" y1="250" x2="380" y2="310" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="415" y1="250" x2="420" y2="310" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Boots -->
  <ellipse cx="380" cy="315" rx="8" ry="6" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <ellipse cx="420" cy="315" rx="8" ry="6" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Heart symbol on chest -->
  <path d="M 400 200 Q 410 185 420 190 Q 425 193 420 205 Q 400 220 400 220 Q 400 220 380 205 Q 375 193 380 190 Q 390 185 400 200" fill="#F6EB61" stroke="#C8102E" stroke-width="1.5"/>
  
  <!-- Status indicators on right -->
  <!-- Available Soon indicator -->
  <circle cx="550" cy="160" r="35" fill="none" stroke="#F6EB61" stroke-width="2.5"/>
  <text x="550" y="158" font-size="14" text-anchor="middle" fill="#F6EB61" font-weight="bold" font-family="Arial, sans-serif">NEXT</text>
  <text x="550" y="178" font-size="14" text-anchor="middle" fill="#F6EB61" font-weight="bold" font-family="Arial, sans-serif">FIXTURE</text>
  
  <!-- Recovery progress bars -->
  <text x="550" y="240" font-size="12" fill="#FFFFFF" font-family="Arial, sans-serif" font-weight="bold">Recovery Progress</text>
  
  <!-- Bar 1 -->
  <rect x="520" y="260" width="120" height="12" fill="none" stroke="#FFFFFF" stroke-width="1.5" rx="2"/>
  <rect x="520" y="260" width="90" height="12" fill="#C8102E" rx="2"/>
  
  <!-- Bar 2 -->
  <rect x="520" y="280" width="120" height="12" fill="none" stroke="#FFFFFF" stroke-width="1.5" rx="2"/>
  <rect x="520" y="280" width="108" height="12" fill="#F6EB61" rx="2"/>
  
  <!-- Bar 3 -->
  <rect x="520" y="300" width="120" height="12" fill="none" stroke="#FFFFFF" stroke-width="1.5" rx="2"/>
  <rect x="520" y="300" width="100" height="12" fill="#C8102E" rx="2"/>
  
  <!-- Decorative LFC Badge circle bottom left -->
  <circle cx="100" cy="380" r="25" fill="none" stroke="#F6EB61" stroke-width="2"/>
  <text x="100" y="385" font-size="11" text-anchor="middle" fill="#F6EB61" font-weight="bold" font-family="Arial, sans-serif">LFC</text>
  
  <!-- Sketch effect lines -->
  <line x1="250" y1="140" x2="280" y2="135" stroke="#FFFFFF" stroke-width="1" opacity="0.3" stroke-dasharray="3,2"/>
  <line x1="520" y1="145" x2="495" y2="140" stroke="#F6EB61" stroke-width="1" opacity="0.4" stroke-dasharray="3,2"/>
  <line x1="300" y1="360" x2="320" y2="355" stroke="#C8102E" stroke-width="1" opacity="0.3" stroke-dasharray="3,2"/>
</svg>