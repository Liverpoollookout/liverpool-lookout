<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch outline - sketched style -->
  <rect x="60" y="40" width="680" height="340" fill="none" stroke="#2d5016" stroke-width="2" stroke-dasharray="4,2"/>
  
  <!-- Center line -->
  <line x1="400" y1="40" x2="400" y2="380" stroke="#2d5016" stroke-width="1.5" stroke-dasharray="3,2"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="45" fill="none" stroke="#2d5016" stroke-width="1.5" stroke-dasharray="3,2"/>
  
  <!-- Center spot -->
  <circle cx="400" cy="210" r="3" fill="#2d5016"/>
  
  <!-- Penalty areas sketched -->
  <rect x="60" y="120" width="100" height="180" fill="none" stroke="#2d5016" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="740" y="120" width="-100" height="180" fill="none" stroke="#2d5016" stroke-width="1.5" stroke-dasharray="3,2"/>
  
  <!-- Goal areas sketched -->
  <rect x="60" y="155" width="50" height="110" fill="none" stroke="#2d5016" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="740" y="155" width="-50" height="110" fill="none" stroke="#2d5016" stroke-width="1.5" stroke-dasharray="3,2"/>
  
  <!-- Player positions - Liverpool formation (4-3-3) with red accents -->
  <!-- Goalkeeper -->
  <circle cx="80" cy="210" r="12" fill="#C8102E" opacity="0.8"/>
  <circle cx="80" cy="210" r="12" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="80" y="238" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">GK</text>
  
  <!-- Defenders -->
  <circle cx="180" cy="130" r="11" fill="#C8102E" opacity="0.8"/>
  <circle cx="180" cy="130" r="11" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <circle cx="180" cy="290" r="11" fill="#C8102E" opacity="0.8"/>
  <circle cx="180" cy="290" r="11" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <circle cx="240" cy="100" r="11" fill="#C8102E" opacity="0.8"/>
  <circle cx="240" cy="100" r="11" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <circle cx="240" cy="320" r="11" fill="#C8102E" opacity="0.8"/>
  <circle cx="240" cy="320" r="11" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Midfielders -->
  <circle cx="310" cy="180" r="11" fill="#C8102E" opacity="0.8"/>
  <circle cx="310" cy="180" r="11" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <circle cx="310" cy="240" r="11" fill="#C8102E" opacity="0.8"/>
  <circle cx="310" cy="240" r="11" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <circle cx="380" cy="210" r="11" fill="#C8102E" opacity="0.8"/>
  <circle cx="380" cy="210" r="11" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Forwards -->
  <circle cx="550" cy="160" r="12" fill="#C8102E" opacity="0.9"/>
  <circle cx="550" cy="160" r="12" fill="none" stroke="#F6EB61" stroke-width="2"/>
  <text x="550" y="185" font-size="10" fill="#F6EB61" text-anchor="middle" font-weight="bold">★</text>
  
  <circle cx="550" cy="210" r="12" fill="#C8102E" opacity="0.9"/>
  <circle cx="550" cy="210" r="12" fill="none" stroke="#F6EB61" stroke-width="2"/>
  <text x="550" y="235" font-size="10" fill="#F6EB61" text-anchor="middle" font-weight="bold">★</text>
  
  <circle cx="550" cy="260" r="12" fill="#C8102E" opacity="0.9"/>
  <circle cx="550" cy="260" r="12" fill="none" stroke="#F6EB61" stroke-width="2"/>
  <text x="550" y="285" font-size="10" fill="#F6EB61" text-anchor="middle" font-weight="bold">★</text>
  
  <!-- Movement arrows - tactical flow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61" opacity="0.7"/>
    </marker>
  </defs>
  
  <path d="M 240 100 Q 320 140 450 160" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.6"/>
  <path d="M 240 320 Q 320 270 450 260" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.6"/>
  <path d="M 310 210 Q 380 210 500 210" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.6"/>
  
  <!-- Title section -->
  <rect x="50" y="360" width="700" height="50" fill="rgba(200, 16, 46, 0.1)" stroke="#C8102E" stroke-width="2" stroke-dasharray="5,3"/>
  
  <text x="400" y="380" font-size="18" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="sans-serif">MATCH REPORT</text>
  <text x="400" y="401" font-size="11" fill="#F6EB61" text-anchor="middle" font-family="sans-serif">Slot Tactical Analysis • Key Moments • Player Ratings</text>
  
  <!-- Decorative sketched elements -->
  <circle cx="750" cy="60" r="8" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.5"/>
  <circle cx="755" cy="65" r="3" fill="#C8102E" opacity="0.5"/>
  
  <path d="M 30 50 Q 35 55 30 60" stroke="#F6EB61" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M 30 80 Q 35 85 30 90" stroke="#F6EB61" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>