<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <defs>
    <style>
      .sketch-stroke { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .sketch-fill { stroke-linecap: round; stroke-linejoin: round; }
      .text-main { font-family: Arial, sans-serif; font-weight: bold; letter-spacing: 2px; }
      .text-sub { font-family: Arial, sans-serif; font-size: 14px; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative corner elements -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  <circle cx="750" cy="370" r="25" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  
  <!-- Left side: Target player silhouette -->
  <g id="player-target">
    <!-- Head -->
    <circle cx="120" cy="90" r="22" fill="none" stroke="#C8102E" stroke-width="2.5" class="sketch-stroke"/>
    
    <!-- Body/Shirt (Liverpool red) -->
    <path d="M 100 115 L 90 160 L 110 175 L 130 175 L 150 160 L 140 115 Z" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5" class="sketch-fill"/>
    
    <!-- Arms -->
    <path d="M 100 125 L 70 145" stroke="#C8102E" stroke-width="2.5" class="sketch-stroke"/>
    <path d="M 140 125 L 170 145" stroke="#C8102E" stroke-width="2.5" class="sketch-stroke"/>
    
    <!-- Legs -->
    <path d="M 110 175 L 105 220" stroke="#FFFFFF" stroke-width="2.5" class="sketch-stroke"/>
    <path d="M 130 175 L 135 220" stroke="#FFFFFF" stroke-width="2.5" class="sketch-stroke"/>
    
    <!-- Ball at feet -->
    <circle cx="120" cy="235" r="8" fill="none" stroke="#F6EB61" stroke-width="2" class="sketch-stroke"/>
  </g>
  
  <!-- Directional arrow pointing to Anfield -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FFFFFF"/>
    </marker>
  </defs>
  
  <!-- Main transfer arrow -->
  <path d="M 210 150 Q 350 100 480 150" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-dasharray="8,5" marker-end="url(#arrowhead)" class="sketch-stroke"/>
  
  <!-- Secondary arrows showing multiple targets -->
  <path d="M 210 200 Q 350 220 480 200" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowhead)" opacity="0.7" class="sketch-stroke"/>
  <path d="M 210 250 Q 350 280 480 260" fill="none" stroke="#F6EB61" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowhead)" opacity="0.6" class="sketch-stroke"/>
  
  <!-- Anfield representation (right side) -->
  <g id="anfield">
    <!-- Stadium outline -->
    <rect x="520" y="80" width="220" height="200" fill="none" stroke="#C8102E" stroke-width="2.5" class="sketch-stroke"/>
    
    <!-- Stadium sections (sketched) -->
    <line x1="545" y1="80" x2="545" y2="280" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="575" y1="80" x2="575" y2="280" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="610" y1="80" x2="610" y2="280" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="645" y1="80" x2="645" y2="280" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
    
    <!-- Pitch center -->
    <circle cx="630" cy="180" r="25" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.5" class="sketch-stroke"/>
    <line x1="630" y1="80" x2="630" y2="280" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Goal area sketches -->
    <rect x="530" y="160" width="15" height="40" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6" class="sketch-stroke"/>
    <rect x="725" y="160" width="15" height="40" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6" class="sketch-stroke"/>
  </g>
  
  <!-- Transfer fee indicators -->
  <g id="fee-tags">
    <!-- Fee tag 1 -->
    <rect x="300" y="280" width="120" height="40" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5" rx="5" class="sketch-fill"/>
    <text x="360" y="305" text-anchor="middle" fill="#FFFFFF" class="text-sub" font-weight="bold">€45-55M</text>
    
    <!-- Fee tag 2 -->
    <rect x="470" y="310" width="120" height="40" fill="#0a1628" stroke="#F6EB61" stroke-width="1.5" rx="5" class="sketch-fill"/>
    <text x="530" y="335" text-anchor="middle" fill="#F6EB61" class="text-sub" font-weight="bold">€60-70M</text>
    
    <!-- Fee tag 3 -->
    <rect x="300" y="340" width="120" height="40" fill="#0a1628" stroke="#C8102E" stroke-width="2" rx="5" class="sketch-fill"/>
    <text x="360" y="365" text-anchor="middle" fill="#C8102E" class="text-sub" font-weight="bold">€50-60M</text>
  </g>
  
  <!-- Title text -->
  <text x="400" y="30" text-anchor="middle" fill="#FFFFFF" font-size="28" class="text-main">TRANSFER TARGETS</text>
  
  <!-- Subtitle with Liverpool accent -->
  <text x="400" y="55" text-anchor="middle" fill="#F6EB61" font-size="16" class="text-sub">Anfield Bound</text>
  
  <!-- Decorative lines -->
  <line x1="100" y1="65" x2="700" y2="65" stroke="#C8102E" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="390" x2="700" y2="390" stroke="#F6EB61" stroke-width="1.5" opacity="0.4"/>
</svg>