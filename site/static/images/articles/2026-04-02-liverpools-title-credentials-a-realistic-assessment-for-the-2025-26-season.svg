<svg viewBox="0 0 800 420" class="article-svg" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .sketch-stroke { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .bold-text { font-family: Arial, sans-serif; font-weight: bold; letter-spacing: 2px; }
      .light-text { font-family: Arial, sans-serif; font-weight: normal; }
    </style>
  </defs>
  
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative sketch lines -->
  <path d="M 0 80 Q 200 60 400 80 T 800 80" class="sketch-stroke" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  <path d="M 0 340 Q 200 320 400 340 T 800 340" class="sketch-stroke" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  
  <!-- Large sketched thought bubble/opinion shape -->
  <ellipse cx="400" cy="180" rx="280" ry="140" class="sketch-stroke" stroke="#FFFFFF" stroke-width="3" opacity="0.6"/>
  <circle cx="330" cy="280" r="25" class="sketch-stroke" stroke="#FFFFFF" stroke-width="3" opacity="0.6"/>
  <circle cx="310" cy="310" r="15" class="sketch-stroke" stroke="#FFFFFF" stroke-width="3" opacity="0.6"/>
  
  <!-- Liverpool FC badge sketch -->
  <circle cx="650" cy="100" r="50" class="sketch-stroke" stroke="#C8102E" stroke-width="2.5"/>
  <circle cx="650" cy="100" r="45" class="sketch-stroke" stroke="#F6EB61" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Sketched Liver bird silhouette inside badge -->
  <path d="M 650 70 Q 665 65 670 80 Q 665 85 650 85 Q 635 85 630 80 Q 635 65 650 70" fill="#C8102E"/>
  <circle cx="648" cy="78" r="2" fill="#FFFFFF"/>
  <circle cx="652" cy="78" r="2" fill="#FFFFFF"/>
  <path d="M 645 88 L 640 95 M 655 88 L 660 95" class="sketch-stroke" stroke="#C8102E" stroke-width="1.5"/>
  
  <!-- Sketched pen marks for emphasis -->
  <line x1="250" y1="150" x2="280" y2="140" class="sketch-stroke" stroke="#C8102E" stroke-width="2" opacity="0.5"/>
  <line x1="520" y1="240" x2="550" y2="250" class="sketch-stroke" stroke="#F6EB61" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="200" x2="130" y2="190" class="sketch-stroke" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Sketched football elements -->
  <circle cx="200" cy="300" r="8" class="sketch-stroke" stroke="#C8102E" stroke-width="1.5"/>
  <line x1="200" y1="295" x2="200" y2="305" class="sketch-stroke" stroke="#C8102E" stroke-width="1"/>
  <line x1="195" y1="300" x2="205" y2="300" class="sketch-stroke" stroke="#C8102E" stroke-width="1"/>
  
  <!-- Title text - "OPINION" -->
  <text x="400" y="100" class="bold-text" font-size="52" fill="#C8102E" text-anchor="middle" letter-spacing="4">OPINION</text>
  
  <!-- Subtitle text -->
  <text x="400" y="230" class="light-text" font-size="28" fill="#FFFFFF" text-anchor="middle" opacity="0.9">LIVERPOOL FC</text>
  
  <!-- Decorative accent lines -->
  <line x1="200" y1="260" x2="600" y2="260" class="sketch-stroke" stroke="#F6EB61" stroke-width="2" opacity="0.5"/>
  <line x1="210" y1="270" x2="590" y2="270" class="sketch-stroke" stroke="#C8102E" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Corner sketch elements -->
  <path d="M 50 30 L 80 30 L 80 50 L 50 50 Z" class="sketch-stroke" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  <path d="M 720 370 L 750 370 L 750 390 L 720 390 Z" class="sketch-stroke" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  
  <!-- Blog post indicator marks -->
  <line x1="280" y1="350" x2="320" y2="350" class="sketch-stroke" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <line x1="280" y1="365" x2="380" y2="365" class="sketch-stroke" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
  <line x1="280" y1="380" x2="350" y2="380" class="sketch-stroke" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
</svg>