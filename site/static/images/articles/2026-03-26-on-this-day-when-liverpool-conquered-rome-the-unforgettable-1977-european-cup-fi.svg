<svg viewBox="0 0 800 420" class="article-svg" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Anfield stadium arch background sketch -->
  <circle cx="400" cy="200" r="180" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  <path d="M 250 250 Q 400 100 550 250" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.2" stroke-dasharray="5,5"/>
  
  <!-- Player figure - Kenny Dalglish in sketched style -->
  <!-- Head -->
  <circle cx="400" cy="120" r="25" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <circle cx="395" cy="115" r="3" fill="#C8102E"/>
  <circle cx="405" cy="115" r="3" fill="#C8102E"/>
  <path d="M 395 125 Q 400 128 405 125" fill="none" stroke="#C8102E" stroke-width="1.5"/>
  
  <!-- Body - Liverpool red kit -->
  <path d="M 400 145 L 400 220" stroke="#C8102E" stroke-width="3"/>
  <ellipse cx="400" cy="160" rx="22" ry="28" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Chest emblem circle -->
  <circle cx="400" cy="165" r="8" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Arms -->
  <path d="M 400 155 L 355 185" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 400 155 L 445 185" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Hands -->
  <circle cx="350" cy="190" r="6" fill="#C8102E"/>
  <circle cx="450" cy="190" r="6" fill="#C8102E"/>
  
  <!-- Legs -->
  <path d="M 395 220 L 385 280" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 405 220 L 415 280" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Feet -->
  <ellipse cx="385" cy="285" rx="8" ry="6" fill="none" stroke="#C8102E" stroke-width="2"/>
  <ellipse cx="415" cy="285" rx="8" ry="6" fill="none" stroke="#C8102E" stroke-width="2"/>
  
  <!-- Ball near feet -->
  <circle cx="400" cy="300" r="8" fill="none" stroke="#F6EB61" stroke-width="2.5"/>
  <path d="M 395 300 L 405 300 M 400 295 L 400 305" stroke="#F6EB61" stroke-width="1.5"/>
  
  <!-- Action lines around player -->
  <path d="M 320 150 L 280 140" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M 480 160 L 520 150" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M 460 230 L 500 250" stroke="#F6EB61" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  
  <!-- Decorative pitch lines -->
  <line x1="150" y1="350" x2="650" y2="350" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="330" x2="400" y2="370" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Title text -->
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#F6EB61" text-anchor="middle" letter-spacing="1">
    KENNY DALGLISH
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="405" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" opacity="0.8">
    King of Anfield
  </text>
  
  <!-- Corner accent elements -->
  <line x1="20" y1="20" x2="60" y2="20" stroke="#C8102E" stroke-width="2"/>
  <line x1="20" y1="20" x2="20" y2="60" stroke="#C8102E" stroke-width="2"/>
  <line x1="780" y1="20" x2="740" y2="20" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="780" y1="20" x2="780" y2="60" stroke="#FFFFFF" stroke-width="2"/>
</svg>