<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="20" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
  <circle cx="770" cy="390" r="20" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
  
  <!-- Football pitch outline -->
  <rect x="80" y="60" width="640" height="300" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.7"/>
  
  <!-- Pitch center line -->
  <line x1="400" y1="60" x2="400" y2="360" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="40" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  <circle cx="400" cy="210" r="3" fill="#F6EB61" opacity="0.7"/>
  
  <!-- Goal areas -->
  <rect x="80" y="120" width="80" height="180" fill="none" stroke="#F6EB61" stroke-width="1" opacity="0.4"/>
  <rect x="640" y="120" width="80" height="180" fill="none" stroke="#F6EB61" stroke-width="1" opacity="0.4"/>
  
  <!-- Liverpool formation - 4-3-3 Left side (Attack) -->
  <!-- Goalkeeper -->
  <circle cx="120" cy="210" r="12" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <circle cx="120" cy="210" r="8" fill="#C8102E" opacity="0.3"/>
  <text x="120" y="235" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">GK</text>
  
  <!-- Defenders -->
  <circle cx="200" cy="130" r="12" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="200" y="155" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">LB</text>
  
  <circle cx="200" cy="210" r="12" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="200" y="235" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">CB</text>
  
  <circle cx="200" cy="290" r="12" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="200" y="315" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">RB</text>
  
  <circle cx="240" cy="170" r="12" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="240" y="195" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">CB</text>
  
  <!-- Midfielders -->
  <circle cx="320" cy="110" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="320" y="135" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold">LM</text>
  
  <circle cx="320" cy="210" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="320" y="235" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold">CM</text>
  
  <circle cx="320" cy="310" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="320" y="335" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold">RM</text>
  
  <!-- Attackers -->
  <circle cx="420" cy="100" r="14" fill="none" stroke="#F6EB61" stroke-width="2.5"/>
  <text x="420" y="128" font-size="10" fill="#F6EB61" text-anchor="middle" font-weight="bold">FW</text>
  
  <circle cx="420" cy="210" r="14" fill="none" stroke="#F6EB61" stroke-width="2.5"/>
  <text x="420" y="238" font-size="10" fill="#F6EB61" text-anchor="middle" font-weight="bold">ST</text>
  
  <circle cx="420" cy="320" r="14" fill="none" stroke="#F6EB61" stroke-width="2.5"/>
  <text x="420" y="348" font-size="10" fill="#F6EB61" text-anchor="middle" font-weight="bold">FW</text>
  
  <!-- Opponent formation - Right side (simplified) -->
  <text x="680" y="100" font-size="12" fill="#FFFFFF" opacity="0.6" text-anchor="middle" font-weight="bold">OPPONENT</text>
  
  <circle cx="680" cy="210" r="12" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  
  <circle cx="600" cy="130" r="10" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  <circle cx="600" cy="210" r="10" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  <circle cx="600" cy="290" r="10" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  
  <circle cx="540" cy="170" r="10" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  <circle cx="540" cy="250" r="10" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Key battle indicators -->
  <line x1="330" y1="210" x2="530" y2="210" stroke="#F6EB61" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
  <text x="430" y="205" font-size="9" fill="#F6EB61" text-anchor="middle" opacity="0.8">MIDFIELD BATTLE</text>
  
  <!-- Title -->
  <text x="400" y="395" font-size="20" fill="#C8102E" text-anchor="middle" font-weight="bold" letter-spacing="1">MATCH PREVIEW</text>
  
  <!-- Decorative dashes -->
  <line x1="280" y1="405" x2="350" y2="405" stroke="#F6EB61" stroke-width="1.5" opacity="0.7"/>
  <line x1="450" y1="405" x2="520" y2="405" stroke="#F6EB61" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Sketch texture lines for drawing effect -->
  <line x1="100" y1="50" x2="120" y2="45" stroke="#C8102E" stroke-width="1" opacity="0.3"/>
  <line x1="700" y1="370" x2="720" y2="375" stroke="#C8102E" stroke-width="1" opacity="0.3"/>
  <line x1="750" y1="50" x2="770" y2="55" stroke="#FFFFFF" stroke-width="1" opacity="0.2"/>
  <line x1="60" y1="380" x2="40" y2="390" stroke="#FFFFFF" stroke-width="1" opacity="0.2"/>
</svg>