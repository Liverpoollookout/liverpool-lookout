<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative pitch lines -->
  <line x1="0" y1="210" x2="800" y2="210" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="210" r="60" fill="none" stroke="#F6EB61" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="210" r="3" fill="#F6EB61" opacity="0.3"/>
  
  <!-- Left directional arrow -->
  <g opacity="0.6">
    <path d="M 80 210 L 180 210" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
    <polygon points="180,210 165,200 170,210 165,220" fill="#FFFFFF"/>
  </g>
  
  <!-- Player silhouette with sketched style -->
  <g id="player">
    <!-- Head -->
    <circle cx="400" cy="90" r="25" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    
    <!-- Body in Liverpool red kit -->
    <rect x="380" y="120" width="40" height="60" fill="#C8102E" stroke="#C8102E" stroke-width="2" rx="3"/>
    
    <!-- Shirt stripes suggestion -->
    <line x1="390" y1="120" x2="390" y2="180" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
    <line x1="400" y1="120" x2="400" y2="180" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
    <line x1="410" y1="120" x2="410" y2="180" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Arms -->
    <line x1="380" y1="140" x2="320" y2="120" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    <line x1="420" y1="140" x2="480" y2="130" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Hands -->
    <circle cx="320" cy="120" r="8" fill="#C8102E" stroke="#C8102E" stroke-width="2"/>
    <circle cx="480" cy="130" r="8" fill="#C8102E" stroke="#C8102E" stroke-width="2"/>
    
    <!-- Legs -->
    <line x1="385" y1="180" x2="370" y2="280" stroke="#0a1628" stroke-width="3" stroke-linecap="round" stroke-dasharray="3,2"/>
    <line x1="415" y1="180" x2="430" y2="280" stroke="#0a1628" stroke-width="3" stroke-linecap="round" stroke-dasharray="3,2"/>
    
    <!-- Feet -->
    <ellipse cx="370" cy="285" rx="10" ry="8" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1.5"/>
    <ellipse cx="430" cy="285" rx="10" ry="8" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>
  
  <!-- Right directional arrow pointing to target -->
  <g opacity="0.6">
    <path d="M 520 210 L 620 210" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
    <polygon points="620,210 605,200 610,210 605,220" fill="#FFFFFF"/>
  </g>
  
  <!-- Target/goal indicator -->
  <g opacity="0.5">
    <circle cx="700" cy="210" r="35" fill="none" stroke="#F6EB61" stroke-width="2"/>
    <circle cx="700" cy="210" r="20" fill="none" stroke="#F6EB61" stroke-width="1.5"/>
    <path d="M 700 175 L 700 245 M 665 210 L 735 210" stroke="#F6EB61" stroke-width="1.5"/>
  </g>
  
  <!-- Title text -->
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#C8102E" text-anchor="middle" letter-spacing="1">
    TRANSFER TARGET
  </text>
  
  <!-- Fee estimate indicator -->
  <g>
    <rect x="50" y="320" width="200" height="60" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.6" rx="4"/>
    <text x="150" y="345" font-family="Arial, sans-serif" font-size="14" fill="#F6EB61" text-anchor="middle" opacity="0.8">
      Estimated Fee
    </text>
    <text x="150" y="365" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      TBD
    </text>
  </g>
  
  <!-- Link indicator -->
  <g>
    <rect x="550" y="320" width="200" height="60" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.6" rx="4"/>
    <text x="650" y="345" font-family="Arial, sans-serif" font-size="14" fill="#C8102E" text-anchor="middle" opacity="0.8">
      Anfield Link
    </text>
    <text x="650" y="365" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      STRONG
    </text>
  </g>
  
  <!-- Decorative corner elements -->
  <path d="M 20 20 L 50 20 L 50 50" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.4"/>
  <path d="M 780 20 L 750 20 L 750 50" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.4"/>
  <path d="M 20 400 L 50 400 L 50 370" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.4"/>
  <path d="M 780 400 L 750 400 L 750 370" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.4"/>
</svg>