<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Football pitch -->
  <rect x="80" y="40" width="640" height="340" fill="#1a4d2e" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Pitch markings -->
  <line x1="80" y1="210" x2="720" y2="210" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  <circle cx="400" cy="210" r="40" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  <circle cx="400" cy="210" r="3" fill="#FFFFFF"/>
  
  <!-- Left penalty area -->
  <rect x="80" y="110" width="80" height="200" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <!-- Right penalty area -->
  <rect x="640" y="110" width="80" height="200" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  
  <!-- Goal areas -->
  <rect x="80" y="155" width="40" height="110" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <rect x="680" y="155" width="40" height="110" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  
  <!-- Tactical formation dots - Liverpool players in red -->
  <!-- Formation: 4-3-3 -->
  <circle cx="150" cy="80" r="8" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="150" cy="210" r="8" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="150" cy="340" r="8" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="150" cy="145" r="8" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  
  <circle cx="280" cy="100" r="8" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="280" cy="210" r="8" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="280" cy="320" r="8" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  
  <circle cx="400" cy="120" r="8" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="400" cy="300" r="8" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  
  <circle cx="520" cy="90" r="8" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="520" cy="210" r="8" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="520" cy="330" r="8" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Opposition players in white -->
  <circle cx="650" cy="100" r="6" fill="#FFFFFF" stroke="#C8102E" stroke-width="1"/>
  <circle cx="650" cy="210" r="6" fill="#FFFFFF" stroke="#C8102E" stroke-width="1"/>
  <circle cx="650" cy="320" r="6" fill="#FFFFFF" stroke="#C8102E" stroke-width="1"/>
  
  <!-- Ball position -->
  <circle cx="450" cy="200" r="6" fill="#F6EB61" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Movement arrows showing tactical play -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <!-- Passing line -->
  <path d="M 520 210 Q 485 180 450 200" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.8"/>
  
  <!-- Forward movement -->
  <path d="M 450 200 Q 480 210 520 210" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.6"/>
  
  <!-- Title section -->
  <rect x="50" y="390" width="700" height="25" fill="#C8102E" opacity="0.9" rx="3"/>
  <text x="400" y="408" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Slot Tactical Formation - Match Analysis</text>
  
  <!-- Player ratings boxes -->
  <g>
    <!-- Rating badge 1 -->
    <circle cx="120" cy="30" r="15" fill="#F6EB61"/>
    <text x="120" y="37" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0a1628" text-anchor="middle">8.2</text>
    
    <!-- Rating badge 2 -->
    <circle cx="280" cy="30" r="15" fill="#F6EB61"/>
    <text x="280" y="37" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0a1628" text-anchor="middle">7.8</text>
    
    <!-- Rating badge 3 -->
    <circle cx="680" cy="30" r="15" fill="#F6EB61"/>
    <text x="680" y="37" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0a1628" text-anchor="middle">8.5</text>
  </g>
  
  <!-- Decorative elements -->
  <g opacity="0.3" stroke="#F6EB61" stroke-width="1" fill="none">
    <circle cx="100" cy="60" r="25"/>
    <circle cx="700" cy="70" r="30"/>
    <circle cx="750" cy="250" r="20"/>
  </g>
  
  <!-- Corner accent bars -->
  <rect x="0" y="0" width="100" height="3" fill="#C8102E"/>
  <rect x="0" y="0" width="3" height="100" fill="#C8102E"/>
  <rect x="700" y="0" width="100" height="3" fill="#C8102E"/>
  <rect x="797" y="0" width="3" height="100" fill="#C8102E"/>
</svg>