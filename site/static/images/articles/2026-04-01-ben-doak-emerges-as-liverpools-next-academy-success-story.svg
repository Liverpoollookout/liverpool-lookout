<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch outline -->
  <rect x="80" y="60" width="640" height="300" fill="none" stroke="#F6EB61" stroke-width="3" opacity="0.6"/>
  <line x1="400" y1="60" x2="400" y2="360" stroke="#F6EB61" stroke-width="2" opacity="0.5"/>
  <circle cx="400" cy="210" r="40" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.5"/>
  
  <!-- Player figure - sketched style -->
  <!-- Head -->
  <circle cx="320" cy="120" r="22" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Hair sketch lines -->
  <path d="M 302 105 Q 320 95 338 105" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.7"/>
  <path d="M 305 100 Q 320 90 335 100" fill="none" stroke="#C8102E" stroke-width="1" opacity="0.5"/>
  
  <!-- Face details -->
  <circle cx="312" cy="118" r="2.5" fill="#C8102E"/>
  <circle cx="328" cy="118" r="2.5" fill="#C8102E"/>
  <path d="M 315 128 Q 320 132 325 128" fill="none" stroke="#C8102E" stroke-width="1.5"/>
  
  <!-- Body - Liverpool kit -->
  <path d="M 305 142 L 305 200 L 335 200 L 335 142 Z" fill="#C8102E" opacity="0.8"/>
  
  <!-- White chest stripe -->
  <rect x="312" y="145" width="16" height="50" fill="#FFFFFF" opacity="0.7"/>
  
  <!-- Arms -->
  <line x1="305" y1="155" x2="275" y2="170" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
  <line x1="335" y1="155" x2="365" y2="175" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Hands -->
  <circle cx="275" cy="170" r="8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="365" cy="175" r="8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Legs -->
  <line x1="310" y1="200" x2="305" y2="260" stroke="#0a1628" stroke-width="3" stroke-linecap="round"/>
  <line x1="330" y1="200" x2="335" y2="260" stroke="#0a1628" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Boots -->
  <ellipse cx="305" cy="268" rx="8" ry="12" fill="#FFFFFF" opacity="0.9"/>
  <ellipse cx="335" cy="268" rx="8" ry="12" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Football at feet -->
  <circle cx="340" cy="275" r="10" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M 340 265 Q 345 275 340 285" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <path d="M 340 275 L 350 275" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Potential indicator - upward arrows -->
  <g opacity="0.8">
    <path d="M 420 180 L 420 140 M 415 150 L 420 140 L 425 150" fill="none" stroke="#F6EB61" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 460 200 L 460 155 M 455 170 L 460 155 L 465 170" fill="none" stroke="#F6EB61" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Stats boxes - sketched -->
  <!-- Box 1 -->
  <rect x="480" y="110" width="120" height="80" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
  <text x="490" y="135" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#F6EB61">PACE</text>
  <line x1="490" y1="140" x2="590" y2="140" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  <rect x="495" y="150" width="80" height="6" fill="none" stroke="#C8102E" stroke-width="1.5"/>
  <rect x="495" y="150" width="65" height="6" fill="#C8102E" opacity="0.7"/>
  
  <!-- Box 2 -->
  <rect x="480" y="210" width="120" height="80" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
  <text x="490" y="235" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#F6EB61">SKILL</text>
  <line x1="490" y1="240" x2="590" y2="240" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  <rect x="495" y="250" width="80" height="6" fill="none" stroke="#C8102E" stroke-width="1.5"/>
  <rect x="495" y="250" width="72" height="6" fill="#C8102E" opacity="0.7"/>
  
  <!-- Title text -->
  <text x="400" y="390" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">ACADEMY PROSPECT</text>
  
  <!-- Decorative corners -->
  <path d="M 85 65 L 85 75 L 95 75" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
  <path d="M 715 65 L 715 75 L 705 75" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
  <path d="M 85 355 L 85 345 L 95 345" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
  <path d="M 715 355 L 715 345 L 705 345" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
</svg>