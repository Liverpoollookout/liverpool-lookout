<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Anfield pitch outline sketch -->
  <rect x="80" y="60" width="640" height="300" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6" stroke-dasharray="5,5"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="60" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.5"/>
  
  <!-- Center spot -->
  <circle cx="400" cy="210" r="4" fill="#F6EB61"/>
  
  <!-- Halfway line -->
  <line x1="400" y1="60" x2="400" y2="360" stroke="#F6EB61" stroke-width="2" opacity="0.4" stroke-dasharray="3,3"/>
  
  <!-- Left penalty box -->
  <rect x="80" y="130" width="100" height="160" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Right penalty box -->
  <rect x="720" y="130" width="-100" height="160" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Left goal area -->
  <rect x="80" y="160" width="60" height="100" fill="none" stroke="#C8102E" stroke-width="2"/>
  
  <!-- Right goal area -->
  <rect x="720" y="160" width="-60" height="100" fill="none" stroke="#C8102E" stroke-width="2"/>
  
  <!-- Player figure - stylized sketched player in Liverpool kit -->
  <g id="player">
    <!-- Head -->
    <circle cx="150" cy="140" r="18" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    
    <!-- Body in red shirt -->
    <ellipse cx="150" cy="190" rx="22" ry="35" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Arms -->
    <line x1="128" y1="175" x2="90" y2="150" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="172" y1="175" x2="210" y2="150" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Legs -->
    <line x1="140" y1="225" x2="130" y2="290" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="160" y1="225" x2="175" y2="290" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Ball -->
    <circle cx="220" cy="130" r="8" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
    <path d="M 220 126 Q 224 130 220 134" fill="none" stroke="#C8102E" stroke-width="1"/>
  </g>
  
  <!-- Iconic moment indicator - Shankly Gates style arch -->
  <path d="M 500 80 Q 550 40 600 80" fill="none" stroke="#F6EB61" stroke-width="3" opacity="0.7"/>
  
  <!-- Dynamic motion lines for drama -->
  <line x1="320" y1="100" x2="360" y2="100" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
  <line x1="330" y1="110" x2="370" y2="110" stroke="#C8102E" stroke-width="1.5" opacity="0.5"/>
  <line x1="325" y1="120" x2="365" y2="120" stroke="#C8102E" stroke-width="1" opacity="0.4"/>
  
  <!-- Text styling elements for "Anfield" -->
  <g id="title-text">
    <text x="400" y="380" font-family="serif" font-size="28" font-weight="bold" fill="#F6EB61" text-anchor="middle" letter-spacing="2">
      ANFIELD LEGEND
    </text>
    <line x="280" y="395" x2="520" y2="395" stroke="#C8102E" stroke-width="2"/>
  </g>
  
  <!-- Sketchy corner decorations -->
  <circle cx="100" cy="80" r="12" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  <circle cx="700" cy="340" r="12" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Small accent details - shading strokes -->
  <line x1="150" y1="150" x2="155" y2="155" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <line x1="140" y1="155" x2="145" y2="160" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
</svg>