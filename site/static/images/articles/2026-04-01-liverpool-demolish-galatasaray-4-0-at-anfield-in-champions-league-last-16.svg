<svg viewBox="0 0 800 420" class="article-svg" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sketch">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch outline -->
  <rect x="50" y="40" width="700" height="340" fill="none" stroke="#2d5a3d" stroke-width="3" filter="url(#sketch)"/>
  
  <!-- Center line -->
  <line x1="400" y1="40" x2="400" y2="380" stroke="#2d5a3d" stroke-width="2" filter="url(#sketch)"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="60" fill="none" stroke="#2d5a3d" stroke-width="2" filter="url(#sketch)"/>
  
  <!-- Center spot -->
  <circle cx="400" cy="210" r="4" fill="#2d5a3d" filter="url(#sketch)"/>
  
  <!-- Left penalty area -->
  <rect x="50" y="110" width="100" height="200" fill="none" stroke="#2d5a3d" stroke-width="2" filter="url(#sketch)"/>
  
  <!-- Right penalty area -->
  <rect x="650" y="110" width="100" height="200" fill="none" stroke="#2d5a3d" stroke-width="2" filter="url(#sketch)"/>
  
  <!-- Player positions - stylised sketches in Liverpool red -->
  <!-- Goalkeeper Left -->
  <circle cx="70" cy="210" r="12" fill="#C8102E" filter="url(#sketch)"/>
  <circle cx="70" cy="195" r="8" fill="#C8102E" filter="url(#sketch)"/>
  
  <!-- Defender 1 -->
  <circle cx="150" cy="150" r="11" fill="#C8102E" filter="url(#sketch)"/>
  <circle cx="150" cy="135" r="7" fill="#C8102E" filter="url(#sketch)"/>
  
  <!-- Defender 2 -->
  <circle cx="150" cy="270" r="11" fill="#C8102E" filter="url(#sketch)"/>
  <circle cx="150" cy="285" r="7" fill="#C8102E" filter="url(#sketch)"/>
  
  <!-- Defender 3 -->
  <circle cx="220" cy="210" r="11" fill="#C8102E" filter="url(#sketch)"/>
  <circle cx="220" cy="195" r="7" fill="#C8102E" filter="url(#sketch)"/>
  
  <!-- Midfielder 1 -->
  <circle cx="300" cy="160" r="11" fill="#C8102E" filter="url(#sketch)"/>
  <circle cx="300" cy="145" r="7" fill="#C8102E" filter="url(#sketch)"/>
  
  <!-- Midfielder 2 -->
  <circle cx="300" cy="260" r="11" fill="#C8102E" filter="url(#sketch)"/>
  <circle cx="300" cy="275" r="7" fill="#C8102E" filter="url(#sketch)"/>
  
  <!-- Midfielder 3 (Central) -->
  <circle cx="350" cy="210" r="11" fill="#C8102E" filter="url(#sketch)"/>
  <circle cx="350" cy="195" r="7" fill="#C8102E" filter="url(#sketch)"/>
  
  <!-- Forward 1 -->
  <circle cx="520" cy="140" r="11" fill="#C8102E" filter="url(#sketch)"/>
  <circle cx="520" cy="125" r="7" fill="#C8102E" filter="url(#sketch)"/>
  
  <!-- Forward 2 -->
  <circle cx="520" cy="280" r="11" fill="#C8102E" filter="url(#sketch)"/>
  <circle cx="520" cy="295" r="7" fill="#C8102E" filter="url(#sketch)"/>
  
  <!-- Striker -->
  <circle cx="620" cy="210" r="12" fill="#C8102E" filter="url(#sketch)"/>
  <circle cx="620" cy="194" r="8" fill="#C8102E" filter="url(#sketch)"/>
  
  <!-- Tactical arrows showing movement -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <!-- Movement arrows -->
  <path d="M 350 210 L 450 180" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" filter="url(#sketch)" opacity="0.8"/>
  <path d="M 300 160 L 420 140" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" filter="url(#sketch)" opacity="0.8"/>
  <path d="M 520 140 L 600 190" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" filter="url(#sketch)" opacity="0.8"/>
  
  <!-- Title text with sketch style -->
  <text x="400" y="410" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle" filter="url(#sketch)">MATCH REPORT • TACTICAL ANALYSIS</text>
  
  <!-- Slot reference -->
  <text x="50" y="30" font-family="Arial, sans-serif" font-size="14" fill="#F6EB61" filter="url(#sketch)">Slot Formation</text>
  
  <!-- Rating boxes -->
  <rect x="650" y="50" width="130" height="80" fill="none" stroke="#C8102E" stroke-width="2" filter="url(#sketch)"/>
  <text x="715" y="70" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" filter="url(#sketch)">KEY MOMENTS</text>
  <text x="715" y="95" font-family="Arial, sans-serif" font-size="11" fill="#F6EB61" text-anchor="middle" filter="url(#sketch)">★ Goal: 34'</text>
  <text x="715" y="112" font-family="Arial, sans-serif" font-size="11" fill="#F6EB61" text-anchor="middle" filter="url(#sketch)">★ Assist: 28'</text>
  
  <!-- Stats box -->
  <rect x="650" y="160" width="130" height="80" fill="none" stroke="#FFFFFF" stroke-width="2" filter="url(#sketch)"/>
  <text x="715" y="180" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" filter="url(#sketch)">POSSESSION</text>
  <text x="715" y="205" font-family="Arial, sans-serif" font-size="14" fill="#C8102E" text-anchor="middle" font-weight="bold" filter="url(#sketch)">62%</text>
  <text x="715" y="225" font-family="Arial, sans-serif" font-size="11" fill="#F6EB61" text-anchor="middle" filter="url(#sketch)">12 Shots • 6 On Target</text>
</svg>