<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch outline with sketchy style -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none" stroke-dasharray="3,2" opacity="0.8">
    <rect x="80" y="40" width="640" height="340" rx="8"/>
    <line x1="410" y1="40" x2="410" y2="380"/>
    <circle cx="410" cy="210" r="45"/>
    <rect x="80" y="120" width="80" height="180" rx="4"/>
    <rect x="640" y="120" width="80" height="180" rx="4"/>
  </g>
  
  <!-- Player figure - Liverpool red kit (left side) -->
  <g>
    <!-- Head -->
    <circle cx="200" cy="120" r="22" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Jersey -->
    <ellipse cx="200" cy="180" rx="28" ry="45" fill="#C8102E" opacity="0.7" stroke="#C8102E" stroke-width="2"/>
    <!-- Arms -->
    <line x1="170" y1="160" x2="130" y2="140" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="230" y1="160" x2="270" y2="150" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="185" y1="225" x2="175" y2="285" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="215" y1="225" x2="225" y2="285" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Ball at feet -->
    <circle cx="230" cy="295" r="12" fill="none" stroke="#F6EB61" stroke-width="2.5"/>
  </g>
  
  <!-- Player figure - Liverpool red kit (right side) -->
  <g opacity="0.6">
    <!-- Head -->
    <circle cx="620" cy="140" r="20" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Jersey -->
    <ellipse cx="620" cy="195" rx="26" ry="40" fill="#C8102E" opacity="0.5" stroke="#C8102E" stroke-width="2"/>
    <!-- Arms -->
    <line x1="592" y1="175" x2="555" y2="165" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="648" y1="175" x2="685" y2="170" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="607" y1="235" x2="600" y2="295" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="633" y1="235" x2="640" y2="295" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Tactical arrow - Slot's direction -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <path d="M 320 260 Q 380 240 450 250" stroke="#F6EB61" stroke-width="3" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,3"/>
  
  <!-- Key moments indicators -->
  <circle cx="280" cy="200" r="18" fill="none" stroke="#F6EB61" stroke-width="2.5" opacity="0.8"/>
  <text x="278" y="207" font-size="22" font-weight="bold" fill="#F6EB61" font-family="Arial, sans-serif">1</text>
  
  <circle cx="540" cy="280" r="16" fill="none" stroke="#F6EB61" stroke-width="2.5" opacity="0.7"/>
  <text x="537" y="287" font-size="20" font-weight="bold" fill="#F6EB61" font-family="Arial, sans-serif">2</text>
  
  <!-- Rating badge -->
  <rect x="350" y="310" width="100" height="50" rx="6" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="400" y="325" font-size="14" fill="#FFFFFF" font-family="Arial, sans-serif" text-anchor="middle" font-weight="bold">RATINGS</text>
  <text x="400" y="345" font-size="12" fill="#F6EB61" font-family="Arial, sans-serif" text-anchor="middle">Player Performance</text>
  
  <!-- Match Report Title -->
  <text x="410" y="390" font-size="18" fill="#C8102E" font-family="Arial, sans-serif" text-anchor="middle" font-weight="bold">MATCH REPORT</text>
  
  <!-- Slot tactical subtitle -->
  <text x="410" y="408" font-size="12" fill="#F6EB61" font-family="Arial, sans-serif" text-anchor="middle" opacity="0.9">Slot Tactical Analysis</text>
  
  <!-- Decorative corner marks -->
  <line x1="90" y1="50" x2="120" y2="50" stroke="#C8102E" stroke-width="2" opacity="0.5"/>
  <line x1="90" y1="50" x2="90" y2="80" stroke="#C8102E" stroke-width="2" opacity="0.5"/>
  
  <line x1="710" y1="50" x2="680" y2="50" stroke="#C8102E" stroke-width="2" opacity="0.5"/>
  <line x1="710" y1="50" x2="710" y2="80" stroke="#C8102E" stroke-width="2" opacity="0.5"/>
</svg>