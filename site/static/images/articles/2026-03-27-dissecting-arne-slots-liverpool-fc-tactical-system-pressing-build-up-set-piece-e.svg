<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch background -->
  <rect x="50" y="40" width="700" height="340" fill="#1a3a2e" stroke="#FFFFFF" stroke-width="2" opacity="0.9"/>
  
  <!-- Center line -->
  <line x1="400" y1="40" x2="400" y2="380" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="60" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  
  <!-- Center spot -->
  <circle cx="400" cy="210" r="4" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- Title text -->
  <text x="400" y="405" font-size="18" font-weight="bold" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">
    SLOT 4-2-3-1 PRESSING SYSTEM
  </text>
  
  <!-- Back line (4 defenders) -->
  <!-- Left back -->
  <circle cx="120" cy="150" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="120" y="155" font-size="11" fill="#C8102E" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">LB</text>
  
  <!-- CB left -->
  <circle cx="200" cy="140" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="200" y="145" font-size="11" fill="#C8102E" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">CB</text>
  
  <!-- CB right -->
  <circle cx="600" cy="140" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="600" y="145" font-size="11" fill="#C8102E" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">CB</text>
  
  <!-- Right back -->
  <circle cx="680" cy="150" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="680" y="155" font-size="11" fill="#C8102E" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">RB</text>
  
  <!-- Midfield line (2 defensive mids) -->
  <!-- CDM left -->
  <circle cx="280" cy="210" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="280" y="215" font-size="10" fill="#C8102E" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">CDM</text>
  
  <!-- CDM right -->
  <circle cx="520" cy="210" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="520" y="215" font-size="10" fill="#C8102E" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">CDM</text>
  
  <!-- Attacking line (3 players) -->
  <!-- Left winger -->
  <circle cx="220" cy="280" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="220" y="285" font-size="11" fill="#C8102E" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">LW</text>
  
  <!-- CAM -->
  <circle cx="400" cy="290" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="400" y="295" font-size="10" fill="#C8102E" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">CAM</text>
  
  <!-- Right winger -->
  <circle cx="580" cy="280" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="580" y="285" font-size="11" fill="#C8102E" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">RW</text>
  
  <!-- Striker -->
  <circle cx="400" cy="360" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="400" y="365" font-size="11" fill="#C8102E" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">ST</text>
  
  <!-- Pressing arrows and triggers -->
  <!-- LW pressing trigger -->
  <path d="M 220 270 L 180 200" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.8" stroke-dasharray="5,5"/>
  
  <!-- RW pressing trigger -->
  <path d="M 580 270 L 620 200" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.8" stroke-dasharray="5,5"/>
  
  <!-- ST pressing trigger -->
  <path d="M 400 345 L 400 280" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.8"/>
  
  <!-- Defensive shape lines -->
  <polyline points="120,150 200,140 600,140 680,150" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.4"/>
  <polyline points="280,210 520,210" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.4"/>
  <polyline points="220,280 400,290 580,280" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.4"/>
  
  <!-- Pressing pressure zones (semi-transparent circles) -->
  <circle cx="180" cy="200" r="50" fill="#C8102E" opacity="0.1" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="3,3"/>
  <circle cx="620" cy="200" r="50" fill="#C8102E" opacity="0.1" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="3,3"/>
  <circle cx="400" cy="280" r="45" fill="#C8102E" opacity="0.1" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="3,3"/>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <!-- Sketch effect with additional strokes -->
  <g opacity="0.15" stroke="#FFFFFF" stroke-width="1.5" fill="none">
    <path d="M 100 50 Q 150 45 200 50"/>
    <path d="M 600 50 Q 650 45 700 50"/>
    <path d="M 90 380 Q 140 375 190 380"/>
    <path d="M 610 380 Q 660 375 710 380"/>
  </g>
</svg>