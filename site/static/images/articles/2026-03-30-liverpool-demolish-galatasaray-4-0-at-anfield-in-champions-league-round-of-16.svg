<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Football pitch outline - sketch style -->
  <g stroke="#F6EB61" stroke-width="2" fill="none" opacity="0.8">
    <!-- Pitch border -->
    <rect x="50" y="40" width="700" height="340" stroke-dasharray="5,3"/>
    
    <!-- Center line -->
    <line x1="400" y1="40" x2="400" y2="380"/>
    
    <!-- Center circle -->
    <circle cx="400" cy="210" r="50" stroke-dasharray="5,3"/>
    
    <!-- Center spot -->
    <circle cx="400" cy="210" r="3" fill="#F6EB61"/>
    
    <!-- Left penalty area -->
    <rect x="50" y="120" width="100" height="180" stroke-dasharray="5,3"/>
    
    <!-- Right penalty area -->
    <rect x="650" y="120" width="100" height="180" stroke-dasharray="5,3"/>
    
    <!-- Left goal area -->
    <rect x="50" y="155" width="50" height="110" stroke-dasharray="5,3"/>
    
    <!-- Right goal area -->
    <rect x="700" y="155" width="50" height="110" stroke-dasharray="5,3"/>
  </g>
  
  <!-- Sketched player figure - left side -->
  <g transform="translate(150, 150)">
    <!-- Head -->
    <circle cx="0" cy="0" r="12" stroke="#C8102E" stroke-width="2" fill="none"/>
    <!-- Body -->
    <line x1="0" y1="12" x2="0" y2="35" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Left arm -->
    <line x1="0" y1="18" x2="-18" y2="25" stroke="#C8102E" stroke-width="2"/>
    <!-- Right arm -->
    <line x1="0" y1="18" x2="18" y2="25" stroke="#C8102E" stroke-width="2"/>
    <!-- Left leg -->
    <line x1="0" y1="35" x2="-12" y2="55" stroke="#C8102E" stroke-width="2"/>
    <!-- Right leg -->
    <line x1="0" y1="35" x2="12" y2="55" stroke="#C8102E" stroke-width="2"/>
    <!-- Ball near foot -->
    <circle cx="15" cy="60" r="4" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Sketched player figure - right side -->
  <g transform="translate(650, 200)">
    <!-- Head -->
    <circle cx="0" cy="0" r="12" stroke="#C8102E" stroke-width="2" fill="none"/>
    <!-- Body -->
    <line x1="0" y1="12" x2="0" y2="35" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Left arm -->
    <line x1="0" y1="18" x2="-20" y2="20" stroke="#C8102E" stroke-width="2"/>
    <!-- Right arm -->
    <line x1="0" y1="18" x2="20" y2="30" stroke="#C8102E" stroke-width="2"/>
    <!-- Left leg -->
    <line x1="0" y1="35" x2="-10" y2="55" stroke="#C8102E" stroke-width="2"/>
    <!-- Right leg kicking -->
    <line x1="0" y1="35" x2="15" y2="50" stroke="#C8102E" stroke-width="2"/>
    <!-- Ball -->
    <circle cx="20" cy="45" r="4" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Tactical arrow showing movement -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 250 120 Q 350 100 450 140" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FFFFFF"/>
    </marker>
  </defs>
  
  <!-- Key moments indicators -->
  <g stroke="#F6EB61" stroke-width="1.5" fill="none" opacity="0.6">
    <circle cx="200" cy="280" r="15"/>
    <circle cx="500" cy="300" r="15"/>
    <circle cx="350" cy="350" r="15"/>
  </g>
  
  <!-- Title text -->
  <text x="400" y="385" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#C8102E" text-anchor="middle" letter-spacing="1">
    MATCH REPORT
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="410" font-family="Arial, sans-serif" font-size="13" fill="#F6EB61" text-anchor="middle" opacity="0.8">
    Slot's Tactical Decisions | Player Ratings | Key Moments
  </text>
  
  <!-- Decorative corner elements -->
  <g stroke="#C8102E" stroke-width="1.5" fill="none" opacity="0.5">
    <line x1="60" y1="50" x2="80" y2="50"/>
    <line x1="60" y1="50" x2="60" y2="70"/>
    
    <line x1="740" y1="50" x2="720" y2="50"/>
    <line x1="740" y1="50" x2="740" y2="70"/>
  </g>
</svg>