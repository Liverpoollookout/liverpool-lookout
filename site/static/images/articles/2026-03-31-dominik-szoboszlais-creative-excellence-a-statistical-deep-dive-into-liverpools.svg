<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Title -->
  <text x="400" y="40" font-size="32" font-weight="bold" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">
    STATISTICS DEEP DIVE
  </text>
  
  <!-- Pitch outline -->
  <rect x="80" y="80" width="640" height="280" fill="none" stroke="#2d5a3d" stroke-width="3" opacity="0.6"/>
  
  <!-- Center line -->
  <line x1="400" y1="80" x2="400" y2="360" stroke="#2d5a3d" stroke-width="2" opacity="0.5"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="220" r="40" fill="none" stroke="#2d5a3d" stroke-width="2" opacity="0.5"/>
  
  <!-- Center spot -->
  <circle cx="400" cy="220" r="4" fill="#2d5a3d" opacity="0.5"/>
  
  <!-- Penalty areas -->
  <rect x="80" y="140" width="100" height="160" fill="none" stroke="#2d5a3d" stroke-width="2" opacity="0.5"/>
  <rect x="620" y="140" width="100" height="160" fill="none" stroke="#2d5a3d" stroke-width="2" opacity="0.5"/>
  
  <!-- Goal areas -->
  <rect x="80" y="170" width="60" height="100" fill="none" stroke="#2d5a3d" stroke-width="2" opacity="0.5"/>
  <rect x="660" y="170" width="60" height="100" fill="none" stroke="#2d5a3d" stroke-width="2" opacity="0.5"/>
  
  <!-- Data visualization bars - left side -->
  <g>
    <!-- Pass completion bar -->
    <text x="110" y="395" font-size="11" fill="#FFFFFF" font-family="Arial, sans-serif">Passes</text>
    <rect x="110" y="370" width="60" height="8" fill="#444" stroke="#FFFFFF" stroke-width="1"/>
    <rect x="110" y="370" width="54" height="8" fill="#C8102E"/>
    
    <!-- Shots bar -->
    <text x="200" y="395" font-size="11" fill="#FFFFFF" font-family="Arial, sans-serif">Shots</text>
    <rect x="200" y="370" width="60" height="8" fill="#444" stroke="#FFFFFF" stroke-width="1"/>
    <rect x="200" y="370" width="45" height="8" fill="#C8102E"/>
    
    <!-- Tackles bar -->
    <text x="290" y="395" font-size="11" fill="#FFFFFF" font-family="Arial, sans-serif">Tackles</text>
    <rect x="290" y="370" width="60" height="8" fill="#444" stroke="#FFFFFF" stroke-width="1"/>
    <rect x="290" y="370" width="48" height="8" fill="#C8102E"/>
  </g>
  
  <!-- Data visualization bars - right side -->
  <g>
    <!-- Assists bar -->
    <text x="510" y="395" font-size="11" fill="#FFFFFF" font-family="Arial, sans-serif">Assists</text>
    <rect x="510" y="370" width="60" height="8" fill="#444" stroke="#FFFFFF" stroke-width="1"/>
    <rect x="510" y="370" width="42" height="8" fill="#C8102E"/>
    
    <!-- Goals bar -->
    <text x="600" y="395" font-size="11" fill="#FFFFFF" font-family="Arial, sans-serif">Goals</text>
    <rect x="600" y="370" width="60" height="8" fill="#444" stroke="#FFFFFF" stroke-width="1"/>
    <rect x="600" y="370" width="51" height="8" fill="#C8102E"/>
    
    <!-- Clearances bar -->
    <text x="690" y="395" font-size="11" fill="#FFFFFF" font-family="Arial, sans-serif">Clear</text>
    <rect x="690" y="370" width="60" height="8" fill="#444" stroke="#FFFFFF" stroke-width="1"/>
    <rect x="690" y="370" width="52" height="8" fill="#C8102E"/>
  </g>
  
  <!-- Data points on pitch -->
  <circle cx="150" cy="150" r="6" fill="#C8102E" stroke="#F6EB61" stroke-width="2"/>
  <circle cx="250" cy="220" r="6" fill="#C8102E" stroke="#F6EB61" stroke-width="2"/>
  <circle cx="400" cy="180" r="6" fill="#C8102E" stroke="#F6EB61" stroke-width="2"/>
  <circle cx="550" cy="240" r="6" fill="#C8102E" stroke="#F6EB61" stroke-width="2"/>
  <circle cx="650" cy="280" r="6" fill="#C8102E" stroke="#F6EB61" stroke-width="2"/>
  
  <!-- Connecting lines between data points -->
  <line x1="150" y1="150" x2="250" y2="220" stroke="#F6EB61" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="220" x2="400" y2="180" stroke="#F6EB61" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="180" x2="550" y2="240" stroke="#F6EB61" stroke-width="1" opacity="0.4"/>
  <line x1="550" y1="240" x2="650" y2="280" stroke="#F6EB61" stroke-width="1" opacity="0.4"/>
  
  <!-- Decorative corner elements -->
  <g opacity="0.3">
    <line x1="80" y1="85" x2="100" y2="85" stroke="#F6EB61" stroke-width="2"/>
    <line x1="80" y1="85" x2="80" y2="105" stroke="#F6EB61" stroke-width="2"/>
    
    <line x1="720" y1="85" x2="700" y2="85" stroke="#F6EB61" stroke-width="2"/>
    <line x1="720" y1="85" x2="720" y2="105" stroke="#F6EB61" stroke-width="2"/>
    
    <line x1="80" y1="355" x2="100" y2="355" stroke="#F6EB61" stroke-width="2"/>
    <line x1="80" y1="355" x2="80" y2="335" stroke="#F6EB61" stroke-width="2"/>
    
    <line x1="720" y1="355" x2="700" y2="355" stroke="#F6EB61" stroke-width="2"/>
    <line x1="720" y1="355" x2="720" y2="335" stroke="#F6EB61" stroke-width="2"/>
  </g>
  
  <!-- Stats label -->
  <text x="400" y="320" font-size="16" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" font-style="italic">
    Performance Metrics
  </text>
</svg>