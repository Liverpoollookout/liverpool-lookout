<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch outline -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none">
    <!-- Pitch rectangle -->
    <rect x="80" y="60" width="640" height="300" stroke-dasharray="5,3" opacity="0.6"/>
    
    <!-- Center line -->
    <line x1="400" y1="60" x2="400" y2="360"/>
    
    <!-- Center circle -->
    <circle cx="400" cy="210" r="50" stroke-dasharray="5,3" opacity="0.5"/>
    
    <!-- Penalty areas -->
    <rect x="80" y="120" width="100" height="180"/>
    <rect x="620" y="120" width="100" height="180"/>
    
    <!-- Goal areas -->
    <rect x="80" y="155" width="60" height="110"/>
    <rect x="660" y="155" width="60" height="110"/>
  </g>
  
  <!-- Player positions with sketched style -->
  <g>
    <!-- Goalkeeper (Liverpool red) -->
    <circle cx="120" cy="210" r="18" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="120" cy="210" r="14" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
    
    <!-- Defenders -->
    <circle cx="200" cy="140" r="16" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="200" cy="280" r="16" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="260" cy="210" r="16" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="330" cy="180" r="16" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
    
    <!-- Midfielders -->
    <circle cx="360" cy="270" r="15" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="420" cy="140" r="15" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="420" cy="280" r="15" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
    
    <!-- Forwards/Attackers -->
    <circle cx="520" cy="180" r="15" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="560" cy="240" r="15" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="620" cy="210" r="15" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>
  
  <!-- Tactical arrows showing movement -->
  <g stroke="#F6EB61" stroke-width="2" fill="none" opacity="0.8">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
      </marker>
    </defs>
    
    <!-- Movement arrows -->
    <path d="M 420 140 L 480 160" marker-end="url(#arrowhead)" stroke-dasharray="4,2"/>
    <path d="M 360 270 L 400 260" marker-end="url(#arrowhead)" stroke-dasharray="4,2"/>
    <path d="M 560 240 L 600 220" marker-end="url(#arrowhead)" stroke-dasharray="4,2"/>
  </g>
  
  <!-- Match info boxes with sketched style -->
  <g stroke="#F6EB61" stroke-width="2" fill="none">
    <!-- Top left box -->
    <rect x="20" y="20" width="140" height="35" rx="3"/>
    <!-- Top right box -->
    <rect x="640" y="20" width="140" height="35" rx="3"/>
  </g>
  
  <!-- Score display -->
  <text x="90" y="45" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#C8102E">LIVERPOOL</text>
  <text x="700" y="45" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" opacity="0.8">OPPONENT</text>
  
  <!-- Main title -->
  <text x="400" y="395" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#F6EB61" text-anchor="middle">MATCH REPORT</text>
  
  <!-- Subtitle -->
  <text x="400" y="415" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" opacity="0.8">Slot Tactics • Player Ratings • Key Moments</text>
  
  <!-- Decorative Liverpool crest inspired elements -->
  <g stroke="#C8102E" stroke-width="1.5" fill="none" opacity="0.4">
    <circle cx="50" cy="360" r="25"/>
    <circle cx="750" cy="360" r="25"/>
  </g>
  
  <!-- Sketch effect lines -->
  <g stroke="#FFFFFF" stroke-width="1" opacity="0.15">
    <line x1="100" y1="85" x2="110" y2="80"/>
    <line x1="690" y1="90" x2="700" y2="85"/>
  </g>
</svg>