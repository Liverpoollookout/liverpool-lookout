<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Sketched pitch outline -->
  <rect x="80" y="60" width="640" height="300" fill="none" stroke="#2d5016" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
  
  <!-- Center line -->
  <line x1="400" y1="60" x2="400" y2="360" stroke="#2d5016" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="40" fill="none" stroke="#2d5016" stroke-width="1" opacity="0.4"/>
  
  <!-- Center spot -->
  <circle cx="400" cy="210" r="3" fill="#2d5016" opacity="0.5"/>
  
  <!-- Player figure 1 - Standing (Available) -->
  <g>
    <!-- Head -->
    <circle cx="150" cy="130" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    
    <!-- Body -->
    <line x1="150" y1="148" x2="150" y2="210" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Arms -->
    <line x1="150" y1="165" x2="110" y2="185" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="150" y1="165" x2="190" y2="185" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Legs -->
    <line x1="150" y1="210" x2="130" y2="280" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="150" y1="210" x2="170" y2="280" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Jersey number -->
    <text x="150" y="205" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">1</text>
    
    <!-- Status badge - Available -->
    <circle cx="150" cy="310" r="12" fill="#2ecc71" opacity="0.8"/>
    <text x="150" y="315" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">✓</text>
  </g>
  
  <!-- Player figure 2 - Injured/Recovering -->
  <g opacity="0.6">
    <!-- Head -->
    <circle cx="400" cy="130" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    
    <!-- Body -->
    <line x1="400" y1="148" x2="400" y2="210" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Bandage/strapping on arm -->
    <line x1="400" y1="165" x2="360" y2="185" stroke="#F6EB61" stroke-width="3" stroke-linecap="round"/>
    <line x1="400" y1="165" x2="440" y2="185" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Legs -->
    <line x1="400" y1="210" x2="380" y2="280" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="400" y1="210" x2="420" y2="280" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Jersey number -->
    <text x="400" y="205" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">7</text>
    
    <!-- Status badge - Recovering -->
    <circle cx="400" cy="310" r="12" fill="#f39c12" opacity="0.8"/>
    <text x="400" y="316" font-size="9" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">!</text>
  </g>
  
  <!-- Player figure 3 - Doubtful -->
  <g>
    <!-- Head -->
    <circle cx="650" cy="130" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    
    <!-- Body -->
    <line x1="650" y1="148" x2="650" y2="210" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Arms with question mark gesture -->
    <line x1="650" y1="165" x2="610" y2="185" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="650" y1="165" x2="690" y2="185" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Legs -->
    <line x1="650" y1="210" x2="630" y2="280" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="650" y1="210" x2="670" y2="280" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Jersey number -->
    <text x="650" y="205" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">11</text>
    
    <!-- Status badge - Doubtful -->
    <circle cx="650" cy="310" r="12" fill="#e74c3c" opacity="0.7"/>
    <text x="650" y="316" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">?</text>
  </g>
  
  <!-- Title text -->
  <text x="400" y="370" font-size="28" font-weight="bold" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif">INJURY UPDATE</text>
  
  <!-- Subtitle -->
  <text x="400" y="395" font-size="14" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">Fitness Status - Next Fixture</text>
  
  <!-- Legend -->
  <g font-family="Arial, sans-serif" font-size="11">
    <circle cx="70" cy="385" r="5" fill="#2ecc71"/>
    <text x="80" y="390" fill="#FFFFFF">Available</text>
    
    <circle cx="210" cy="385" r="5" fill="#f39c12"/>
    <text x="220" y="390" fill="#FFFFFF">Recovering</text>
    
    <circle cx="340" cy="385" r="5" fill="#e74c3c"/>
    <text x="350" y="390" fill="#FFFFFF">Doubtful</text>
  </g>
</svg>