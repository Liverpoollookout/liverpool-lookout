<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative corner elements -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  <circle cx="750" cy="370" r="40" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  
  <!-- Main sketch element - stylised figure in thinking pose -->
  <g id="figure">
    <!-- Head -->
    <circle cx="200" cy="100" r="35" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    
    <!-- Hair/top detail -->
    <path d="M 165 85 Q 170 60 200 55 Q 230 60 235 85" fill="none" stroke="#C8102E" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Face details -->
    <circle cx="185" cy="95" r="4" fill="#C8102E"/>
    <circle cx="215" cy="95" r="4" fill="#C8102E"/>
    <path d="M 190 110 Q 200 115 210 110" fill="none" stroke="#C8102E" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Neck -->
    <line x1="200" y1="135" x2="200" y2="160" stroke="#FFFFFF" stroke-width="3"/>
    
    <!-- Body - red shirt -->
    <path d="M 165 165 L 165 280 L 235 280 L 235 165 Q 200 155 165 165" fill="#C8102E" opacity="0.8"/>
    
    <!-- Shirt details -->
    <line x1="200" y1="165" x2="200" y2="280" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Arms -->
    <path d="M 165 180 Q 120 160 100 140" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <path d="M 235 180 Q 280 170 310 190" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Hand to head (thinking pose) -->
    <circle cx="100" cy="140" r="12" fill="#FFFFFF"/>
    
    <!-- Legs -->
    <line x1="180" y1="280" x2="175" y2="360" stroke="#0a1628" stroke-width="3"/>
    <line x1="220" y1="280" x2="225" y2="360" stroke="#0a1628" stroke-width="3"/>
    
    <!-- Feet -->
    <line x1="165" y1="360" x2="185" y2="360" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <line x1="215" y1="360" x2="235" y2="360" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Thought bubble elements (for opinion piece) -->
  <circle cx="420" cy="100" r="80" fill="none" stroke="#F6EB61" stroke-width="2.5" opacity="0.7"/>
  <circle cx="360" cy="150" r="20" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.7"/>
  <circle cx="340" cy="180" r="12" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.7"/>
  
  <!-- Thought lines inside bubble -->
  <line x1="380" y1="70" x2="460" y2="70" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  <line x1="370" y1="100" x2="470" y2="100" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  <line x1="375" y1="130" x2="465" y2="130" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Connecting line from head to thought bubble -->
  <path d="M 235 100 Q 300 100 360 100" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.5" stroke-dasharray="5,5"/>
  
  <!-- Title text -->
  <text x="400" y="250" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#C8102E" text-anchor="middle" letter-spacing="2">OPINION</text>
  
  <!-- Subtitle -->
  <text x="400" y="300" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" text-anchor="middle" font-weight="500">Liverpool FC Perspective</text>
  
  <!-- Decorative accent lines -->
  <line x1="300" y1="320" x2="500" y2="320" stroke="#F6EB61" stroke-width="2"/>
  
  <!-- Small accent circles -->
  <circle cx="320" cy="350" r="6" fill="#C8102E"/>
  <circle cx="480" cy="350" r="6" fill="#C8102E"/>
  <circle cx="400" cy="350" r="4" fill="#F6EB61"/>
</svg>