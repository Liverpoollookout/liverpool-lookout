<svg viewBox="0 0 800 420" class="article-svg" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative sketch lines -->
  <line x1="50" y1="30" x2="150" y2="40" stroke="#C8102E" stroke-width="2" opacity="0.6" stroke-dasharray="5,5"/>
  <line x1="650" y1="50" x2="750" y2="35" stroke="#F6EB61" stroke-width="2" opacity="0.6" stroke-dasharray="5,5"/>
  
  <!-- Central speech bubble for opinion -->
  <g>
    <!-- Main bubble -->
    <rect x="120" y="80" width="560" height="240" rx="20" fill="none" stroke="#C8102E" stroke-width="3"/>
    
    <!-- Pointer tail -->
    <polygon points="200,320 230,360 170,350" fill="none" stroke="#C8102E" stroke-width="3"/>
    
    <!-- Inner accent circle -->
    <circle cx="400" cy="200" r="100" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.7"/>
    
    <!-- Thought elements -->
    <circle cx="280" cy="160" r="8" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="520" cy="150" r="12" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="300" cy="280" r="6" fill="#FFFFFF" opacity="0.7"/>
  </g>
  
  <!-- Liverpool FC Crest elements (stylised) -->
  <g opacity="0.8">
    <!-- Shield outline -->
    <path d="M 100 120 L 100 180 Q 100 220 150 240 Q 200 220 200 180 L 200 120 Z" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    
    <!-- Stylised shading -->
    <path d="M 105 135 Q 130 140 150 145 Q 170 140 195 135" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Right side - iconic elements -->
  <g opacity="0.7">
    <!-- Football sketch -->
    <ellipse cx="680" cy="140" rx="25" ry="28" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="680" y1="112" x2="680" y2="168" stroke="#FFFFFF" stroke-width="1.5"/>
    <path d="M 670 140 Q 680 135 690 140" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    
    <!-- Shading curves -->
    <path d="M 665 145 Q 680 150 695 145" fill="none" stroke="#C8102E" stroke-width="1" opacity="0.6"/>
  </g>
  
  <!-- Main opinion text -->
  <text x="400" y="200" font-size="48" font-weight="bold" text-anchor="middle" fill="#C8102E" font-family="Arial, sans-serif" letter-spacing="2">OPINION</text>
  
  <!-- Subtitle -->
  <text x="400" y="235" font-size="24" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" opacity="0.9">Liverpool FC Analysis</text>
  
  <!-- Decorative underline -->
  <line x1="250" y1="250" x2="550" y2="250" stroke="#F6EB61" stroke-width="3"/>
  
  <!-- Bottom detail marks (sketch style) -->
  <g stroke="#FFFFFF" stroke-width="1.5" opacity="0.5">
    <line x1="80" y1="360" x2="95" y2="365"/>
    <line x1="100" y1="358" x2="115" y2="370"/>
    <line x1="685" y1="355" x2="700" y2="368"/>
    <line x1="710" y1="360" x2="725" y2="375"/>
  </g>
  
  <!-- Corner accents -->
  <rect x="15" y="15" width="40" height="40" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
  <rect x="745" y="365" width="40" height="40" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
</svg>