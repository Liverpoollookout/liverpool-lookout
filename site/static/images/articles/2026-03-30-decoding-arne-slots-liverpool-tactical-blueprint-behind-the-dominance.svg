<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch outline -->
  <rect x="50" y="40" width="700" height="340" fill="#1a4d2e" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Center line -->
  <line x1="400" y1="40" x2="400" y2="380" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="5,5"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="50" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="400" cy="210" r="3" fill="#FFFFFF"/>
  
  <!-- Penalty areas -->
  <rect x="50" y="130" width="100" height="160" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="650" y="130" width="100" height="160" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Goal areas -->
  <rect x="50" y="160" width="60" height="100" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="690" y="160" width="60" height="100" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Liverpool formation: 4-2-3-1 -->
  <!-- Goalkeeper (red circle) -->
  <circle cx="70" cy="210" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="70" y="215" font-size="8" fill="#FFFFFF" text-anchor="middle" font-weight="bold">GK</text>
  
  <!-- Back 4 (defenders) -->
  <!-- Left back -->
  <circle cx="150" cy="120" r="14" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <text x="150" y="127" font-size="9" fill="#FFFFFF" text-anchor="middle" font-weight="bold">LB</text>
  
  <!-- Left center back -->
  <circle cx="180" cy="180" r="14" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <text x="180" y="187" font-size="9" fill="#FFFFFF" text-anchor="middle" font-weight="bold">CB</text>
  
  <!-- Right center back -->
  <circle cx="180" cy="240" r="14" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <text x="180" y="247" font-size="9" fill="#FFFFFF" text-anchor="middle" font-weight="bold">CB</text>
  
  <!-- Right back -->
  <circle cx="150" cy="300" r="14" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <text x="150" y="307" font-size="9" fill="#FFFFFF" text-anchor="middle" font-weight="bold">RB</text>
  
  <!-- Midfield 2 (defensive) -->
  <!-- Left DM -->
  <circle cx="280" cy="160" r="14" fill="#C8102E" stroke="#F6EB61" stroke-width="2.5"/>
  <text x="280" y="167" font-size="9" fill="#FFFFFF" text-anchor="middle" font-weight="bold">DM</text>
  
  <!-- Right DM -->
  <circle cx="280" cy="260" r="14" fill="#C8102E" stroke="#F6EB61" stroke-width="2.5"/>
  <text x="280" y="267" font-size="9" fill="#FFFFFF" text-anchor="middle" font-weight="bold">DM</text>
  
  <!-- Front 3 (attacking mids) -->
  <!-- Left AM -->
  <circle cx="380" cy="140" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <text x="380" y="147" font-size="8" fill="#FFFFFF" text-anchor="middle" font-weight="bold">AM</text>
  
  <!-- Center AM -->
  <circle cx="420" cy="210" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <text x="420" y="217" font-size="8" fill="#FFFFFF" text-anchor="middle" font-weight="bold">AM</text>
  
  <!-- Right AM -->
  <circle cx="380" cy="280" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <text x="380" y="287" font-size="8" fill="#FFFFFF" text-anchor="middle" font-weight="bold">AM</text>
  
  <!-- Striker -->
  <circle cx="520" cy="210" r="13" fill="#C8102E" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="520" y="217" font-size="9" fill="#FFFFFF" text-anchor="middle" font-weight="bold">ST</text>
  
  <!-- Pressing triggers - arrows showing movement -->
  <!-- Left side press -->
  <path d="M 250 160 L 320 140" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Right side press -->
  <path d="M 250 260 L 320 280" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Central press -->
  <path d="M 300 210 L 380 210" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="650" y="60" font-size="20" fill="#C8102E" font-weight="bold" font-family="Arial, sans-serif" text-anchor="end">SLOT'S</text>
  <text x="650" y="85" font-size="20" fill="#C8102E" font-weight="bold" font-family="Arial, sans-serif" text-anchor="end">4-2-3-1</text>
  
  <!-- Subtitle -->
  <text x="650" y="105" font-size="12" fill="#F6EB61" font-family="Arial, sans-serif" text-anchor="end">PRESSING TRIGGER</text>
  
  <!-- Formation label -->
  <text x="50" y="405" font-size="11" fill="#FFFFFF" font-family="Arial, sans-serif" opacity="0.8">Liverpool FC Tactical Setup</text>
  
  <!-- Sketch style elements (hand-drawn effect) -->
  <circle cx="750" cy="50" r="25" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
  <circle cx="760" cy="45" r="20" fill="none" stroke="#F6EB61" stroke-width="1" opacity="0.2"/>
</svg>