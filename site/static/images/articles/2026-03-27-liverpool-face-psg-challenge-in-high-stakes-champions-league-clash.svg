<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Title -->
  <text x="400" y="35" font-size="28" font-weight="bold" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif">MATCH PREVIEW</text>
  
  <!-- Pitch outline -->
  <rect x="50" y="70" width="700" height="320" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
  
  <!-- Pitch lines -->
  <line x1="400" y1="70" x2="400" y2="390" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  <circle cx="400" cy="230" r="35" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  <circle cx="400" cy="230" r="3" fill="#F6EB61" opacity="0.6"/>
  
  <!-- Penalty areas -->
  <rect x="50" y="150" width="100" height="160" fill="none" stroke="#F6EB61" stroke-width="1" opacity="0.4"/>
  <rect x="650" y="150" width="100" height="160" fill="none" stroke="#F6EB61" stroke-width="1" opacity="0.4"/>
  
  <!-- Liverpool Left Formation (4-3-3) -->
  <!-- GK -->
  <circle cx="80" cy="230" r="12" fill="none" stroke="#C8102E" stroke-width="2"/>
  <text x="80" y="235" font-size="10" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">1</text>
  
  <!-- Defenders -->
  <circle cx="150" cy="130" r="12" fill="none" stroke="#C8102E" stroke-width="2"/>
  <text x="150" y="135" font-size="10" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">4</text>
  
  <circle cx="150" cy="230" r="12" fill="none" stroke="#C8102E" stroke-width="2"/>
  <text x="150" y="235" font-size="10" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">5</text>
  
  <circle cx="150" cy="330" r="12" fill="none" stroke="#C8102E" stroke-width="2"/>
  <text x="150" y="335" font-size="10" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">3</text>
  
  <!-- Midfielders -->
  <circle cx="240" cy="110" r="12" fill="none" stroke="#C8102E" stroke-width="2"/>
  <text x="240" y="115" font-size="10" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">6</text>
  
  <circle cx="240" cy="230" r="12" fill="none" stroke="#C8102E" stroke-width="2"/>
  <text x="240" y="235" font-size="10" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">8</text>
  
  <circle cx="240" cy="350" r="12" fill="none" stroke="#C8102E" stroke-width="2"/>
  <text x="240" y="355" font-size="10" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">7</text>
  
  <!-- Forwards -->
  <circle cx="320" cy="160" r="12" fill="none" stroke="#C8102E" stroke-width="2"/>
  <text x="320" y="165" font-size="10" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">9</text>
  
  <circle cx="320" cy="300" r="12" fill="none" stroke="#C8102E" stroke-width="2"/>
  <text x="320" y="305" font-size="10" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">11</text>
  
  <!-- Connection lines -->
  <line x1="80" y1="230" x2="150" y2="130" stroke="#FFFFFF" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="80" y1="230" x2="150" y2="230" stroke="#FFFFFF" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="80" y1="230" x2="150" y2="330" stroke="#FFFFFF" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
  
  <!-- Opposition Right Formation (4-2-3-1) -->
  <!-- GK -->
  <circle cx="720" cy="230" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="720" y="235" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">1</text>
  
  <!-- Defenders -->
  <circle cx="650" cy="130" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="650" y="135" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">2</text>
  
  <circle cx="650" cy="230" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="650" y="235" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">5</text>
  
  <circle cx="650" cy="330" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="650" y="335" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">3</text>
  
  <!-- Midfielders -->
  <circle cx="560" cy="180" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="560" y="185" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">4</text>
  
  <circle cx="560" cy="280" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="560" y="285" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">6</text>
  
  <!-- Attacking midfielders -->
  <circle cx="480" cy="120" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="480" y="125" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">10</text>
  
  <circle cx="480" cy="230" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="480" y="235" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">7</text>
  
  <circle cx="480" cy="340" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="480" y="345" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">11</text>
  
  <!-- Forward -->
  <circle cx="380" cy="230" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="380" y="235" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">9</text>
  
  <!-- Key Battle Indicators -->
  <circle cx="240" cy="230" r="20" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.7"/>
  <circle cx="320" cy="230" r="20" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.7"/>
  
  <!-- Battle annotation -->
  <text x="280" y="210" font-size="11" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">MIDFIELD</text>
  <text x="280" y="225" font-size="11" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">BATTLE</text>
  
  <!-- Legend -->
  <text x="60" y="410" font-size="10" fill="#C8102E" font-family="Arial, sans-serif" font-weight="bold">● Liverpool (4-3-3)</text>
  <text x="300" y="410" font-size="10" fill="#FFFFFF" font-family="Arial, sans-serif" font-weight="bold">● Opposition (4-2-3-1)</text>
  <text x="620" y="410" font-size="10" fill="#F6EB61" font-family="Arial, sans-serif" font-weight="bold">◈ Key Areas</text>
</svg>