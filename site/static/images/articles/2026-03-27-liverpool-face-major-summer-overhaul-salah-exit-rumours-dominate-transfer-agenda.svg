<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Sketchy border effect -->
  <rect width="800" height="420" fill="none" stroke="#C8102E" stroke-width="3" opacity="0.3" stroke-dasharray="5,5"/>
  
  <!-- Title text -->
  <text x="400" y="40" font-size="32" font-weight="bold" text-anchor="middle" fill="#F6EB61" font-family="Arial, sans-serif">TRANSFER RUMOURS</text>
  <text x="400" y="70" font-size="16" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" opacity="0.8">Contract Situations &amp; Potential Departures</text>
  
  <!-- Left side - Player silhouette (departing) -->
  <g opacity="0.9">
    <!-- Head -->
    <circle cx="150" cy="130" r="25" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    
    <!-- Body - Liverpool kit outline -->
    <rect x="130" y="160" width="40" height="60" fill="#C8102E" opacity="0.7"/>
    <rect x="130" y="160" width="40" height="10" fill="#FFFFFF" stroke="#C8102E" stroke-width="1"/>
    
    <!-- Arms -->
    <line x1="130" y1="175" x2="90" y2="190" stroke="#C8102E" stroke-width="3"/>
    <line x1="170" y1="175" x2="210" y2="190" stroke="#C8102E" stroke-width="3"/>
    
    <!-- Legs -->
    <line x1="140" y1="220" x2="135" y2="280" stroke="#FFFFFF" stroke-width="2.5"/>
    <line x1="160" y1="220" x2="165" y2="280" stroke="#FFFFFF" stroke-width="2.5"/>
  </g>
  
  <!-- Center - Directional arrows showing transfer movement -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#C8102E"/>
    </marker>
  </defs>
  
  <!-- Exit arrows -->
  <path d="M 280 180 Q 340 160 380 140" stroke="#F6EB61" stroke-width="3" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="8,4"/>
  <path d="M 280 220 Q 340 240 380 260" stroke="#C8102E" stroke-width="3" fill="none" marker-end="url(#arrowhead-red)" stroke-dasharray="8,4"/>
  
  <!-- Center question marks for uncertainty -->
  <text x="330" y="220" font-size="48" font-weight="bold" fill="#F6EB61" opacity="0.6" font-family="Arial, sans-serif">?</text>
  
  <!-- Right side - Multiple destination indicators -->
  <g opacity="0.8">
    <!-- Destination 1 -->
    <circle cx="550" cy="110" r="20" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="550" y1="90" x2="550" y2="50" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="550" y="35" font-size="12" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif">EXIT</text>
    
    <!-- Destination 2 -->
    <circle cx="650" cy="160" r="20" fill="none" stroke="#C8102E" stroke-width="2"/>
    <line x1="650" y1="140" x2="650" y2="100" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="650" y="85" font-size="12" text-anchor="middle" fill="#C8102E" font-family="Arial, sans-serif">LEAVE</text>
    
    <!-- Destination 3 -->
    <circle cx="600" cy="260" r="20" fill="none" stroke="#F6EB61" stroke-width="2"/>
    <line x1="600" y1="280" x2="600" y2="320" stroke="#F6EB61" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="600" y="340" font-size="12" text-anchor="middle" fill="#F6EB61" font-family="Arial, sans-serif">DEPART</text>
  </g>
  
  <!-- Bottom information boxes -->
  <rect x="50" y="340" width="250" height="60" fill="none" stroke="#C8102E" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="175" y="360" font-size="13" font-weight="bold" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif">Contract Concerns</text>
  <text x="175" y="378" font-size="11" text-anchor="middle" fill="#F6EB61" font-family="Arial, sans-serif">Expiring Deals • Negotiations</text>
  
  <rect x="500" y="340" width="250" height="60" fill="none" stroke="#F6EB61" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="625" y="360" font-size="13" font-weight="bold" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif">Potential Departures</text>
  <text x="625" y="378" font-size="11" text-anchor="middle" fill="#C8102E" font-family="Arial, sans-serif">Transfer Market • Squad Changes</text>
  
  <!-- Sketchy accent lines -->
  <line x1="100" y1="100" x2="120" y2="95" stroke="#F6EB61" stroke-width="1.5" opacity="0.4"/>
  <line x1="700" y1="150" x2="720" y2="155" stroke="#C8102E" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="300" x2="100" y2="310" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
</svg>