<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch outline -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.8">
    <rect x="60" y="40" width="680" height="340" stroke-dasharray="4,4"/>
    <line x1="400" y1="40" x2="400" y2="380"/>
    <circle cx="400" cy="210" r="50" stroke-dasharray="4,4"/>
    <circle cx="400" cy="210" r="4" fill="#FFFFFF"/>
  </g>
  
  <!-- Penalty areas -->
  <g stroke="#C8102E" stroke-width="1.5" fill="none" opacity="0.6">
    <rect x="60" y="105" width="120" height="210"/>
    <rect x="620" y="105" width="120" height="210"/>
  </g>
  
  <!-- Goal areas -->
  <g stroke="#F6EB61" stroke-width="1" fill="none" opacity="0.5">
    <rect x="60" y="155" width="60" height="110"/>
    <rect x="680" y="155" width="60" height="110"/>
  </g>
  
  <!-- Tactical formation circles - Liverpool formation -->
  <!-- Goalkeeper -->
  <circle cx="100" cy="210" r="18" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.9"/>
  <text x="100" y="215" font-size="12" fill="#C8102E" text-anchor="middle" font-weight="bold" opacity="0.8">GK</text>
  
  <!-- Defenders -->
  <circle cx="200" cy="140" r="16" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.8"/>
  <circle cx="200" cy="210" r="16" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.8"/>
  <circle cx="200" cy="280" r="16" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.8"/>
  <circle cx="260" cy="175" r="16" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.8"/>
  <circle cx="260" cy="245" r="16" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.8"/>
  
  <!-- Midfielders -->
  <circle cx="380" cy="130" r="16" fill="none" stroke="#F6EB61" stroke-width="2.5" opacity="0.8"/>
  <circle cx="380" cy="210" r="16" fill="none" stroke="#F6EB61" stroke-width="2.5" opacity="0.8"/>
  <circle cx="380" cy="290" r="16" fill="none" stroke="#F6EB61" stroke-width="2.5" opacity="0.8"/>
  <circle cx="320" cy="210" r="16" fill="none" stroke="#F6EB61" stroke-width="2.5" opacity="0.8"/>
  
  <!-- Forwards -->
  <circle cx="520" cy="160" r="16" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.9"/>
  <circle cx="520" cy="260" r="16" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.9"/>
  <circle cx="600" cy="210" r="16" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.9"/>
  
  <!-- Passing lines -->
  <g stroke="#FFFFFF" stroke-width="1" opacity="0.4" stroke-dasharray="2,3">
    <line x1="200" y1="210" x2="260" y2="175"/>
    <line x1="260" y1="210" x2="320" y2="210"/>
    <line x1="320" y1="210" x2="380" y2="210"/>
    <line x1="380" y1="210" x2="520" y2="160"/>
    <line x1="380" y1="210" x2="600" y2="210"/>
  </g>
  
  <!-- Key moment indicator - arrow -->
  <g opacity="0.7">
    <path d="M 520 160 L 650 100" stroke="#F6EB61" stroke-width="3" fill="none" stroke-linecap="round"/>
    <polygon points="650,100 640,110 655,120" fill="#F6EB61"/>
  </g>
  
  <!-- Slot tactical note bubble -->
  <g opacity="0.8">
    <rect x="620" y="50" width="160" height="80" rx="8" fill="#C8102E" opacity="0.15" stroke="#F6EB61" stroke-width="1.5"/>
    <text x="700" y="75" font-size="11" fill="#F6EB61" text-anchor="middle" font-weight="bold">SLOT'S</text>
    <text x="700" y="92" font-size="9" fill="#FFFFFF" text-anchor="middle">Attacking</text>
    <text x="700" y="108" font-size="9" fill="#FFFFFF" text-anchor="middle">Transitions</text>
    <text x="700" y="122" font-size="9" fill="#FFFFFF" text-anchor="middle">4-3-3 Fluid</text>
  </g>
  
  <!-- Title section -->
  <g>
    <rect x="20" y="370" width="760" height="40" fill="#C8102E" opacity="0.2" rx="4"/>
    <text x="400" y="395" font-size="20" fill="#F6EB61" text-anchor="middle" font-weight="bold" font-family="serif">MATCH REPORT - TACTICAL ANALYSIS</text>
  </g>
  
  <!-- Decorative sketch marks -->
  <g stroke="#FFFFFF" stroke-width="1" opacity="0.3" fill="none">
    <path d="M 40 30 Q 50 25 60 30"/>
    <path d="M 740 390 Q 750 385 760 390"/>
    <circle cx="750" cy="50" r="3" fill="#F6EB61" opacity="0.5"/>
    <circle cx="50" cy="370" r="3" fill="#F6EB61" opacity="0.5"/>
  </g>
</svg>