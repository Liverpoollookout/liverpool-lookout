<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch diagram background -->
  <rect x="50" y="40" width="700" height="340" fill="#1a4d2e" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
  
  <!-- Center line -->
  <line x1="400" y1="40" x2="400" y2="380" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="50" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  <circle cx="400" cy="210" r="4" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Left penalty area -->
  <rect x="50" y="110" width="80" height="200" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <rect x="50" y="140" width="30" height="140" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <circle cx="65" cy="210" r="8" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Right penalty area -->
  <rect x="670" y="110" width="80" height="200" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <rect x="720" y="140" width="30" height="140" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <circle x="735" cy="210" r="8" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Tactical player positions - Liverpool formation -->
  <!-- Goalkeeper -->
  <circle cx="70" cy="210" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="70" y="215" font-size="8" fill="#FFFFFF" text-anchor="middle" font-weight="bold">GK</text>
  
  <!-- Defenders -->
  <circle cx="180" cy="140" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="180" cy="210" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="180" cy="280" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="260" cy="175" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="260" cy="245" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Midfielders -->
  <circle cx="360" cy="130" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="360" cy="210" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="360" cy="290" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="420" cy="170" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="420" cy="250" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Forwards -->
  <circle cx="540" cy="160" r="12" fill="#C8102E" stroke="#F6EB61" stroke-width="2"/>
  <circle cx="540" cy="260" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="620" cy="210" r="12" fill="#C8102E" stroke="#F6EB61" stroke-width="2"/>
  
  <!-- Movement arrows showing tactical flow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61" opacity="0.7"/>
    </marker>
  </defs>
  
  <!-- Attack arrows -->
  <path d="M 420 210 Q 520 190 620 210" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 420 170 Q 500 140 540 160" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  
  <!-- Title sections with sketch style -->
  <g id="title-box">
    <rect x="50" y="5" width="250" height="25" fill="none" stroke="#F6EB61" stroke-width="2"/>
    <text x="60" y="22" font-size="18" font-weight="bold" fill="#F6EB61" font-family="Arial, sans-serif">MATCH REPORT</text>
  </g>
  
  <!-- Key moments box -->
  <g id="key-moments">
    <rect x="500" y="5" width="250" height="25" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="4,4"/>
    <text x="510" y="22" font-size="14" font-weight="bold" fill="#FFFFFF" font-family="Arial, sans-serif">Key Moments &amp; Ratings</text>
  </g>
  
  <!-- Slot tactical badge -->
  <g id="slot-badge">
    <circle cx="740" cy="380" r="20" fill="#C8102E" stroke="#F6EB61" stroke-width="2"/>
    <text x="740" y="385" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">SLOT</text>
  </g>
  
  <!-- Decorative sketched lines for emphasis -->
  <path d="M 55 390 Q 100 385 145 390" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <path d="M 655 390 Q 700 385 745 390" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Formation text -->
  <text x="400" y="330" font-size="13" font-weight="bold" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" opacity="0.8">Formation Tactical Adjustment</text>
</svg>