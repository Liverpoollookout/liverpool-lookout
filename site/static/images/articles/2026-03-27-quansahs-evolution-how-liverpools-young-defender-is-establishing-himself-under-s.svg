<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative corner accents -->
  <circle cx="50" cy="50" r="30" fill="#C8102E" opacity="0.1"/>
  <circle cx="750" cy="370" r="35" fill="#F6EB61" opacity="0.1"/>
  
  <!-- Sketch lines for artistic effect -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#C8102E" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="#F6EB61" stroke-width="1" opacity="0.15"/>
  
  <!-- Player figure - Jarell Quansah -->
  <!-- Head -->
  <circle cx="280" cy="100" r="35" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="270" cy="95" r="6" fill="#FFFFFF"/>
  <circle cx="290" cy="95" r="6" fill="#FFFFFF"/>
  <path d="M 275 110 Q 280 115 285 110" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Neck -->
  <line x1="280" y1="135" x2="280" y2="160" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- Liverpool red kit - torso -->
  <path d="M 240 160 L 320 160 L 330 240 L 230 240 Z" fill="#C8102E" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- White chest stripe detail -->
  <rect x="275" y="165" width="10" height="70" fill="#FFFFFF" opacity="0.3"/>
  
  <!-- Arms -->
  <line x1="240" y1="175" x2="150" y2="200" stroke="#C8102E" stroke-width="18" stroke-linecap="round"/>
  <line x1="320" y1="175" x2="410" y2="190" stroke="#C8102E" stroke-width="18" stroke-linecap="round"/>
  
  <!-- Hands -->
  <circle cx="145" cy="205" r="12" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="415" cy="195" r="12" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Legs -->
  <line x1="260" y1="240" x2="245" y2="340" stroke="#0a1628" stroke-width="16" stroke-linecap="round"/>
  <line x1="300" y1="240" x2="315" y2="340" stroke="#0a1628" stroke-width="16" stroke-linecap="round"/>
  
  <!-- Feet -->
  <ellipse cx="245" cy="350" rx="18" ry="12" fill="#FFFFFF"/>
  <ellipse cx="315" cy="350" rx="18" ry="12" fill="#FFFFFF"/>
  
  <!-- Jersey number 78 -->
  <text x="280" y="230" font-size="48" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">78</text>
  
  <!-- Decorative sketch marks around figure -->
  <path d="M 200 120 Q 210 110 220 120" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.6"/>
  <path d="M 340 140 Q 355 130 365 145" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.6"/>
  <path d="M 230 280 Q 220 290 230 300" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Player name text -->
  <text x="550" y="120" font-size="52" font-weight="bold" fill="#C8102E" font-family="Arial, sans-serif">QUANSAH</text>
  <text x="550" y="160" font-size="28" fill="#F6EB61" font-family="Arial, sans-serif" letter-spacing="3">DEFENDER</text>
  
  <!-- Accent lines for name section -->
  <line x1="540" y1="175" x2="780" y2="175" stroke="#C8102E" stroke-width="2" opacity="0.7"/>
  <line x1="540" y1="180" x2="720" y2="180" stroke="#F6EB61" stroke-width="1" opacity="0.5"/>
  
  <!-- Stats/highlight section -->
  <g opacity="0.85">
    <text x="550" y="240" font-size="16" fill="#FFFFFF" font-family="Arial, sans-serif" font-weight="bold">• Defensive leader</text>
    <text x="550" y="270" font-size="16" fill="#FFFFFF" font-family="Arial, sans-serif" font-weight="bold">• Academy prospect</text>
    <text x="550" y="300" font-size="16" fill="#FFFFFF" font-family="Arial, sans-serif" font-weight="bold">• Committed defender</text>
  </g>
  
  <!-- Corner badge element -->
  <circle cx="100" cy="370" r="45" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.4"/>
  <text x="100" y="380" font-size="14" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">LFC</text>
</svg>