<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative pitch lines -->
  <line x1="0" y1="210" x2="800" y2="210" stroke="#F6EB61" stroke-width="2" opacity="0.3" stroke-dasharray="10,10"/>
  <circle cx="400" cy="210" r="60" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Left player silhouette (departing) -->
  <g opacity="0.6">
    <!-- Head -->
    <circle cx="120" cy="100" r="25" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <!-- Body -->
    <rect x="105" y="130" width="30" height="60" fill="none" stroke="#FFFFFF" stroke-width="2.5" rx="5"/>
    <!-- Legs -->
    <line x1="115" y1="190" x2="115" y2="240" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="125" y1="190" x2="125" y2="240" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Arms -->
    <line x1="105" y1="145" x2="70" y2="130" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="135" y1="145" x2="170" y2="130" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Center player silhouette (Liverpool target) -->
  <g>
    <!-- Head -->
    <circle cx="400" cy="100" r="28" fill="none" stroke="#C8102E" stroke-width="3"/>
    <!-- Body in Liverpool Red -->
    <rect x="382" y="133" width="36" height="70" fill="none" stroke="#C8102E" stroke-width="3" rx="6"/>
    <!-- Jersey details -->
    <line x1="400" y1="133" x2="400" y2="203" stroke="#C8102E" stroke-width="2" opacity="0.7"/>
    <circle cx="400" cy="160" r="8" fill="none" stroke="#F6EB61" stroke-width="2"/>
    <!-- Legs -->
    <line x1="388" y1="203" x2="388" y2="260" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    <line x1="412" y1="203" x2="412" y2="260" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    <!-- Arms -->
    <line x1="382" y1="150" x2="340" y2="135" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    <line x1="418" y1="150" x2="460" y2="135" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Directional arrows -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#C8102E"/>
    </marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <!-- Incoming arrow -->
  <path d="M 250 100 Q 320 80 380 100" fill="none" stroke="#F6EB61" stroke-width="3" marker-end="url(#arrowGold)" stroke-dasharray="8,4"/>
  
  <!-- Outgoing arrow -->
  <path d="M 200 120 Q 150 140 100 160" fill="none" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arrowRed)" opacity="0.6"/>
  
  <!-- Right player silhouette (competing club) -->
  <g opacity="0.5">
    <!-- Head -->
    <circle cx="680" cy="100" r="25" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <!-- Body -->
    <rect x="665" y="130" width="30" height="60" fill="none" stroke="#FFFFFF" stroke-width="2.5" rx="5"/>
    <!-- Legs -->
    <line x1="675" y1="190" x2="675" y2="240" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="685" y1="190" x2="685" y2="240" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Arms -->
    <line x1="665" y1="145" x2="630" y2="130" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="695" y1="145" x2="730" y2="130" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Competing arrow -->
  <path d="M 580 120 Q 640 100 680 100" fill="none" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrowRed)" opacity="0.4" stroke-dasharray="6,4"/>
  
  <!-- Title text -->
  <text x="400" y="330" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#C8102E" text-anchor="middle" letter-spacing="2">TRANSFER TARGET</text>
  
  <!-- Fee estimate box -->
  <rect x="250" y="360" width="300" height="50" fill="none" stroke="#F6EB61" stroke-width="2.5" rx="8"/>
  <text x="400" y="382" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#F6EB61" text-anchor="middle">Estimated Fee: TBD</text>
  
  <!-- Sketch marks for authenticity -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.2"/>
  <circle cx="750" cy="380" r="25" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.2"/>
  <path d="M 30 350 Q 40 360 50 350" fill="none" stroke="#F6EB61" stroke-width="1" opacity="0.15"/>
</svg>