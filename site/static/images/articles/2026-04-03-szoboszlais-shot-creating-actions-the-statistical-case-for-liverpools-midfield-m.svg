<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative grid lines for stats vibe -->
  <g stroke="#C8102E" stroke-width="0.5" opacity="0.3">
    <line x1="100" y1="0" x2="100" y2="420"/>
    <line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="500" y1="0" x2="500" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="700" y1="0" x2="700" y2="420"/>
    <line x1="0" y1="70" x2="800" y2="70"/>
    <line x1="0" y1="140" x2="800" y2="140"/>
    <line x1="0" y1="210" x2="800" y2="210"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
  </g>
  
  <!-- Simplified pitch outline -->
  <rect x="60" y="50" width="680" height="320" fill="none" stroke="#F6EB61" stroke-width="2"/>
  <line x1="400" y1="50" x2="400" y2="370" stroke="#F6EB61" stroke-width="2"/>
  <circle cx="400" cy="210" r="40" fill="none" stroke="#F6EB61" stroke-width="2"/>
  <circle cx="400" cy="210" r="4" fill="#F6EB61"/>
  
  <!-- Left penalty area -->
  <rect x="60" y="120" width="80" height="180" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Right penalty area -->
  <rect x="660" y="120" width="80" height="180" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Player figure (sketched style) -->
  <!-- Head -->
  <circle cx="150" cy="140" r="18" fill="none" stroke="#C8102E" stroke-width="2"/>
  
  <!-- Body (Liverpool red kit) -->
  <ellipse cx="150" cy="180" rx="16" ry="28" fill="#C8102E" opacity="0.7" stroke="#C8102E" stroke-width="2"/>
  
  <!-- White stripe on shirt -->
  <line x1="140" y1="165" x2="160" y2="165" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Arms -->
  <line x1="134" y1="170" x2="100" y2="155" stroke="#C8102E" stroke-width="2.5"/>
  <line x1="166" y1="170" x2="200" y2="155" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Legs -->
  <line x1="142" y1="208" x2="135" y2="250" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="158" y1="208" x2="165" y2="250" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- Ball at feet -->
  <circle cx="160" cy="265" r="6" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Stats indicators with arrows -->
  <!-- Speed arrow -->
  <g>
    <line x1="250" y1="120" x2="340" y2="120" stroke="#F6EB61" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="260" y="110" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Speed</text>
  </g>
  
  <!-- Passing accuracy bar -->
  <g>
    <rect x="380" y="100" width="120" height="8" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <rect x="380" y="100" width="100" height="8" fill="#C8102E" opacity="0.8"/>
    <text x="505" y="110" font-family="Arial, sans-serif" font-size="11" fill="#F6EB61" font-weight="bold">85%</text>
  </g>
  
  <!-- Tackles bar -->
  <g>
    <rect x="550" y="100" width="120" height="8" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <rect x="550" y="100" width="85" height="8" fill="#C8102E" opacity="0.8"/>
    <text x="675" y="110" font-family="Arial, sans-serif" font-size="11" fill="#F6EB61" font-weight="bold">71%</text>
  </g>
  
  <!-- Goals stat -->
  <g>
    <circle cx="320" cy="240" r="35" fill="none" stroke="#C8102E" stroke-width="2"/>
    <text x="305" y="245" font-family="Arial, sans-serif" font-size="28" fill="#F6EB61" font-weight="bold">12</text>
    <text x="295" y="260" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">Goals</text>
  </g>
  
  <!-- Assists stat -->
  <g>
    <circle cx="500" cy="240" r="35" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <text x="485" y="245" font-family="Arial, sans-serif" font-size="28" fill="#F6EB61" font-weight="bold">8</text>
    <text x="480" y="260" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">Assists</text>
  </g>
  
  <!-- Main title -->
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="32" fill="#C8102E" font-weight="bold" text-anchor="middle">PLAYER STATISTICS</text>
  <text x="400" y="365" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Deep Dive Analysis</text>
  
  <!-- Liverpool badge accent -->
  <circle cx="730" cy="50" r="20" fill="none" stroke="#F6EB61" stroke-width="2"/>
  <text x="730" y="58" font-family="Arial, sans-serif" font-size="24" fill="#C8102E" font-weight="bold" text-anchor="middle">LFC</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
  </defs>
</svg>