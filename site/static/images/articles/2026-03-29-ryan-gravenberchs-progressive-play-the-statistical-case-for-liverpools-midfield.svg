<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative corner accent -->
  <rect x="0" y="0" width="80" height="80" fill="#C8102E" opacity="0.1"/>
  <rect x="720" y="340" width="80" height="80" fill="#C8102E" opacity="0.1"/>
  
  <!-- Pitch outline - simplified sketch style -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.8">
    <!-- Pitch rectangle -->
    <rect x="80" y="60" width="640" height="300" stroke-dasharray="5,3"/>
    
    <!-- Center line -->
    <line x1="400" y1="60" x2="400" y2="360"/>
    
    <!-- Center circle -->
    <circle cx="400" cy="210" r="40" stroke-dasharray="3,2"/>
    
    <!-- Center spot -->
    <circle cx="400" cy="210" r="3" fill="#FFFFFF"/>
    
    <!-- Left penalty area -->
    <rect x="80" y="120" width="80" height="180"/>
    
    <!-- Right penalty area -->
    <rect x="640" y="120" width="80" height="180"/>
    
    <!-- Left goal area -->
    <rect x="80" y="160" width="40" height="100"/>
    
    <!-- Right goal area -->
    <rect x="680" y="160" width="40" height="100"/>
  </g>
  
  <!-- Statistics visualization - bar charts with red accents -->
  <g>
    <!-- Left side stats bars -->
    <text x="40" y="380" font-size="12" fill="#F6EB61" font-family="Arial" font-weight="bold">STATS</text>
    
    <!-- Bar 1 -->
    <rect x="30" y="290" width="120" height="15" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
    <rect x="30" y="290" width="95" height="15" fill="#C8102E" opacity="0.7"/>
    <text x="155" y="301" font-size="11" fill="#FFFFFF" font-family="Arial">Goals</text>
    
    <!-- Bar 2 -->
    <rect x="30" y="315" width="120" height="15" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
    <rect x="30" y="315" width="85" height="15" fill="#C8102E" opacity="0.7"/>
    <text x="155" y="326" font-size="11" fill="#FFFFFF" font-family="Arial">Assists</text>
  </g>
  
  <!-- Right side stats visualization -->
  <g>
    <!-- Passing accuracy visualization -->
    <circle cx="690" cy="260" r="35" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <circle cx="690" cy="260" r="35" fill="none" stroke="#C8102E" stroke-width="3" stroke-dasharray="219.9,219.9" opacity="0.8" stroke-linecap="round"/>
    <text x="675" y="265" font-size="14" fill="#F6EB61" font-family="Arial" font-weight="bold">88%</text>
    <text x="650" y="305" font-size="10" fill="#FFFFFF" font-family="Arial">Pass Acc.</text>
  </g>
  
  <!-- Sketched player silhouette elements on pitch -->
  <g opacity="0.7">
    <!-- Player 1 position marker -->
    <circle cx="200" cy="180" r="20" fill="none" stroke="#C8102E" stroke-width="2"/>
    <circle cx="200" cy="180" r="8" fill="#C8102E" opacity="0.6"/>
    
    <!-- Player 2 position marker -->
    <circle cx="400" cy="140" r="20" fill="none" stroke="#C8102E" stroke-width="2"/>
    <circle cx="400" cy="140" r="8" fill="#C8102E" opacity="0.6"/>
    
    <!-- Player 3 position marker -->
    <circle cx="600" cy="220" r="20" fill="none" stroke="#C8102E" stroke-width="2"/>
    <circle cx="600" cy="220" r="8" fill="#C8102E" opacity="0.6"/>
  </g>
  
  <!-- Connection lines between positions - passing lanes -->
  <g stroke="#F6EB61" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,2">
    <line x1="200" y1="180" x2="400" y2="140"/>
    <line x1="400" y1="140" x2="600" y2="220"/>
    <line x1="200" y1="180" x2="600" y2="220"/>
  </g>
  
  <!-- Main title -->
  <text x="400" y="35" font-size="28" fill="#C8102E" font-family="Arial" font-weight="bold" text-anchor="middle" letter-spacing="2">PLAYER STATISTICS</text>
  
  <!-- Subtitle -->
  <text x="400" y="50" font-size="14" fill="#F6EB61" font-family="Arial" text-anchor="middle" letter-spacing="1">DEEP DIVE ANALYSIS</text>
  
  <!-- Decorative elements -->
  <g stroke="#C8102E" stroke-width="2" opacity="0.4" fill="none">
    <!-- Corner accents -->
    <line x1="95" y1="75" x2="120" y2="75"/>
    <line x1="95" y1="75" x2="95" y2="100"/>
    
    <line x1="705" y1="75" x2="680" y2="75"/>
    <line x1="705" y1="75" x2="705" y2="100"/>
    
    <line x1="95" y1="345" x2="120" y2="345"/>
    <line x1="95" y1="345" x2="95" y2="320"/>
    
    <line x1="705" y1="345" x2="680" y2="345"/>
    <line x1="705" y1="345" x2="705" y2="320"/>
  </g>
</svg>