<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch lines for context -->
  <line x1="50" y1="210" x2="750" y2="210" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="210" r="40" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.2"/>
  
  <!-- Player figure - sketched style -->
  <!-- Head -->
  <circle cx="280" cy="100" r="25" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Hair sketch -->
  <path d="M 260 80 Q 280 70 300 80" fill="none" stroke="#C8102E" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Body - Liverpool red kit -->
  <ellipse cx="280" cy="160" rx="35" ry="50" fill="#C8102E" opacity="0.8"/>
  
  <!-- Kit details -->
  <line x1="280" y1="140" x2="280" y2="200" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="265" y="135" width="30" height="25" fill="none" stroke="#FFFFFF" stroke-width="1.5" rx="3"/>
  
  <!-- Arms -->
  <line x1="250" y1="155" x2="210" y2="140" stroke="#C8102E" stroke-width="8" stroke-linecap="round"/>
  <line x1="310" y1="155" x2="350" y2="140" stroke="#C8102E" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Hands -->
  <circle cx="210" cy="140" r="8" fill="#C8102E"/>
  <circle cx="350" cy="140" r="8" fill="#C8102E"/>
  
  <!-- Legs -->
  <line x1="265" y1="205" x2="255" y2="280" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <line x1="295" y1="205" x2="305" y2="280" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Boots -->
  <ellipse cx="255" cy="285" rx="10" ry="12" fill="#0a1628" stroke="#C8102E" stroke-width="1.5"/>
  <ellipse cx="305" cy="285" rx="10" ry="12" fill="#0a1628" stroke="#C8102E" stroke-width="1.5"/>
  
  <!-- Ball at feet -->
  <circle cx="280" cy="300" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M 275 295 Q 280 300 285 295" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Scouting report elements - right side -->
  <!-- Rating boxes -->
  <g>
    <!-- Pace bar -->
    <text x="480" y="110" font-family="sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">PACE</text>
    <rect x="480" y="120" width="150" height="12" fill="none" stroke="#F6EB61" stroke-width="1.5" rx="2"/>
    <rect x="480" y="120" width="105" height="12" fill="#C8102E" rx="2" opacity="0.7"/>
    
    <!-- Technique bar -->
    <text x="480" y="160" font-family="sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">TECHNIQUE</text>
    <rect x="480" y="170" width="150" height="12" fill="none" stroke="#F6EB61" stroke-width="1.5" rx="2"/>
    <rect x="480" y="170" width="120" height="12" fill="#C8102E" rx="2" opacity="0.7"/>
    
    <!-- Vision bar -->
    <text x="480" y="210" font-family="sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">VISION</text>
    <rect x="480" y="220" width="150" height="12" fill="none" stroke="#F6EB61" stroke-width="1.5" rx="2"/>
    <rect x="480" y="220" width="110" height="12" fill="#C8102E" rx="2" opacity="0.7"/>
    
    <!-- Physicality bar -->
    <text x="480" y="260" font-family="sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">PHYSICALITY</text>
    <rect x="480" y="270" width="150" height="12" fill="none" stroke="#F6EB61" stroke-width="1.5" rx="2"/>
    <rect x="480" y="270" width="95" height="12" fill="#C8102E" rx="2" opacity="0.7"/>
  </g>
  
  <!-- Position indicator -->
  <circle cx="520" cy="330" r="30" fill="none" stroke="#F6EB61" stroke-width="2"/>
  <text x="505" y="338" font-family="sans-serif" font-size="16" fill="#F6EB61" font-weight="bold">MF</text>
  
  <!-- Potential arrow -->
  <path d="M 600 310 L 660 310" stroke="#C8102E" stroke-width="3" fill="none" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <text x="575" y="305" font-family="sans-serif" font-size="12" fill="#FFFFFF">POTENTIAL</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#C8102E"/>
    </marker>
  </defs>
  
  <!-- Title text -->
  <text x="50" y="380" font-family="sans-serif" font-size="18" fill="#F6EB61" font-weight="bold">ACADEMY PROSPECT</text>
  <text x="50" y="410" font-family="sans-serif" font-size="14" fill="#FFFFFF" opacity="0.8">First-Team Ready</text>
  
  <!-- Decorative corner element -->
  <circle cx="720" cy="40" r="25" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  <path d="M 710 40 L 730 40" stroke="#F6EB61" stroke-width="2" opacity="0.5"/>
  <path d="M 720 30 L 720 50" stroke="#F6EB61" stroke-width="2" opacity="0.5"/>
</svg>