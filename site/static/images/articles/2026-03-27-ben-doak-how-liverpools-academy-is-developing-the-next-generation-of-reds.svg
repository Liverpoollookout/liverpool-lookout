<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative pitch lines -->
  <line x1="50" y1="100" x2="750" y2="100" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  <line x1="50" y1="320" x2="750" y2="320" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="210" r="60" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.2"/>
  <line x1="400" y1="100" x2="400" y2="320" stroke="#F6EB61" stroke-width="1.5" opacity="0.2"/>
  
  <!-- Player figure - simplified sketch style -->
  <!-- Head -->
  <circle cx="400" cy="130" r="25" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <circle cx="393" cy="125" r="3" fill="#FFFFFF"/>
  <circle cx="407" cy="125" r="3" fill="#FFFFFF"/>
  <path d="M 400 130 L 400 140" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Body - Liverpool kit -->
  <rect x="375" y="160" width="50" height="70" rx="3" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <!-- Kit number placeholder -->
  <text x="400" y="205" font-size="28" font-weight="bold" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif">23</text>
  
  <!-- Arms with ball control sketch -->
  <line x1="375" y1="175" x2="340" y2="165" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="425" y1="175" x2="460" y2="160" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Legs in running pose -->
  <line x1="385" y1="230" x2="370" y2="290" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="415" y1="230" x2="430" y2="295" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Football/ball at foot -->
  <circle cx="430" cy="305" r="8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="424" y1="299" x2="436" y2="311" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="436" y1="299" x2="424" y2="311" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Upward arrow for potential -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
  </defs>
  <line x1="600" y1="280" x2="600" y2="160" stroke="#F6EB61" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Decorative stars for academy -->
  <polygon points="650,120 655,135 670,135 658,145 663,160 650,150 637,160 642,145 630,135 645,135" fill="#F6EB61" opacity="0.8"/>
  <polygon points="720,180 723,190 735,190 726,196 729,206 720,200 711,206 714,196 705,190 717,190" fill="#F6EB61" opacity="0.6"/>
  
  <!-- Text labels -->
  <text x="400" y="360" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">Academy Graduate</text>
  <text x="400" y="390" font-size="16" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">First-Team Potential</text>
  
  <!-- Sketch style accent lines -->
  <line x1="320" y1="145" x2="310" y2="135" stroke="#C8102E" stroke-width="1.5" opacity="0.5"/>
  <line x1="480" y1="200" x2="495" y2="195" stroke="#C8102E" stroke-width="1.5" opacity="0.5"/>
  <line x1="350" y1="270" x2="340" y2="280" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
</svg>