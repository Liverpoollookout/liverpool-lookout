<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative pitch lines -->
  <line x1="0" y1="210" x2="800" y2="210" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="210" r="60" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.2"/>
  
  <!-- Left arrow (departures) -->
  <g>
    <defs>
      <marker id="arrowLeft" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
        <polygon points="5,0 10,5 5,10" fill="#C8102E"/>
      </marker>
    </defs>
    <line x1="250" y1="150" x2="150" y2="150" stroke="#C8102E" stroke-width="3" marker-end="url(#arrowLeft)" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Central player figure silhouette -->
  <g>
    <!-- Head -->
    <circle cx="400" cy="90" r="25" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    
    <!-- Body in Liverpool red -->
    <rect x="380" y="120" width="40" height="50" fill="none" stroke="#C8102E" stroke-width="2.5" rx="3"/>
    
    <!-- Left arm -->
    <line x1="380" y1="135" x2="330" y2="120" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Right arm -->
    <line x1="420" y1="135" x2="470" y2="120" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Left leg -->
    <line x1="385" y1="170" x2="370" y2="220" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Right leg -->
    <line x1="415" y1="170" x2="430" y2="220" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Liverpool crest symbol on chest -->
    <circle cx="400" cy="140" r="8" fill="none" stroke="#F6EB61" stroke-width="1.5"/>
  </g>
  
  <!-- Right arrow (uncertainty/transition) -->
  <g>
    <defs>
      <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
        <polygon points="0,5 5,0 5,10" fill="#F6EB61"/>
      </marker>
    </defs>
    <line x1="550" y1="150" x2="650" y2="150" stroke="#F6EB61" stroke-width="3" marker-end="url(#arrowRight)" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Question mark for uncertainty -->
  <text x="680" y="165" font-size="36" font-weight="bold" fill="#F6EB61" font-family="serif">?</text>
  
  <!-- Exit/departure symbol on left -->
  <text x="100" y="165" font-size="28" font-weight="bold" fill="#C8102E" font-family="serif">✕</text>
  
  <!-- Text labels -->
  <text x="400" y="280" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="sans-serif">TRANSFER RUMOURS</text>
  
  <text x="400" y="320" font-size="18" fill="#C8102E" text-anchor="middle" font-family="sans-serif">Outgoings • Departures • Contract Situations</text>
  
  <!-- Decorative corner elements -->
  <rect x="20" y="20" width="60" height="60" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.4"/>
  <rect x="720" y="340" width="60" height="60" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.4"/>
  
  <!-- Sketch effect - random lines -->
  <line x1="380" y1="85" x2="390" y2="82" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <line x1="410" y1="88" x2="420" y2="85" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <line x1="470" y1="130" x2="480" y2="125" stroke="#C8102E" stroke-width="1" opacity="0.5"/>
  <line x1="330" y1="125" x2="320" y2="130" stroke="#C8102E" stroke-width="1" opacity="0.5"/>
</svg>