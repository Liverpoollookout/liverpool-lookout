<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch background -->
  <rect x="80" y="40" width="640" height="340" fill="#1a4d2e" stroke="#FFFFFF" stroke-width="2" opacity="0.9"/>
  
  <!-- Center line -->
  <line x1="400" y1="40" x2="400" y2="380" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="50" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Penalty areas sketch style -->
  <g stroke="#FFFFFF" stroke-width="1.5" fill="none">
    <rect x="80" y="110" width="120" height="200"/>
    <rect x="600" y="110" width="120" height="200"/>
  </g>
  
  <!-- Goal areas -->
  <g stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.6">
    <rect x="80" y="155" width="50" height="110"/>
    <rect x="670" y="155" width="50" height="110"/>
  </g>
  
  <!-- 4-2-3-1 Formation - Liverpool (Left side, attacking upward) -->
  <!-- Goalkeeper -->
  <circle cx="110" cy="210" r="12" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="110" y="215" font-size="10" fill="#C8102E" text-anchor="middle" font-weight="bold">GK</text>
  
  <!-- Defensive line (4 players) -->
  <circle cx="180" cy="130" r="13" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="180" y="135" font-size="9" fill="#C8102E" text-anchor="middle" font-weight="bold">LB</text>
  
  <circle cx="220" cy="180" r="13" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="220" y="185" font-size="9" fill="#C8102E" text-anchor="middle" font-weight="bold">CB</text>
  
  <circle cx="220" cy="240" r="13" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="220" y="245" font-size="9" fill="#C8102E" text-anchor="middle" font-weight="bold">CB</text>
  
  <circle cx="180" cy="290" r="13" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="180" y="295" font-size="9" fill="#C8102E" text-anchor="middle" font-weight="bold">RB</text>
  
  <!-- Midfield pivot (2 players) -->
  <circle cx="280" cy="170" r="13" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="280" y="175" font-size="9" fill="#C8102E" text-anchor="middle" font-weight="bold">DM</text>
  
  <circle cx="280" cy="250" r="13" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="280" y="255" font-size="9" fill="#C8102E" text-anchor="middle" font-weight="bold">DM</text>
  
  <!-- Attacking line (3 players) -->
  <circle cx="350" cy="120" r="13" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="350" y="125" font-size="9" fill="#C8102E" text-anchor="middle" font-weight="bold">LW</text>
  
  <circle cx="350" cy="210" r="13" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="350" y="215" font-size="9" fill="#C8102E" text-anchor="middle" font-weight="bold">CM</text>
  
  <circle cx="350" cy="300" r="13" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="350" y="305" font-size="9" fill="#C8102E" text-anchor="middle" font-weight="bold">RW</text>
  
  <!-- Striker -->
  <circle cx="420" cy="210" r="14" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text x="420" y="216" font-size="10" fill="#C8102E" text-anchor="middle" font-weight="bold">ST</text>
  
  <!-- Pressing triggers - animated arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <!-- Pressing movement arrows -->
  <path d="M 280 170 L 330 150" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 280 250 L 330 270" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 350 120 L 380 140" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 350 300 L 380 280" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  
  <!-- Title section with tactical info -->
  <rect x="480" y="50" width="300" height="300" fill="none" stroke="#F6EB61" stroke-width="2" stroke-dasharray="8,4" opacity="0.7"/>
  
  <!-- Main title -->
  <text x="630" y="80" font-size="24" font-weight="bold" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif">SLOT</text>
  <text x="630" y="105" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">4-2-3-1</text>
  
  <!-- Subtitle -->
  <text x="630" y="140" font-size="14" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">Tactical System</text>
  
  <!-- Info boxes -->
  <g font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">
    <text x="495" y="175" fill="#F6EB61" font-weight="bold">Pressing Trigger:</text>
    <text x="495" y="195">• High press intensity</text>
    <text x="495" y="212">• Wing triggers forward</text>
    <text x="495" y="229">• Central midfield support</text>
    <text x="495" y="246">• Compact defensive shape</text>
    
    <text x="495" y="280" fill="#F6EB61" font-weight="bold">Alternative:</text>
    <text x="495" y="300">4-3-3 vs low blocks</text>
    <text x="495" y="317">Extra midfield control</text>
  </g>
  
  <!-- Decorative sketchy lines for effect -->
  <path d="M 750 30 Q 760 40 750 50" stroke="#C8102E" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 760 350 Q 770 360 760 370" stroke="#F6EB61" stroke-width="1.5" fill="none" opacity="0.5"/>
  
  <!-- Bottom label -->
  <text x="400" y="405" font-size="13" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">Liverpool FC Tactical Analysis</text>
</svg>