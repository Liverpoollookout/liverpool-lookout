<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Title -->
  <text x="400" y="30" font-size="24" font-weight="bold" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">MATCH PREVIEW</text>
  
  <!-- Pitch outline -->
  <rect x="50" y="60" width="700" height="320" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  
  <!-- Center line -->
  <line x1="400" y1="60" x2="400" y2="380" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="220" r="40" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  
  <!-- Left team formation (Liverpool) -->
  <text x="150" y="50" font-size="14" font-weight="bold" fill="#C8102E" font-family="Arial, sans-serif">LIVERPOOL</text>
  
  <!-- Goalkeeper -->
  <circle cx="80" cy="220" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="80" y="245" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">GK</text>
  
  <!-- Defenders (4) -->
  <circle cx="150" cy="120" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="150" y="140" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">LB</text>
  
  <circle cx="150" cy="180" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="150" y="200" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">CB</text>
  
  <circle cx="150" cy="260" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="150" y="280" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">CB</text>
  
  <circle cx="150" cy="320" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="150" y="340" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">RB</text>
  
  <!-- Midfielders (3) -->
  <circle cx="250" cy="140" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="250" y="160" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">CM</text>
  
  <circle cx="250" cy="220" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="250" y="240" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">CM</text>
  
  <circle cx="250" cy="300" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="250" y="320" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">CM</text>
  
  <!-- Forwards (3) -->
  <circle cx="330" cy="100" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="330" y="120" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">LW</text>
  
  <circle cx="330" cy="220" r="12" fill="#C8102E" stroke="#F6EB61" stroke-width="2"/>
  <text x="330" y="240" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">ST</text>
  
  <circle cx="330" cy="340" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="330" y="360" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">RW</text>
  
  <!-- Right team formation (Opposition) -->
  <text x="650" y="50" font-size="14" font-weight="bold" fill="#FFFFFF" font-family="Arial, sans-serif">OPPONENT</text>
  
  <!-- Opponent goalkeeper -->
  <circle cx="720" cy="220" r="12" fill="#1a3a52" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="720" y="245" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">GK</text>
  
  <!-- Opponent defenders -->
  <circle cx="650" cy="120" r="10" fill="#1a3a52" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="650" cy="180" r="10" fill="#1a3a52" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="650" cy="260" r="10" fill="#1a3a52" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="650" cy="320" r="10" fill="#1a3a52" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Opponent midfielders -->
  <circle cx="550" cy="140" r="10" fill="#1a3a52" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="550" cy="220" r="10" fill="#1a3a52" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="550" cy="300" r="10" fill="#1a3a52" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Opponent forwards -->
  <circle cx="470" cy="100" r="10" fill="#1a3a52" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="470" cy="220" r="12" fill="#1a3a52" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="470" cy="340" r="10" fill="#1a3a52" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Key battle indicator lines -->
  <line x1="330" y1="220" x2="470" y2="220" stroke="#F6EB61" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
  
  <!-- Battle label -->
  <text x="400" y="215" font-size="10" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">KEY BATTLE</text>
  
  <!-- Footer info -->
  <rect x="50" y="390" width="700" height="25" fill="#C8102E" opacity="0.2" stroke="#C8102E" stroke-width="1"/>
  <text x="75" y="408" font-size="11" fill="#F6EB61" font-family="Arial, sans-serif">4-3-3 Formation | Lineup Prediction | Tactical Analysis</text>
</svg>