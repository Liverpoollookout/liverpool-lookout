<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative sketch lines -->
  <line x1="0" y1="40" x2="800" y2="40" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  <line x1="0" y1="380" x2="800" y2="380" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  
  <!-- Medical cross symbol - sketched style -->
  <g stroke="#C8102E" stroke-width="3" fill="none" stroke-linecap="round">
    <rect x="80" y="60" width="120" height="120" rx="8" opacity="0.6"/>
    <line x1="110" y1="100" x2="180" y2="100" stroke-width="3"/>
    <line x1="145" y1="65" x2="145" y2="135" stroke-width="3"/>
  </g>
  
  <!-- Player figure - sketched style -->
  <g stroke="#C8102E" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="350" cy="90" r="25" stroke-width="2"/>
    
    <!-- Body - Liverpool kit -->
    <ellipse cx="350" cy="155" rx="28" ry="40" fill="#C8102E" opacity="0.7"/>
    
    <!-- Arms -->
    <line x1="320" y1="135" x2="280" y2="110"/>
    <line x1="380" y1="135" x2="420" y2="110"/>
    
    <!-- Legs -->
    <line x1="335" y1="195" x2="320" y2="280"/>
    <line x1="365" y1="195" x2="380" y2="280"/>
    
    <!-- Boots -->
    <ellipse cx="320" cy="290" rx="12" ry="8" fill="#FFFFFF" opacity="0.8"/>
    <ellipse cx="380" cy="290" rx="12" ry="8" fill="#FFFFFF" opacity="0.8"/>
  </g>
  
  <!-- Fitness/medical elements -->
  <g stroke="#F6EB61" fill="none" stroke-width="2" stroke-linecap="round">
    <!-- Heartbeat line -->
    <path d="M 500 140 L 520 140 L 525 130 L 535 150 L 545 120 L 560 140 L 580 140" opacity="0.7"/>
    
    <!-- Assessment boxes -->
    <rect x="480" y="190" width="140" height="20" rx="3" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    <rect x="480" y="225" width="140" height="20" rx="3" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    <rect x="480" y="260" width="140" height="20" rx="3" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Checkmarks for fitness indicators -->
  <g stroke="#F6EB61" fill="none" stroke-width="2.5" stroke-linecap="round">
    <polyline points="625,200 632,207 645,190" opacity="0.7"/>
    <polyline points="625,235 632,242 645,225" opacity="0.5"/>
  </g>
  
  <!-- Calendar/fixture element -->
  <g stroke="#FFFFFF" fill="none" stroke-width="2" stroke-linecap="round">
    <rect x="620" y="70" width="130" height="100" rx="5" opacity="0.5"/>
    <line x1="630" y1="85" x2="740" y2="85" opacity="0.5"/>
    <circle cx="655" cy="130" r="8" fill="#C8102E" opacity="0.7"/>
    <path d="M 680 120 L 685 130 L 700 115" stroke="#F6EB61" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Main text - subject -->
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#C8102E" text-anchor="middle" opacity="0.9">
    INJURY UPDATE
  </text>
  
  <!-- Subtext -->
  <text x="400" y="375" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle" opacity="0.7">
    Fitness &amp; Availability Assessment
  </text>
  
  <!-- Decorative corner elements -->
  <circle cx="50" cy="30" r="8" fill="#F6EB61" opacity="0.4"/>
  <circle cx="750" cy="390" r="8" fill="#F6EB61" opacity="0.4"/>
  <line x1="750" y1="30" x2="720" y2="30" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  <line x1="80" y1="390" x2="50" y2="390" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
</svg>