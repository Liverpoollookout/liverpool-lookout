<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Anfield pitch outline -->
  <rect x="80" y="40" width="640" height="340" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  
  <!-- Center circle sketch -->
  <circle cx="400" cy="210" r="60" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.3" stroke-dasharray="3,3"/>
  
  <!-- Center spot -->
  <circle cx="400" cy="210" r="4" fill="#F6EB61" opacity="0.4"/>
  
  <!-- Player figure - stylized sketch of a legendary Liverpool player -->
  <!-- Head -->
  <circle cx="320" cy="140" r="28" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Hair/Head detail -->
  <path d="M 292 130 Q 320 110 348 130" fill="none" stroke="#C8102E" stroke-width="2"/>
  
  <!-- Body - Liverpool kit -->
  <ellipse cx="320" cy="210" rx="32" ry="50" fill="#C8102E" opacity="0.7"/>
  
  <!-- Kit detail - vertical stripe -->
  <line x1="320" y1="165" x2="320" y2="260" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Arms -->
  <line x1="288" y1="190" x2="240" y2="160" stroke="#C8102E" stroke-width="6" stroke-linecap="round"/>
  <line x1="352" y1="190" x2="400" y2="160" stroke="#C8102E" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Hands -->
  <circle cx="240" cy="160" r="6" fill="#C8102E"/>
  <circle cx="400" cy="160" r="6" fill="#C8102E"/>
  
  <!-- Legs in motion -->
  <line x1="305" y1="260" x2="295" y2="320" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
  <line x1="335" y1="260" x2="350" y2="320" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
  
  <!-- Boots -->
  <ellipse cx="295" cy="325" rx="8" ry="10" fill="#0a1628" stroke="#C8102E" stroke-width="1.5"/>
  <ellipse cx="350" cy="325" rx="8" ry="10" fill="#0a1628" stroke="#C8102E" stroke-width="1.5"/>
  
  <!-- Football near foot -->
  <circle cx="365" cy="310" r="10" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M 365 300 L 365 320 M 355 310 L 375 310" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Shout/celebration lines -->
  <path d="M 285 110 Q 280 95 290 85" fill="none" stroke="#F6EB61" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 310 100 Q 305 80 320 70" fill="none" stroke="#F6EB61" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 335 105 Q 345 85 360 75" fill="none" stroke="#F6EB61" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Background goal posts - faded -->
  <line x1="120" y1="120" x2="120" y2="300" stroke="#F6EB61" stroke-width="2" opacity="0.15"/>
  <line x1="680" y1="120" x2="680" y2="300" stroke="#F6EB61" stroke-width="2" opacity="0.15"/>
  <line x1="120" y1="120" x2="680" y2="120" stroke="#F6EB61" stroke-width="2" opacity="0.15"/>
  
  <!-- Crowd impression - scattered marks -->
  <circle cx="150" cy="50" r="3" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="180" cy="45" r="2.5" fill="#FFFFFF" opacity="0.12"/>
  <circle cx="210" cy="48" r="2" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="650" cy="52" r="3" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="680" cy="46" r="2.5" fill="#FFFFFF" opacity="0.12"/>
  <circle cx="720" cy="50" r="2" fill="#FFFFFF" opacity="0.1"/>
  
  <!-- Title text -->
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#C8102E" text-anchor="middle" letter-spacing="2">
    ANFIELD LEGEND
  </text>
  
  <!-- Decorative accent lines -->
  <line x1="100" y1="395" x2="300" y2="395" stroke="#F6EB61" stroke-width="2"/>
  <line x1="500" y1="395" x2="700" y2="395" stroke="#F6EB61" stroke-width="2"/>
</svg>