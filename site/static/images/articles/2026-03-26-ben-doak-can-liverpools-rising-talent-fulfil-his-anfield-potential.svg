<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch lines - subtle background -->
  <line x1="400" y1="0" x2="400" y2="420" stroke="#1a2a3a" stroke-width="2" opacity="0.3"/>
  <ellipse cx="400" cy="210" rx="60" ry="80" fill="none" stroke="#1a2a3a" stroke-width="1" opacity="0.2"/>
  <circle cx="400" cy="210" r="4" fill="#1a2a3a" opacity="0.3"/>
  
  <!-- Young player figure in Liverpool red -->
  <!-- Head -->
  <circle cx="200" cy="80" r="25" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.9"/>
  
  <!-- Body/shirt -->
  <path d="M 190 105 L 175 170 L 190 180 L 210 180 L 225 170 L 210 105 Z" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.9" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Left arm -->
  <path d="M 185 115 L 155 140" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.9" stroke-linecap="round"/>
  <circle cx="155" cy="140" r="5" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.9"/>
  
  <!-- Right arm -->
  <path d="M 215 115 L 245 145" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.9" stroke-linecap="round"/>
  <circle cx="245" cy="145" r="5" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.9"/>
  
  <!-- Left leg -->
  <path d="M 190 180 L 180 250" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.9" stroke-linecap="round"/>
  <circle cx="180" cy="260" r="6" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.9"/>
  
  <!-- Right leg -->
  <path d="M 210 180 L 220 250" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.9" stroke-linecap="round"/>
  <circle cx="220" cy="260" r="6" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.9"/>
  
  <!-- Ball at foot -->
  <circle cx="225" cy="265" r="8" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
  <path d="M 220 262 L 230 268" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  
  <!-- Scouting evaluation chart on right -->
  <!-- Chart background box -->
  <rect x="380" y="40" width="380" height="280" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.7" stroke-dasharray="5,3" rx="4"/>
  
  <!-- Title -->
  <text x="400" y="65" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#F6EB61" opacity="0.95">ACADEMY PROSPECT</text>
  
  <!-- Skill bars -->
  <!-- Pace -->
  <text x="400" y="110" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" opacity="0.8">Pace</text>
  <rect x="480" y="100" width="200" height="8" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4" rx="2"/>
  <rect x="480" y="100" width="165" height="8" fill="#C8102E" opacity="0.8" rx="2"/>
  
  <!-- Technical -->
  <text x="400" y="145" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" opacity="0.8">Technical</text>
  <rect x="480" y="135" width="200" height="8" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4" rx="2"/>
  <rect x="480" y="135" width="180" height="8" fill="#C8102E" opacity="0.8" rx="2"/>
  
  <!-- Physical -->
  <text x="400" y="180" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" opacity="0.8">Physical</text>
  <rect x="480" y="170" width="200" height="8" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4" rx="2"/>
  <rect x="480" y="170" width="145" height="8" fill="#C8102E" opacity="0.8" rx="2"/>
  
  <!-- Mentality -->
  <text x="400" y="215" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" opacity="0.8">Mentality</text>
  <rect x="480" y="205" width="200" height="8" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4" rx="2"/>
  <rect x="480" y="205" width="190" height="8" fill="#C8102E" opacity="0.8" rx="2"/>
  
  <!-- Positional indicators -->
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="12" fill="#F6EB61" opacity="0.85">Position: Midfielder</text>
  <text x="400" y="285" font-family="Arial, sans-serif" font-size="12" fill="#F6EB61" opacity="0.85">First-Team Ready: HIGH POTENTIAL</text>
  
  <!-- Stars for rating -->
  <g opacity="0.9">
    <polygon points="715,295 720,310 736,310 723,320 728,335 715,325 702,335 707,320 694,310 710,310" fill="#F6EB61"/>
    <polygon points="745,295 750,310 766,310 753,320 758,335 745,325 732,335 737,320 724,310 740,310" fill="#F6EB61"/>
    <polygon points="775,295 780,310 796,310 783,320 788,335 775,325 762,335 767,320 754,310 770,310" fill="#F6EB61"/>
  </g>
  
  <!-- Directional arrows - showing progression -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61" opacity="0.7"/>
    </marker>
  </defs>
  
  <!-- Arrow showing growth trajectory -->
  <path d="M 280 320 Q 350 280 420 300" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
  
  <!-- Footer text -->
  <text x="400" y="395" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.6" text-anchor="middle">Liverpool FC Academy | Scouting Report</text>
</svg>