<svg viewBox="0 0 800 420" class="article-svg" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative sketch lines background -->
  <line x1="50" y1="80" x2="150" y2="120" stroke="#C8102E" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
  <line x1="700" y1="100" x2="750" y2="180" stroke="#F6EB61" stroke-width="2" opacity="0.2" stroke-dasharray="5,5"/>
  
  <!-- Main Liverpool FC Shield outline (sketched style) -->
  <g transform="translate(200, 80)">
    <!-- Shield shape -->
    <path d="M 0 0 L 120 0 L 120 80 Q 60 140 60 140 Q 60 140 0 80 Z" 
          fill="none" stroke="#C8102E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Shield fill with lighter red -->
    <path d="M 5 5 L 115 5 L 115 75 Q 60 130 60 130 Q 60 130 5 75 Z" 
          fill="#C8102E" opacity="0.9"/>
  </g>
  
  <!-- Stylized Liverpool Bird (simplified sketch) -->
  <g transform="translate(280, 120)">
    <!-- Bird body -->
    <circle cx="0" cy="0" r="15" fill="#FFFFFF" stroke="#F6EB61" stroke-width="2"/>
    
    <!-- Bird head -->
    <circle cx="8" cy="-12" r="10" fill="#FFFFFF" stroke="#F6EB61" stroke-width="2"/>
    
    <!-- Eye -->
    <circle cx="12" cy="-14" r="2" fill="#0a1628"/>
    
    <!-- Wing strokes (sketch style) -->
    <path d="M -8 -5 Q -25 -10 -30 5" stroke="#F6EB61" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M -10 0 Q -28 -2 -32 12" stroke="#F6EB61" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Tail feathers -->
    <path d="M 8 8 Q 20 15 18 25" stroke="#F6EB61" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 5 10 Q 18 18 15 28" stroke="#F6EB61" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Opinion article elements -->
  <g transform="translate(400, 150)">
    <!-- Thought bubble circle -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="#F6EB61" stroke-width="2" stroke-dasharray="3,3" opacity="0.8"/>
    
    <!-- Small connecting circles (speech bubble style) -->
    <circle cx="-35" cy="35" r="8" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.8"/>
    <circle cx="-45" cy="48" r="5" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Accent lines (sketchy editorial marks) -->
  <line x1="100" y1="300" x2="700" y2="300" stroke="#C8102E" stroke-width="2" opacity="0.2"/>
  <line x1="100" y1="310" x2="400" y2="310" stroke="#C8102E" stroke-width="2" opacity="0.15"/>
  
  <!-- Title text: OPINION -->
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="#C8102E" text-anchor="middle" letter-spacing="2" opacity="0.95">OPINION</text>
  
  <!-- Subtitle text -->
  <text x="400" y="395" font-family="Arial, sans-serif" font-size="18" 
        fill="#FFFFFF" text-anchor="middle" opacity="0.7">Liverpool FC Analysis</text>
  
  <!-- Decorative corner elements -->
  <g transform="translate(50, 30)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
  </g>
  
  <g transform="translate(750, 390)">
    <line x1="0" y1="0" x2="-40" y2="0" stroke="#C8102E" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="0" x2="0" y2="-40" stroke="#C8102E" stroke-width="2" opacity="0.5"/>
  </g>
</svg>