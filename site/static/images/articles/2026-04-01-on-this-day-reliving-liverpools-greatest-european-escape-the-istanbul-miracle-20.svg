<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Anfield pitch lines - subtle background -->
  <line x1="400" y1="0" x2="400" y2="420" stroke="#1a2a3a" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="210" r="80" fill="none" stroke="#1a2a3a" stroke-width="2" opacity="0.3"/>
  <rect x="50" y="150" width="100" height="120" fill="none" stroke="#1a2a3a" stroke-width="2" opacity="0.3"/>
  <rect x="650" y="150" width="100" height="120" fill="none" stroke="#1a2a3a" stroke-width="2" opacity="0.3"/>
  
  <!-- Title banner -->
  <rect x="50" y="30" width="700" height="60" fill="none" stroke="#F6EB61" stroke-width="3"/>
  <text x="400" y="70" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#F6EB61" text-anchor="middle" letter-spacing="2">KENNY DALGLISH</text>
  
  <!-- Player figure - sketched style -->
  <!-- Head -->
  <circle cx="200" cy="120" r="35" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="185" cy="110" r="6" fill="#FFFFFF"/>
  <circle cx="215" cy="110" r="6" fill="#FFFFFF"/>
  <path d="M 200 125 Q 195 130 190 130" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Body - Liverpool red kit -->
  <ellipse cx="200" cy="190" rx="45" ry="55" fill="none" stroke="#C8102E" stroke-width="3"/>
  <!-- Kit details -->
  <line x1="170" y1="160" x2="170" y2="240" stroke="#C8102E" stroke-width="2.5"/>
  <line x1="230" y1="160" x2="230" y2="240" stroke="#C8102E" stroke-width="2.5"/>
  <line x1="200" y1="160" x2="200" y2="240" stroke="#C8102E" stroke-width="2"/>
  
  <!-- Left arm -->
  <path d="M 155 170 Q 120 160 110 210" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <!-- Left hand -->
  <circle cx="110" cy="210" r="12" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- Right arm -->
  <path d="M 245 170 Q 280 160 290 210" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <!-- Right hand -->
  <circle cx="290" cy="210" r="12" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- Left leg -->
  <path d="M 175 245 Q 165 290 160 340" fill="none" stroke="#0a1628" stroke-width="3" stroke-linecap="round"/>
  <!-- Left boot -->
  <rect x="150" y="335" width="20" height="25" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Right leg -->
  <path d="M 225 245 Q 235 290 240 340" fill="none" stroke="#0a1628" stroke-width="3" stroke-linecap="round"/>
  <!-- Right boot -->
  <rect x="230" y="335" width="20" height="25" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Ball at feet -->
  <circle cx="235" cy="355" r="15" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="220" y1="355" x2="250" y2="355" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="235" y1="340" x2="235" y2="370" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Golden accent lines - iconic moment shimmer -->
  <path d="M 320 100 Q 380 80 440 100" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6" stroke-dasharray="5,5"/>
  <path d="M 330 280 Q 400 320 470 280" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6" stroke-dasharray="5,5"/>
  
  <!-- Legend label -->
  <rect x="480" y="140" width="280" height="180" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Text content -->
  <text x="500" y="175" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#C8102E">KING KENNY</text>
  <text x="500" y="205" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Liverpool Legend</text>
  <text x="500" y="230" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">
    <tspan x="500" dy="0">• 118 League Goals</tspan>
    <tspan x="500" dy="18">• 6 Major Trophies</tspan>
    <tspan x="500" dy="18">• Anfield Icon</tspan>
  </text>
  
  <!-- Decorative corner elements -->
  <circle cx="100" cy="380" r="25" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.4"/>
  <circle cx="700" cy="60" r="20" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.4"/>
</svg>