<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Subtle pitch lines in background -->
  <line x1="400" y1="0" x2="400" y2="420" stroke="#1a2a3a" stroke-width="2" opacity="0.3"/>
  <line x1="0" y1="210" x2="800" y2="210" stroke="#1a2a3a" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="210" r="40" fill="none" stroke="#1a2a3a" stroke-width="1" opacity="0.3"/>
  
  <!-- Sketched figure of a legendary Liverpool player (simplified) -->
  <!-- Head -->
  <circle cx="280" cy="100" r="35" fill="none" stroke="#C8102E" stroke-width="3" opacity="0.8"/>
  
  <!-- Body in red kit -->
  <path d="M 280 135 Q 275 180 270 220" fill="none" stroke="#C8102E" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Red jersey accent lines -->
  <line x1="260" y1="150" x2="300" y2="150" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
  <circle cx="280" cy="165" r="20" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
  
  <!-- Arms -->
  <path d="M 275 145 Q 240 140 220 160" fill="none" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
  <path d="M 285 145 Q 320 130 345 120" fill="none" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Legs -->
  <path d="M 270 220 L 265 300" fill="none" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
  <path d="M 270 220 L 280 310" fill="none" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Boots -->
  <ellipse cx="265" cy="310" rx="8" ry="12" fill="#0a1628" stroke="#FFFFFF" stroke-width="2"/>
  <ellipse cx="280" cy="320" rx="8" ry="12" fill="#0a1628" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Ball at feet -->
  <circle cx="275" cy="330" r="12" fill="none" stroke="#F6EB61" stroke-width="2.5"/>
  <path d="M 275 320 Q 273 325 275 330" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Sketchy motion lines -->
  <path d="M 350 115 Q 380 110 410 115" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M 360 130 Q 390 128 420 135" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Title text: "You'll Never Walk Alone" spirit -->
  <text x="500" y="120" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#C8102E" opacity="0.9">
    ANFIELD
  </text>
  <text x="500" y="155" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" opacity="0.85">
    LEGEND
  </text>
  
  <!-- Golden accent line under title -->
  <line x1="500" y1="165" x2="640" y2="165" stroke="#F6EB61" stroke-width="2.5" opacity="0.7"/>
  
  <!-- Historic moment indicator -->
  <path d="M 480 200 L 520 220 L 500 240 L 480 220 Z" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
  <text x="530" y="230" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.7">
    Historic Victory
  </text>
  
  <!-- Decorative sketchy elements for artistic effect -->
  <path d="M 150 50 Q 160 60 150 70" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.3"/>
  <path d="M 650 350 Q 670 360 650 380" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
  <circle cx="700" cy="80" r="15" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.25"/>
</svg>