<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Sketch border effect -->
  <rect width="800" height="420" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
  
  <!-- Left departing player silhouette -->
  <g opacity="0.8">
    <!-- Head -->
    <circle cx="150" cy="100" r="25" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-dasharray="3,2"/>
    <!-- Body - Liverpool shirt -->
    <rect x="125" y="130" width="50" height="60" rx="5" fill="#C8102E" opacity="0.6" stroke="#C8102E" stroke-width="2"/>
    <!-- Arms -->
    <line x1="125" y1="145" x2="85" y2="160" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="175" y1="145" x2="215" y2="160" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="135" y1="190" x2="130" y2="260" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="165" y1="190" x2="170" y2="260" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Boots -->
    <ellipse cx="130" cy="265" rx="8" ry="12" fill="#0a1628" stroke="#FFFFFF" stroke-width="1.5"/>
    <ellipse cx="170" cy="265" rx="8" ry="12" fill="#0a1628" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>
  
  <!-- Exit arrow pointing left -->
  <g>
    <defs>
      <marker id="arrowLeft" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
        <polygon points="5,0 10,5 5,10" fill="#F6EB61"/>
      </marker>
    </defs>
    <path d="M 220 180 Q 200 160 180 150" stroke="#F6EB61" stroke-width="3" fill="none" marker-end="url(#arrowLeft)" stroke-dasharray="5,4"/>
  </g>
  
  <!-- Center divider with question mark -->
  <circle cx="400" cy="210" r="35" fill="none" stroke="#F6EB61" stroke-width="2.5" stroke-dasharray="4,3"/>
  <text x="400" y="225" font-size="48" font-weight="bold" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">?</text>
  
  <!-- Right - Stay or Go player silhouette -->
  <g opacity="0.7">
    <!-- Head -->
    <circle cx="650" cy="100" r="25" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-dasharray="3,2"/>
    <!-- Body - Liverpool shirt -->
    <rect x="625" y="130" width="50" height="60" rx="5" fill="#C8102E" opacity="0.6" stroke="#C8102E" stroke-width="2"/>
    <!-- Arms -->
    <line x1="625" y1="145" x2="585" y2="160" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="675" y1="145" x2="715" y2="160" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="635" y1="190" x2="630" y2="260" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="665" y1="190" x2="670" y2="260" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Boots -->
    <ellipse cx="630" cy="265" rx="8" ry="12" fill="#0a1628" stroke="#FFFFFF" stroke-width="1.5"/>
    <ellipse cx="670" cy="265" rx="8" ry="12" fill="#0a1628" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>
  
  <!-- Bidirectional arrow for uncertainty -->
  <g>
    <defs>
      <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
        <polygon points="0,5 5,0 5,10" fill="#FFFFFF"/>
      </marker>
      <marker id="arrowLeftWhite" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
        <polygon points="5,0 10,5 5,10" fill="#FFFFFF"/>
      </marker>
    </defs>
    <line x1="580" y1="180" x2="540" y2="160" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arrowLeftWhite)" stroke-dasharray="4,3"/>
    <line x1="620" y1="180" x2="660" y2="160" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arrowRight)" stroke-dasharray="4,3"/>
  </g>
  
  <!-- Title text -->
  <text x="400" y="340" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">TRANSFER RUMOURS</text>
  
  <!-- Subtitle -->
  <text x="400" y="370" font-size="16" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" font-style="italic">Outgoings • Contract Situations • Departures</text>
  
  <!-- Liverpool FC crest-like element top right -->
  <g opacity="0.5">
    <circle cx="700" cy="40" r="20" fill="none" stroke="#C8102E" stroke-width="2"/>
    <circle cx="700" cy="40" r="15" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <text x="700" y="46" font-size="24" font-weight="bold" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif">LFC</text>
  </g>
  
  <!-- Decorative sketch elements -->
  <g opacity="0.4">
    <path d="M 50 50 Q 60 45 70 50" stroke="#F6EB61" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 730 370 Q 740 365 750 370" stroke="#F6EB61" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 30 300 Q 35 295 40 300" stroke="#C8102E" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M 760 120 Q 770 115 780 120" stroke="#C8102E" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>
</svg>