<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="20" fill="#F6EB61" opacity="0.1"/>
  <circle cx="770" cy="390" r="25" fill="#F6EB61" opacity="0.1"/>
  
  <!-- Pitch outline - stylised sketch -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.6">
    <rect x="80" y="60" width="640" height="300" stroke-dasharray="5,5"/>
    <line x1="400" y1="60" x2="400" y2="360" stroke-dasharray="3,3"/>
    <circle cx="400" cy="210" r="40" stroke-dasharray="3,3"/>
    <circle cx="400" cy="210" r="3" fill="#FFFFFF"/>
  </g>
  
  <!-- Left penalty area -->
  <rect x="80" y="110" width="80" height="200" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.4"/>
  <rect x="80" y="150" width="40" height="120" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Right penalty area -->
  <rect x="640" y="110" width="80" height="200" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.4"/>
  <rect x="680" y="150" width="40" height="120" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Tactical arrows showing movement -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#C8102E"/>
    </marker>
  </defs>
  
  <!-- Player positions and movements -->
  <!-- Goalkeeper -->
  <circle cx="120" cy="210" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="120" y1="198" x2="120" y2="222" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Defenders with tactical flow -->
  <circle cx="200" cy="140" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M200,140 L240,160" stroke="#F6EB61" stroke-width="2" marker-end="url(#arrowRed)" opacity="0.7"/>
  
  <circle cx="200" cy="210" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M200,210 L240,210" stroke="#F6EB61" stroke-width="2" marker-end="url(#arrowRed)" opacity="0.7"/>
  
  <circle cx="200" cy="280" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M200,280 L240,260" stroke="#F6EB61" stroke-width="2" marker-end="url(#arrowRed)" opacity="0.7"/>
  
  <!-- Midfielders -->
  <circle cx="320" cy="160" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M320,160 L370,180" stroke="#F6EB61" stroke-width="2" marker-end="url(#arrowRed)" opacity="0.6"/>
  
  <circle cx="320" cy="260" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M320,260 L370,240" stroke="#F6EB61" stroke-width="2" marker-end="url(#arrowRed)" opacity="0.6"/>
  
  <!-- Forward -->
  <circle cx="500" cy="210" r="12" fill="#C8102E" stroke="#FFFFFF" stroke-width="3"/>
  <path d="M500,210 L560,210" stroke="#F6EB61" stroke-width="3" marker-end="url(#arrowRed)" opacity="0.8"/>
  
  <!-- Slot tactical decision indicator -->
  <g opacity="0.5">
    <circle cx="400" cy="80" r="35" fill="none" stroke="#F6EB61" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="400" y="88" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F6EB61" text-anchor="middle">SLOT</text>
  </g>
  
  <!-- Match report title -->
  <g>
    <text x="400" y="400" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#C8102E" text-anchor="middle">MATCH REPORT</text>
  </g>
  
  <!-- Key moment indicators -->
  <g opacity="0.6">
    <rect x="50" y="380" width="15" height="15" fill="#C8102E"/>
    <text x="75" y="392" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">Attacking Move</text>
    
    <rect x="300" y="380" width="15" height="15" fill="#F6EB61"/>
    <text x="320" y="392" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">Tactical Shift</text>
  </g>
  
  <!-- Decorative sketch lines -->
  <g stroke="#FFFFFF" stroke-width="1" opacity="0.2">
    <path d="M 700 100 Q 720 110 700 120" fill="none"/>
    <path d="M 710 150 Q 730 160 710 170" fill="none"/>
    <path d="M 705 200 Q 725 210 705 220" fill="none"/>
  </g>
</svg>