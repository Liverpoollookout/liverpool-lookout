<svg viewBox="0 0 800 420" class="article-svg" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Sketch-style pitch -->
  <g stroke="#F6EB61" stroke-width="2" fill="none" opacity="0.6">
    <!-- Center line -->
    <line x1="400" y1="60" x2="400" y2="360"/>
    <!-- Center circle -->
    <circle cx="400" cy="210" r="45"/>
    <!-- Center spot -->
    <circle cx="400" cy="210" r="3" fill="#F6EB61"/>
    <!-- Halfway line -->
    <line x1="50" y1="210" x2="750" y2="210"/>
  </g>
  
  <!-- Left penalty area (sketchy style) -->
  <g stroke="#C8102E" stroke-width="2.5" fill="none">
    <rect x="50" y="120" width="100" height="180" opacity="0.7"/>
    <rect x="50" y="150" width="60" height="120" opacity="0.5"/>
    <circle cx="85" cy="210" r="8" opacity="0.6"/>
  </g>
  
  <!-- Right penalty area (sketchy style) -->
  <g stroke="#C8102E" stroke-width="2.5" fill="none">
    <rect x="700" y="120" width="-100" height="180" opacity="0.7"/>
    <rect x="700" y="150" width="-60" height="120" opacity="0.5"/>
    <circle cx="715" cy="210" r="8" opacity="0.6"/>
  </g>
  
  <!-- Left team formation (Liverpool - sketched players) -->
  <g stroke="#FFFFFF" stroke-width="1.5" fill="#C8102E" opacity="0.9">
    <!-- Goalkeeper -->
    <circle cx="80" cy="210" r="12"/>
    <line x1="75" y1="205" x2="85" y2="215" stroke="#FFFFFF" stroke-width="1"/>
    
    <!-- Defenders -->
    <circle cx="180" cy="140" r="11"/>
    <circle cx="180" cy="210" r="11"/>
    <circle cx="180" cy="280" r="11"/>
    <circle cx="240" cy="170" r="11"/>
    <circle cx="240" cy="250" r="11"/>
    
    <!-- Midfielders -->
    <circle cx="320" cy="120" r="10"/>
    <circle cx="320" cy="210" r="10"/>
    <circle cx="320" cy="300" r="10"/>
    <circle cx="370" cy="160" r="10"/>
    <circle cx="370" cy="260" r="10"/>
    
    <!-- Forwards -->
    <circle cx="480" cy="140" r="10"/>
    <circle cx="480" cy="280" r="10"/>
    <circle cx="530" cy="210" r="11"/>
  </g>
  
  <!-- Right team formation (Opposition - sketched players) -->
  <g stroke="#FFFFFF" stroke-width="1.5" fill="#94A3B8" opacity="0.8">
    <!-- Goalkeeper -->
    <circle cx="720" cy="210" r="12"/>
    <line x1="715" y1="205" x2="725" y2="215" stroke="#FFFFFF" stroke-width="1"/>
    
    <!-- Defenders -->
    <circle cx="620" cy="140" r="11"/>
    <circle cx="620" cy="210" r="11"/>
    <circle cx="620" cy="280" r="11"/>
    <circle cx="560" cy="170" r="11"/>
    <circle cx="560" cy="250" r="11"/>
    
    <!-- Midfielders -->
    <circle cx="480" cy="120" r="10"/>
    <circle cx="480" cy="210" r="10"/>
    <circle cx="480" cy="300" r="10"/>
    <circle cx="430" cy="160" r="10"/>
    <circle cx="430" cy="260" r="10"/>
    
    <!-- Forwards -->
    <circle cx="320" cy="140" r="10"/>
    <circle cx="320" cy="280" r="10"/>
    <circle cx="270" cy="210" r="11"/>
  </g>
  
  <!-- Tactical lines showing player connections (sketchy) -->
  <g stroke="#F6EB61" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="3,2">
    <!-- Liverpool passing lanes -->
    <line x1="180" y1="210" x2="320" y2="210"/>
    <line x1="240" y1="170" x2="370" y2="160"/>
    <line x1="240" y1="250" x2="370" y2="260"/>
    <line x1="320" y1="210" x2="480" y2="210"/>
    <line x1="370" y1="160" x2="530" y2="210"/>
    <line x1="370" y1="260" x2="480" y2="280"/>
  </g>
  
  <!-- Title/Subject text -->
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">
    MATCH PREVIEW
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="410" font-family="Arial, sans-serif" font-size="14" fill="#F6EB61" text-anchor="middle" opacity="0.9">
    Lineup Predictions • Key Battles • Tactical Analysis
  </text>
  
  <!-- Liverpool badge circle accent -->
  <circle cx="50" cy="40" r="35" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.6"/>
  <text x="50" y="48" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#C8102E" text-anchor="middle">LFC</text>
  
  <!-- Decorative sketch elements -->
  <g stroke="#F6EB61" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M 700 30 Q 720 35 710 50"/>
    <path d="M 100 390 Q 110 400 95 405"/>
  </g>
</svg>