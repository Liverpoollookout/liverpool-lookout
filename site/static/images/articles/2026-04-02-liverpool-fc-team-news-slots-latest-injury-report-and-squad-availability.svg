<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Title text -->
  <text x="400" y="40" font-size="32" font-weight="bold" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">Injury Update</text>
  
  <!-- Sketched medical cross symbol -->
  <g stroke="#C8102E" stroke-width="3" fill="none" stroke-linecap="round">
    <line x1="150" y1="100" x2="150" y2="200"/>
    <line x1="100" y1="150" x2="200" y2="150"/>
    <circle cx="150" cy="150" r="60" stroke="#FFFFFF" stroke-width="2"/>
  </g>
  
  <!-- Left figure - player outline (injured) -->
  <g stroke="#C8102E" stroke-width="2.5" fill="none" stroke-linecap="round">
    <!-- Head -->
    <circle cx="280" cy="110" r="20"/>
    <!-- Body -->
    <line x1="280" y1="130" x2="280" y2="190"/>
    <!-- Left arm -->
    <line x1="280" y1="145" x2="240" y2="170"/>
    <!-- Right arm -->
    <line x1="280" y1="145" x2="320" y2="170"/>
    <!-- Left leg -->
    <line x1="280" y1="190" x2="260" y2="250"/>
    <!-- Right leg -->
    <line x1="280" y1="190" x2="300" y2="250"/>
    <!-- X mark over player -->
    <line x1="250" y1="80" x2="310" y2="140" stroke="#C8102E" stroke-width="3"/>
    <line x1="310" y1="80" x2="250" y2="140" stroke="#C8102E" stroke-width="3"/>
  </g>
  
  <!-- Center player - player outline (available) -->
  <g stroke="#C8102E" stroke-width="2.5" fill="none" stroke-linecap="round">
    <!-- Head -->
    <circle cx="400" cy="110" r="20"/>
    <!-- Body -->
    <line x1="400" y1="130" x2="400" y2="190"/>
    <!-- Left arm -->
    <line x1="400" y1="145" x2="360" y2="170"/>
    <!-- Right arm -->
    <line x1="400" y1="145" x2="440" y2="170"/>
    <!-- Left leg -->
    <line x1="400" y1="190" x2="380" y2="250"/>
    <!-- Right leg -->
    <line x1="400" y1="190" x2="420" y2="250"/>
    <!-- Checkmark -->
    <path d="M 360 100 L 385 125 L 425 80" stroke="#F6EB61" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Right player - player outline (uncertain) -->
  <g stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7">
    <!-- Head -->
    <circle cx="520" cy="110" r="20"/>
    <!-- Body -->
    <line x1="520" y1="130" x2="520" y2="190"/>
    <!-- Left arm -->
    <line x1="520" y1="145" x2="480" y2="170"/>
    <!-- Right arm -->
    <line x1="520" y1="145" x2="560" y2="170"/>
    <!-- Left leg -->
    <line x1="520" y1="190" x2="500" y2="250"/>
    <!-- Right leg -->
    <line x1="520" y1="190" x2="540" y2="250"/>
    <!-- Question mark -->
    <text x="520" y="95" font-size="40" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">?</text>
  </g>
  
  <!-- Status labels -->
  <text x="280" y="280" font-size="18" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">OUT</text>
  <text x="400" y="280" font-size="18" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">AVAILABLE</text>
  <text x="520" y="280" font-size="18" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">DOUBTFUL</text>
  
  <!-- Decorative elements -->
  <g stroke="#F6EB61" stroke-width="2" fill="none" opacity="0.6">
    <line x1="100" y1="330" x2="700" y2="330"/>
  </g>
  
  <!-- Fitness level indicators -->
  <g stroke="#C8102E" stroke-width="2" fill="none">
    <rect x="100" y="360" width="150" height="30" rx="4"/>
    <rect x="325" y="360" width="150" height="30" rx="4"/>
    <rect x="550" y="360" width="150" height="30" rx="4"/>
  </g>
  
  <text x="175" y="382" font-size="14" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">Rehabilitation</text>
  <text x="400" y="382" font-size="14" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">Match Ready</text>
  <text x="625" y="382" font-size="14" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">Assessment</text>
</svg>