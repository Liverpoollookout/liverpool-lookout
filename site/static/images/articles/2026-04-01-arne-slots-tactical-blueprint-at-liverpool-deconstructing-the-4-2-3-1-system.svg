<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch outline with sketch effect -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none" stroke-dasharray="3,2" opacity="0.8">
    <rect x="40" y="30" width="720" height="360" stroke="#FFFFFF" stroke-width="2.5"/>
    <line x1="400" y1="30" x2="400" y2="390"/>
    <circle cx="400" cy="210" r="50" stroke="#FFFFFF" stroke-width="2"/>
    <rect x="60" y="110" width="80" height="200" stroke="#C8102E" stroke-width="2"/>
    <rect x="660" y="110" width="80" height="200" stroke="#C8102E" stroke-width="2"/>
  </g>
  
  <!-- Midfield line accent -->
  <line x1="40" y1="210" x2="760" y2="210" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Formation: 4-2-3-1 Players as circles with connecting lines -->
  <!-- Back 4 -->
  <circle cx="100" cy="90" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <circle cx="100" cy="330" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <circle cx="150" cy="140" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <circle cx="150" cy="280" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Defensive midfielders (2) -->
  <circle cx="280" cy="170" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <circle cx="280" cy="250" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Attacking midfielders/wingers (3) -->
  <circle cx="420" cy="100" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <circle cx="420" cy="210" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <circle cx="420" cy="320" r="18" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Striker (1) -->
  <circle cx="550" cy="210" r="20" fill="none" stroke="#C8102E" stroke-width="3"/>
  
  <!-- Pressing trigger arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <!-- Pressing arrows from front positions -->
  <path d="M 550 190 L 480 160" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="4,2"/>
  <path d="M 550 230 L 480 260" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="4,2"/>
  <path d="M 420 180 L 380 150" stroke="#F6EB61" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="4,2" opacity="0.7"/>
  <path d="M 420 250 L 380 280" stroke="#F6EB61" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="4,2" opacity="0.7"/>
  
  <!-- Title text -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#C8102E" text-anchor="middle" letter-spacing="1">
    SLOT 4-2-3-1
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="400" font-family="Arial, sans-serif" font-size="16" fill="#F6EB61" text-anchor="middle" opacity="0.9">
    PRESSING TRIGGER SYSTEM
  </text>
  
  <!-- Decorative corner elements -->
  <path d="M 50 40 L 70 40 L 70 60" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 750 40 L 730 40 L 730 60" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 50 380 L 70 380 L 70 360" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 750 380 L 730 380 L 730 360" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.5"/>
  
  <!-- Red accent bar -->
  <rect x="40" y="365" width="720" height="3" fill="#C8102E" opacity="0.6"/>
</svg>