<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch outline -->
  <rect x="80" y="40" width="640" height="340" fill="none" stroke="#2d5a3d" stroke-width="2" opacity="0.6"/>
  
  <!-- Center line -->
  <line x1="400" y1="40" x2="400" y2="380" stroke="#2d5a3d" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="40" fill="none" stroke="#2d5a3d" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Center spot -->
  <circle cx="400" cy="210" r="3" fill="#2d5a3d" opacity="0.5"/>
  
  <!-- Goal areas -->
  <rect x="80" y="120" width="60" height="180" fill="none" stroke="#2d5a3d" stroke-width="1.5" opacity="0.4"/>
  <rect x="660" y="120" width="60" height="180" fill="none" stroke="#2d5a3d" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Penalty areas -->
  <rect x="80" y="80" width="100" height="260" fill="none" stroke="#2d5a3d" stroke-width="1.5" opacity="0.4"/>
  <rect x="620" y="80" width="100" height="260" fill="none" stroke="#2d5a3d" stroke-width="1.5" opacity="0.4"/>
  
  <!-- 4-2-3-1 Formation - Liverpool (attacking left) -->
  <!-- Goalkeeper -->
  <circle cx="100" cy="210" r="12" fill="none" stroke="#C8102E" stroke-width="2"/>
  <circle cx="100" cy="210" r="2" fill="#C8102E"/>
  
  <!-- Defense line (4) -->
  <!-- Left back -->
  <circle cx="180" cy="130" r="11" fill="none" stroke="#C8102E" stroke-width="2"/>
  <circle cx="180" cy="130" r="2" fill="#C8102E"/>
  
  <!-- Left center back -->
  <circle cx="180" cy="210" r="11" fill="none" stroke="#C8102E" stroke-width="2"/>
  <circle cx="180" cy="210" r="2" fill="#C8102E"/>
  
  <!-- Right center back -->
  <circle cx="180" cy="290" r="11" fill="none" stroke="#C8102E" stroke-width="2"/>
  <circle cx="180" cy="290" r="2" fill="#C8102E"/>
  
  <!-- Right back -->
  <circle cx="180" cy="370" r="11" fill="none" stroke="#C8102E" stroke-width="2"/>
  <circle cx="180" cy="370" r="2" fill="#C8102E"/>
  
  <!-- Midfield line (2) - Pivot -->
  <!-- Left midfielder (6) -->
  <circle cx="280" cy="160" r="11" fill="none" stroke="#C8102E" stroke-width="2"/>
  <circle cx="280" cy="160" r="2" fill="#C8102E"/>
  
  <!-- Right midfielder (6) -->
  <circle cx="280" cy="260" r="11" fill="none" stroke="#C8102E" stroke-width="2"/>
  <circle cx="280" cy="260" r="2" fill="#C8102E"/>
  
  <!-- Attacking midfield line (3) -->
  <!-- Left winger/attacking mid -->
  <circle cx="360" cy="100" r="11" fill="none" stroke="#C8102E" stroke-width="2"/>
  <circle cx="360" cy="100" r="2" fill="#C8102E"/>
  
  <!-- Central attacking mid (10) -->
  <circle cx="360" cy="210" r="12" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <circle cx="360" cy="210" r="2" fill="#C8102E"/>
  
  <!-- Right winger/attacking mid -->
  <circle cx="360" cy="320" r="11" fill="none" stroke="#C8102E" stroke-width="2"/>
  <circle cx="360" cy="320" r="2" fill="#C8102E"/>
  
  <!-- Striker (9) -->
  <circle cx="480" cy="210" r="12" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <circle cx="480" cy="210" r="2" fill="#C8102E"/>
  
  <!-- Pressing trigger lines (red dashed arcs) -->
  <!-- Forward pressing -->
  <path d="M 480 180 Q 520 210 480 240" fill="none" stroke="#C8102E" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>
  
  <!-- Midfield pressing zone (curved area) -->
  <path d="M 300 120 Q 340 140 360 160" fill="none" stroke="#F6EB61" stroke-width="2.5" stroke-dasharray="5,4" opacity="0.8"/>
  <path d="M 300 300 Q 340 280 360 260" fill="none" stroke="#F6EB61" stroke-width="2.5" stroke-dasharray="5,4" opacity="0.8"/>
  
  <!-- Pressing trigger arrows -->
  <!-- Forward arrow -->
  <g opacity="0.8">
    <line x1="480" y1="140" x2="480" y2="170" stroke="#F6EB61" stroke-width="2"/>
    <polygon points="480,135 475,145 485,145" fill="#F6EB61"/>
  </g>
  
  <!-- Right arrow -->
  <g opacity="0.7">
    <line x1="520" y1="210" x2="550" y2="210" stroke="#C8102E" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="555,210 545,205 545,215" fill="#C8102E"/>
  </g>
  
  <!-- Formation label with sketch style -->
  <text x="650" y="60" font-size="28" font-weight="bold" fill="#C8102E" font-family="serif" opacity="0.9">4-2-3-1</text>
  
  <!-- System description -->
  <text x="650" y="90" font-size="14" fill="#FFFFFF" font-family="serif" opacity="0.8">SLOT</text>
  <text x="650" y="110" font-size="12" fill="#F6EB61" font-family="serif" opacity="0.7">Pressing System</text>
  
  <!-- Title -->
  <text x="80" y="410" font-size="16" fill="#FFFFFF" font-family="serif" font-weight="bold" opacity="0.9">Liverpool FC Tactical Breakdown</text>
  
  <!-- Sketch marks (decorative lines for drawing effect) -->
  <g stroke="#C8102E" stroke-width="1" opacity="0.3" stroke-dasharray="2,2">
    <line x1="85" y1="45" x2="92" y2="52"/>
    <line x1="715" y1="50" x2="722" y2="57"/>
    <line x1="80" y1="375" x2="95" y2="385"/>
  </g>
  
  <!-- Legend/Key -->
  <text x="80" y="360" font-size="11" fill="#F6EB61" font-family="serif" opacity="0.7">◆ Pressing Trigger Zones</text>
  <text x="80" y="375" font-size="11" fill="#C8102E" font-family="serif" opacity="0.7">● Player Position</text>
</svg>