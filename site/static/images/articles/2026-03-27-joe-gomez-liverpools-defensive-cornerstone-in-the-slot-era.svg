<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative corner elements -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  <circle cx="750" cy="370" r="35" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  
  <!-- Head -->
  <circle cx="280" cy="100" r="35" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- Hair sketch lines -->
  <path d="M 250 85 Q 245 75 260 70" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <path d="M 310 80 Q 315 72 305 68" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Face features sketch -->
  <circle cx="270" cy="95" r="3" fill="#FFFFFF"/>
  <circle cx="290" cy="95" r="3" fill="#FFFFFF"/>
  <path d="M 275 110 Q 280 115 285 110" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Neck -->
  <line x1="275" y1="135" x2="275" y2="160" stroke="#FFFFFF" stroke-width="3"/>
  
  <!-- Liverpool red kit - main body -->
  <path d="M 250 160 L 310 160 L 320 240 L 240 240 Z" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Jersey details -->
  <line x1="280" y1="160" x2="280" y2="240" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Club badge/crest area -->
  <circle cx="280" cy="190" r="12" fill="none" stroke="#F6EB61" stroke-width="1.5"/>
  <line x1="280" y1="183" x2="280" y2="197" stroke="#F6EB61" stroke-width="1"/>
  
  <!-- Shorts -->
  <rect x="245" y="240" width="70" height="35" fill="#FFFFFF" stroke="#C8102E" stroke-width="2"/>
  
  <!-- Left arm -->
  <path d="M 250 170 L 180 200 L 170 280" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Left hand -->
  <circle cx="170" cy="295" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Right arm -->
  <path d="M 310 170 L 380 190 L 395 280" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Right hand -->
  <circle cx="395" cy="295" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Left leg -->
  <line x1="260" y1="275" x2="255" y2="370" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Right leg -->
  <line x1="300" y1="275" x2="310" y2="370" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Left boot -->
  <ellipse cx="255" cy="385" rx="10" ry="8" fill="#000000" stroke="#F6EB61" stroke-width="1.5"/>
  
  <!-- Right boot -->
  <ellipse cx="310" cy="385" rx="10" ry="8" fill="#000000" stroke="#F6EB61" stroke-width="1.5"/>
  
  <!-- Sketchy motion lines -->
  <path d="M 350 180 L 380 175" stroke="#C8102E" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M 350 200 L 385 198" stroke="#C8102E" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  
  <!-- Player name -->
  <text x="480" y="120" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#C8102E" letter-spacing="2">JOE GOMEZ</text>
  
  <!-- Role/position text -->
  <text x="480" y="160" font-family="Arial, sans-serif" font-size="18" fill="#F6EB61" letter-spacing="1">DEFENDER</text>
  
  <!-- Decorative line -->
  <line x1="480" y1="175" x2="650" y2="175" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  
  <!-- Spotlight accent circle -->
  <circle cx="120" cy="240" r="80" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.2" stroke-dasharray="5,5"/>
  
  <!-- Bottom accent line -->
  <line x1="0" y1="410" x2="800" y2="410" stroke="#C8102E" stroke-width="3"/>
</svg>