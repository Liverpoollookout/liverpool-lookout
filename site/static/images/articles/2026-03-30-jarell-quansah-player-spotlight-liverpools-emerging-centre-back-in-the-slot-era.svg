<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative background elements -->
  <circle cx="100" cy="80" r="60" fill="#C8102E" opacity="0.1"/>
  <circle cx="700" cy="350" r="80" fill="#F6EB61" opacity="0.08"/>
  
  <!-- Head -->
  <circle cx="400" cy="90" r="45" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Hair sketch lines -->
  <path d="M 365 55 Q 365 40 400 40 Q 435 40 435 55" fill="none" stroke="#C8102E" stroke-width="2"/>
  <path d="M 360 65 Q 365 50 375 60" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.6"/>
  <path d="M 440 65 Q 435 50 425 60" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Face features -->
  <circle cx="385" cy="80" r="4" fill="#C8102E"/>
  <circle cx="415" cy="80" r="4" fill="#C8102E"/>
  <path d="M 385 95 L 415 95" stroke="#C8102E" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Neck -->
  <line x1="395" y1="130" x2="390" y2="160" stroke="#FFFFFF" stroke-width="3"/>
  <line x1="405" y1="130" x2="410" y2="160" stroke="#FFFFFF" stroke-width="3"/>
  
  <!-- Liverpool kit - body -->
  <path d="M 360 160 L 340 220 Q 335 240 350 250 L 450 250 Q 465 240 460 220 L 440 160 Z" fill="#C8102E" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- White collar detail -->
  <path d="M 390 160 Q 400 155 410 160" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Liverpool badge area -->
  <circle cx="400" cy="190" r="12" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="400" y="193" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold">LFC</text>
  
  <!-- Left arm -->
  <path d="M 360 170 Q 320 175 310 210" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Left sleeve detail -->
  <path d="M 355 170 Q 325 172 318 200" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.7"/>
  
  <!-- Right arm -->
  <path d="M 440 170 Q 480 175 490 210" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Right sleeve detail -->
  <path d="M 445 170 Q 475 172 482 200" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.7"/>
  
  <!-- Left leg -->
  <path d="M 375 250 L 365 340" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Left leg detail -->
  <path d="M 380 250 L 372 340" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
  
  <!-- Right leg -->
  <path d="M 425 250 L 435 340" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Right leg detail -->
  <path d="M 420 250 L 428 340" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
  
  <!-- Left boot -->
  <ellipse cx="365" cy="350" rx="10" ry="12" fill="#000" stroke="#F6EB61" stroke-width="1.5"/>
  
  <!-- Right boot -->
  <ellipse cx="435" cy="350" rx="10" ry="12" fill="#000" stroke="#F6EB61" stroke-width="1.5"/>
  
  <!-- Decorative sketchy lines around figure -->
  <path d="M 320 150 Q 330 140 340 150" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  <path d="M 480 160 Q 490 150 500 165" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Player name -->
  <text x="400" y="390" font-size="36" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">QUANSAH</text>
  
  <!-- Accent line under name -->
  <line x1="280" y1="405" x2="520" y2="405" stroke="#F6EB61" stroke-width="2"/>
  
  <!-- Jersey number -->
  <text x="680" y="100" font-size="48" fill="#F6EB61" text-anchor="middle" font-weight="bold" opacity="0.3" font-family="Arial, sans-serif">78</text>
</svg>