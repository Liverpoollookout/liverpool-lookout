<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Anfield pitch outline sketch -->
  <rect x="80" y="60" width="640" height="300" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  <line x1="400" y1="60" x2="400" y2="360" stroke="#F6EB61" stroke-width="1.5" opacity="0.2"/>
  <circle cx="400" cy="210" r="40" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.2"/>
  
  <!-- Goalkeeper silhouette left -->
  <circle cx="120" cy="180" r="8" fill="none" stroke="#C8102E" stroke-width="2"/>
  <line x1="120" y1="188" x2="120" y2="220" stroke="#C8102E" stroke-width="2.5"/>
  <line x1="100" y1="200" x2="140" y2="200" stroke="#C8102E" stroke-width="2.5"/>
  <line x1="105" y1="220" x2="115" y2="240" stroke="#C8102E" stroke-width="2"/>
  <line x1="135" y1="220" x2="125" y2="240" stroke="#C8102E" stroke-width="2"/>
  
  <!-- Main player figure - Bob Paisley era pose -->
  <circle cx="380" cy="130" r="18" fill="none" stroke="#C8102E" stroke-width="3"/>
  
  <!-- Body -->
  <rect x="365" y="148" width="30" height="50" fill="none" stroke="#C8102E" stroke-width="3" rx="3"/>
  
  <!-- Arms spread wide in celebration -->
  <line x1="365" y1="160" x2="300" y2="140" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
  <line x1="395" y1="160" x2="460" y2="140" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Legs in running motion -->
  <line x1="372" y1="198" x2="365" y2="250" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
  <line x1="388" y1="198" x2="405" y2="255" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Ball near foot -->
  <circle cx="410" cy="270" r="6" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M 410 265 Q 415 268 410 273" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  
  <!-- Momentum lines -->
  <path d="M 450 145 Q 465 150 480 145" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M 455 160 Q 475 165 495 155" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  
  <!-- Crowd celebration suggestion - silhouettes -->
  <circle cx="600" cy="95" r="5" fill="#C8102E" opacity="0.6"/>
  <circle cx="630" cy="105" r="4" fill="#C8102E" opacity="0.5"/>
  <circle cx="660" cy="100" r="5" fill="#C8102E" opacity="0.6"/>
  <circle cx="620" cy="85" r="4" fill="#C8102E" opacity="0.5"/>
  <circle cx="650" cy="90" r="5" fill="#C8102E" opacity="0.6"/>
  
  <!-- Stadium terrace lines -->
  <line x1="580" y1="110" x2="700" y2="110" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>
  <line x1="590" y1="125" x2="710" y2="125" stroke="#FFFFFF" stroke-width="1" opacity="0.1"/>
  
  <!-- Title area with decorative elements -->
  <rect x="100" y="290" width="600" height="90" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.4" rx="4"/>
  
  <!-- Decorative corner elements -->
  <line x1="110" y1="300" x2="130" y2="300" stroke="#F6EB61" stroke-width="2"/>
  <line x1="110" y1="300" x2="110" y2="320" stroke="#F6EB61" stroke-width="2"/>
  
  <line x1="690" y1="300" x2="710" y2="300" stroke="#F6EB61" stroke-width="2"/>
  <line x1="710" y1="300" x2="710" y2="320" stroke="#F6EB61" stroke-width="2"/>
  
  <!-- Text: Title -->
  <text x="400" y="330" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#F6EB61">
    ANFIELD GLORY
  </text>
  
  <!-- Text: Subtitle -->
  <text x="400" y="365" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#FFFFFF" opacity="0.9">
    The Legendary Moments
  </text>
  
  <!-- Corner badge circle - LFC -->
  <circle cx="745" cy="35" r="28" fill="none" stroke="#C8102E" stroke-width="2"/>
  <text x="745" y="42" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#C8102E">
    LFC
  </text>
</svg>