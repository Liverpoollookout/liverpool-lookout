<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch outline - stylised -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.8">
    <rect x="80" y="50" width="640" height="320" stroke-dasharray="5,5"/>
    <line x1="400" y1="50" x2="400" y2="370"/>
    <circle cx="400" cy="210" r="40" stroke-dasharray="5,5"/>
    <rect x="100" y="100" width="80" height="220" stroke-dasharray="3,3"/>
    <rect x="620" y="100" width="80" height="220" stroke-dasharray="3,3"/>
  </g>
  
  <!-- Player statistics visualization - chart bars -->
  <g>
    <!-- Left side stats bars -->
    <g stroke="#C8102E" stroke-width="3" fill="none" stroke-linecap="round">
      <line x1="150" y1="290" x2="150" y2="180" opacity="0.9"/>
      <line x1="190" y1="290" x2="190" y2="160" opacity="0.8"/>
      <line x1="230" y1="290" x2="230" y2="140" opacity="0.85"/>
      <line x1="270" y1="290" x2="270" y2="170" opacity="0.75"/>
    </g>
    
    <!-- Right side stats bars -->
    <g stroke="#C8102E" stroke-width="3" fill="none" stroke-linecap="round">
      <line x1="530" y1="290" x2="530" y2="150" opacity="0.9"/>
      <line x1="570" y1="290" x2="570" y2="175" opacity="0.85"/>
      <line x1="610" y1="290" x2="610" y2="165" opacity="0.8"/>
      <line x1="650" y1="290" x2="650" y2="185" opacity="0.75"/>
    </g>
  </g>
  
  <!-- Data points - circles -->
  <g fill="#F6EB61" opacity="0.9">
    <circle cx="150" cy="180" r="4"/>
    <circle cx="190" cy="160" r="4"/>
    <circle cx="230" cy="140" r="4"/>
    <circle cx="270" cy="170" r="4"/>
    <circle cx="530" cy="150" r="4"/>
    <circle cx="570" cy="175" r="4"/>
    <circle cx="610" cy="165" r="4"/>
    <circle cx="650" cy="185" r="4"/>
  </g>
  
  <!-- Connecting line through data points -->
  <polyline points="150,180 190,160 230,140 270,170" stroke="#F6EB61" stroke-width="2" fill="none" opacity="0.6" stroke-dasharray="3,3"/>
  <polyline points="530,150 570,175 610,165 650,185" stroke="#F6EB61" stroke-width="2" fill="none" opacity="0.6" stroke-dasharray="3,3"/>
  
  <!-- Central data visualization circle -->
  <circle cx="400" cy="120" r="35" stroke="#C8102E" stroke-width="2.5" fill="none" opacity="0.8"/>
  <circle cx="400" cy="120" r="28" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.6"/>
  
  <!-- Percentage indicators -->
  <g fill="#FFFFFF" font-size="14" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">
    <text x="150" y="315">85%</text>
    <text x="190" y="315">92%</text>
    <text x="230" y="315">78%</text>
    <text x="270" y="315">88%</text>
    <text x="530" y="315">91%</text>
    <text x="570" y="315">84%</text>
    <text x="610" y="315">86%</text>
    <text x="650" y="315">79%</text>
  </g>
  
  <!-- Title text -->
  <text x="400" y="35" font-size="28" font-family="Arial, sans-serif" font-weight="bold" fill="#C8102E" text-anchor="middle">PLAYER STATISTICS</text>
  
  <!-- Subtitle -->
  <text x="400" y="395" font-size="16" font-family="Arial, sans-serif" fill="#F6EB61" text-anchor="middle" opacity="0.9">Deep Dive Analysis</text>
  
  <!-- Decorative corner elements -->
  <g stroke="#C8102E" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M 60 20 L 60 50 L 90 50" stroke-linecap="round"/>
    <path d="M 740 20 L 740 50 L 710 50" stroke-linecap="round"/>
  </g>
</svg>