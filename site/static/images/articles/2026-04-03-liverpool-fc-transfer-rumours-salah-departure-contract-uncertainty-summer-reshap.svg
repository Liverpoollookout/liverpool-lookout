<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative sketched border -->
  <rect x="20" y="20" width="760" height="380" fill="none" stroke="#F6EB61" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
  
  <!-- Left side - Player silhouette -->
  <g id="player-left">
    <!-- Head -->
    <circle cx="150" cy="100" r="25" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    
    <!-- Body in Liverpool kit -->
    <rect x="130" y="130" width="40" height="80" fill="#C8102E" stroke="#C8102E" stroke-width="2" opacity="0.8"/>
    
    <!-- Arms -->
    <line x1="130" y1="150" x2="80" y2="140" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="170" y1="150" x2="220" y2="140" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Legs -->
    <line x1="135" y1="210" x2="125" y2="260" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="165" y1="210" x2="175" y2="260" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Feet -->
    <ellipse cx="125" cy="270" rx="8" ry="6" fill="#000000"/>
    <ellipse cx="175" cy="270" rx="8" ry="6" fill="#000000"/>
  </g>
  
  <!-- Directional arrows showing departure -->
  <defs>
    <marker id="arrowhead-gold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
    <marker id="arrowhead-white" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FFFFFF"/>
    </marker>
  </defs>
  
  <!-- Main exit arrow pointing right -->
  <path d="M 280 150 Q 380 150 480 150" fill="none" stroke="#F6EB61" stroke-width="3" marker-end="url(#arrowhead-gold)" stroke-dasharray="8,4"/>
  
  <!-- Secondary arrow pointing up-right -->
  <path d="M 290 200 Q 350 140 450 100" fill="none" stroke="#C8102E" stroke-width="2.5" marker-end="url(#arrowhead-gold)" opacity="0.7" stroke-dasharray="6,3"/>
  
  <!-- Tertiary arrow pointing down-right -->
  <path d="M 290 200 Q 350 260 450 300" fill="none" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arrowhead-white)" opacity="0.6" stroke-dasharray="6,3"/>
  
  <!-- Question marks showing uncertainty -->
  <text x="520" y="120" font-size="48" font-weight="bold" fill="#F6EB61" opacity="0.4" font-family="Arial, sans-serif">?</text>
  <text x="550" y="180" font-size="48" font-weight="bold" fill="#C8102E" opacity="0.4" font-family="Arial, sans-serif">?</text>
  <text x="490" y="280" font-size="48" font-weight="bold" fill="#FFFFFF" opacity="0.4" font-family="Arial, sans-serif">?</text>
  
  <!-- Contract/departure symbols -->
  <g id="document-icon">
    <rect x="630" y="80" width="35" height="50" fill="none" stroke="#FFFFFF" stroke-width="2" rx="2"/>
    <line x1="630" y1="95" x2="665" y2="95" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="630" y1="105" x2="665" y2="105" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="630" y1="115" x2="655" y2="115" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>
  
  <!-- Exit door symbol -->
  <g id="exit-door" opacity="0.8">
    <rect x="630" y="220" width="40" height="60" fill="none" stroke="#C8102E" stroke-width="2.5" rx="3"/>
    <line x1="650" y1="220" x2="650" y2="280" stroke="#C8102E" stroke-width="2"/>
    <circle cx="665" cy="250" r="3" fill="#F6EB61"/>
  </g>
  
  <!-- Title text -->
  <text x="400" y="360" font-size="28" font-weight="bold" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">TRANSFER RUMOURS</text>
  <text x="400" y="390" font-size="14" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" opacity="0.8">Outgoings &amp; Departures</text>
  
  <!-- Decorative sketch marks -->
  <path d="M 50 50 L 55 45 M 55 50 L 50 45" stroke="#F6EB61" stroke-width="1.5" opacity="0.4"/>
  <path d="M 740 370 L 750 360 M 750 370 L 740 360" stroke="#F6EB61" stroke-width="1.5" opacity="0.4"/>
</svg>