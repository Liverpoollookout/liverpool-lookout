<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative pitch lines -->
  <line x1="0" y1="210" x2="800" y2="210" stroke="#F6EB61" stroke-width="2" opacity="0.3" stroke-dasharray="10,10"/>
  <circle cx="400" cy="210" r="60" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.2"/>
  
  <!-- Player silhouette - departing player -->
  <g id="player-fading">
    <!-- Head -->
    <circle cx="180" cy="100" r="25" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.7"/>
    <!-- Body -->
    <ellipse cx="180" cy="160" rx="20" ry="35" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.7"/>
    <!-- Liverpool jersey lines -->
    <line x1="160" y1="145" x2="200" y2="145" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
    <line x1="160" y1="160" x2="200" y2="160" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
    <!-- Left arm -->
    <line x1="160" y1="150" x2="120" y2="130" stroke="#C8102E" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <!-- Right arm -->
    <line x1="200" y1="150" x2="240" y2="130" stroke="#C8102E" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <!-- Left leg -->
    <line x1="170" y1="195" x2="155" y2="280" stroke="#C8102E" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <!-- Right leg -->
    <line x1="190" y1="195" x2="205" y2="280" stroke="#C8102E" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
  </g>
  
  <!-- Player silhouette - incoming player -->
  <g id="player-solid">
    <!-- Head -->
    <circle cx="620" cy="100" r="25" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <!-- Body -->
    <ellipse cx="620" cy="160" rx="20" ry="35" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <!-- Jersey pattern -->
    <line x1="600" y1="145" x2="640" y2="145" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="600" y1="160" x2="640" y2="160" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Left arm -->
    <line x1="600" y1="150" x2="560" y2="130" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right arm -->
    <line x1="640" y1="150" x2="680" y2="130" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left leg -->
    <line x1="610" y1="195" x2="595" y2="280" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right leg -->
    <line x1="630" y1="195" x2="645" y2="280" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Directional arrows - outgoing -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#C8102E" opacity="0.8"/>
    </marker>
    <marker id="arrowWhite" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#FFFFFF" opacity="0.8"/>
    </marker>
  </defs>
  
  <!-- Outgoing arrow -->
  <path d="M 210 160 Q 300 180 380 160" stroke="#C8102E" stroke-width="3" fill="none" marker-end="url(#arrowRed)" opacity="0.7" stroke-dasharray="8,4"/>
  
  <!-- Incoming arrow -->
  <path d="M 590 160 Q 500 140 420 160" stroke="#FFFFFF" stroke-width="3" fill="none" marker-end="url(#arrowWhite)" opacity="0.8" stroke-dasharray="8,4"/>
  
  <!-- Contract document symbol -->
  <g id="contract">
    <rect x="365" y="280" width="70" height="90" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
    <line x1="375" y1="295" x2="425" y2="295" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
    <line x1="375" y1="310" x2="425" y2="310" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
    <line x1="375" y1="325" x2="420" y2="325" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
    <path d="M 385 345 Q 390 350 400 345 Q 410 350 415 345" stroke="#F6EB61" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>
  
  <!-- Title text -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">TRANSFER MOVEMENTS</text>
  
  <!-- Labels -->
  <text x="180" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#C8102E" text-anchor="middle" opacity="0.9">DEPARTING</text>
  
  <text x="620" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle" opacity="0.9">ARRIVING</text>
  
  <!-- Subtitle -->
  <text x="400" y="395" font-family="Arial, sans-serif" font-size="14" fill="#F6EB61" text-anchor="middle" opacity="0.8">Contract Situations &amp; Transfer Rumours</text>
</svg>