<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative circles background -->
  <circle cx="100" cy="80" r="60" fill="#C8102E" opacity="0.1"/>
  <circle cx="700" cy="350" r="80" fill="#F6EB61" opacity="0.08"/>
  
  <!-- Player figure sketch -->
  <g id="player">
    <!-- Head -->
    <circle cx="400" cy="100" r="35" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    
    <!-- Hair/top of head detail -->
    <path d="M 375 75 Q 400 55 425 75" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Facial features sketch -->
    <circle cx="390" cy="95" r="3" fill="#FFFFFF"/>
    <circle cx="410" cy="95" r="3" fill="#FFFFFF"/>
    <path d="M 395 110 Q 400 115 405 110" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Body - Liverpool kit -->
    <rect x="365" y="140" width="70" height="80" rx="5" fill="#C8102E" stroke="#FFFFFF" stroke-width="2.5"/>
    
    <!-- Shirt stripes detail -->
    <path d="M 385 140 L 385 220" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    <path d="M 415 140 L 415 220" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Shirt number area -->
    <text x="400" y="195" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">18</text>
    
    <!-- Arms -->
    <line x1="365" y1="155" x2="310" y2="140" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <line x1="435" y1="155" x2="490" y2="140" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Hands -->
    <circle cx="305" cy="135" r="8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="495" cy="135" r="8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Shorts -->
    <rect x="370" y="218" width="60" height="35" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Legs -->
    <line x1="382" y1="253" x2="378" y2="320" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <line x1="418" y1="253" x2="422" y2="320" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Socks -->
    <rect x="375" y="318" width="8" height="50" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
    <rect x="420" y="318" width="8" height="50" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
    
    <!-- Feet/boots -->
    <ellipse cx="378" cy="375" rx="12" ry="8" fill="#000000" stroke="#FFFFFF" stroke-width="1.5"/>
    <ellipse cx="423" cy="375" rx="12" ry="8" fill="#000000" stroke="#FFFFFF" stroke-width="1.5"/>
    
    <!-- Ball near feet -->
    <circle cx="350" cy="370" r="10" fill="none" stroke="#F6EB61" stroke-width="2"/>
    <path d="M 345 365 Q 350 360 355 365" fill="none" stroke="#F6EB61" stroke-width="1.5"/>
  </g>
  
  <!-- Accent lines for sketch effect -->
  <g id="accents">
    <path d="M 320 120 Q 330 115 340 125" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.7"/>
    <path d="M 480 125 Q 490 118 505 130" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.7"/>
    <path d="M 300 280 L 290 290" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <path d="M 510 280 L 520 290" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  </g>
  
  <!-- Player name text -->
  <text x="400" y="410" font-size="28" font-weight="bold" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">GRAVENBERCH</text>
  
  <!-- Decorative underline -->
  <line x1="280" y1="420" x2="520" y2="420" stroke="#C8102E" stroke-width="3"/>
</svg>