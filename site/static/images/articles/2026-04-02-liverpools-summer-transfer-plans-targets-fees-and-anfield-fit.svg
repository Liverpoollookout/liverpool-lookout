<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative pitch lines -->
  <line x1="400" y1="0" x2="400" y2="420" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  <line x1="0" y1="210" x2="800" y2="210" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="210" r="40" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  
  <!-- Left figure silhouette (player at origin club) -->
  <g opacity="0.6">
    <!-- Head -->
    <circle cx="120" cy="80" r="18" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Body -->
    <line x1="120" y1="98" x2="120" y2="160" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Arms -->
    <line x1="120" y1="120" x2="80" y2="140" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="120" y1="120" x2="160" y2="140" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Legs -->
    <line x1="120" y1="160" x2="100" y2="210" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="120" y1="160" x2="140" y2="210" stroke="#FFFFFF" stroke-width="2"/>
  </g>
  
  <!-- Central player figure in Liverpool red kit -->
  <g>
    <!-- Head -->
    <circle cx="400" cy="90" r="20" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Body/Jersey -->
    <rect x="380" y="110" width="40" height="70" fill="#C8102E" opacity="0.7" stroke="#C8102E" stroke-width="2"/>
    <!-- Jersey details -->
    <line x1="400" y1="110" x2="400" y2="180" stroke="#FFFFFF" stroke-width="1.5"/>
    <!-- Arms -->
    <line x1="380" y1="130" x2="330" y2="150" stroke="#C8102E" stroke-width="2.5"/>
    <line x1="420" y1="130" x2="470" y2="150" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Hands -->
    <circle cx="330" cy="150" r="6" fill="#C8102E" stroke="#C8102E" stroke-width="1.5"/>
    <circle cx="470" cy="150" r="6" fill="#C8102E" stroke="#C8102E" stroke-width="1.5"/>
    <!-- Shorts -->
    <rect x="382" y="180" width="36" height="35" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
    <!-- Legs -->
    <line x1="390" y1="215" x2="385" y2="270" stroke="#FFFFFF" stroke-width="2.5"/>
    <line x1="410" y1="215" x2="415" y2="270" stroke="#FFFFFF" stroke-width="2.5"/>
    <!-- Boots -->
    <circle cx="385" cy="275" r="7" fill="#C8102E"/>
    <circle cx="415" cy="275" r="7" fill="#C8102E"/>
  </g>
  
  <!-- Right figure silhouette (destination) -->
  <g opacity="0.6">
    <!-- Head -->
    <circle cx="680" cy="80" r="18" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Body -->
    <line x1="680" y1="98" x2="680" y2="160" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Arms -->
    <line x1="680" y1="120" x2="640" y2="140" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="680" y1="120" x2="720" y2="140" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Legs -->
    <line x1="680" y1="160" x2="660" y2="210" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="680" y1="160" x2="700" y2="210" stroke="#FFFFFF" stroke-width="2"/>
  </g>
  
  <!-- Directional arrows -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#C8102E"/>
    </marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <!-- Arrow from left to center (incoming) -->
  <path d="M 150,100 Q 275,80 370,90" fill="none" stroke="#F6EB61" stroke-width="2.5" marker-end="url(#arrowGold)" stroke-dasharray="5,5"/>
  
  <!-- Arrow from center to right (outgoing consideration) -->
  <path d="M 430,90 Q 555,80 650,100" fill="none" stroke="#C8102E" stroke-width="2.5" marker-end="url(#arrowRed)" opacity="0.8"/>
  
  <!-- Fee estimate box -->
  <rect x="320" y="320" width="160" height="70" fill="none" stroke="#F6EB61" stroke-width="2" rx="8"/>
  <text x="400" y="345" font-size="14" font-weight="bold" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">TRANSFER FEE</text>
  <text x="400" y="368" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">£25-50M</text>
  <text x="400" y="383" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">Estimated Range</text>
  
  <!-- "ANFIELD" text with Liverpool colors -->
  <text x="400" y="40" font-size="32" font-weight="bold" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="2">ANFIELD</text>
  <text x="400" y="65" font-size="14" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">Transfer Target</text>
  
  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="12" fill="none" stroke="#C8102E" stroke-width="2"/>
  <circle cx="770" cy="390" r="12" fill="none" stroke="#C8102E" stroke-width="2"/>
  <rect x="20" y="380" width="40" height="8" fill="#F6EB61" opacity="0.5"/>
  <rect x="740" y="20" width="40" height="8" fill="#F6EB61" opacity="0.5"/>
</svg>