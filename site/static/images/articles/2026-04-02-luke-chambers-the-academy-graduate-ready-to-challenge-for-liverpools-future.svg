<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch background -->
  <rect x="80" y="40" width="640" height="340" fill="#1a4d2e" opacity="0.3" stroke="#F6EB61" stroke-width="2"/>
  
  <!-- Center line -->
  <line x1="400" y1="40" x2="400" y2="380" stroke="#F6EB61" stroke-width="2" opacity="0.5"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="60" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.5"/>
  
  <!-- Sketched player figure - simplified stylized form -->
  <g id="player" transform="translate(280, 120)">
    <!-- Head -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    
    <!-- Hair/top of head detail -->
    <path d="M -15 -8 Q -10 -22 0 -22 Q 10 -22 15 -8" fill="none" stroke="#C8102E" stroke-width="2"/>
    
    <!-- Body/Jersey -->
    <path d="M -18 8 L -20 50 M 18 8 L 20 50" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="-18" y="8" width="36" height="38" fill="#C8102E" opacity="0.7" stroke="#C8102E" stroke-width="2"/>
    
    <!-- Arms -->
    <path d="M -18 18 L -35 35" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 18 18 L 38 28" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Legs -->
    <path d="M -8 50 L -10 95" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 8 50 L 12 95" fill="none" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Football boots -->
    <ellipse cx="-10" cy="100" rx="6" ry="8" fill="#C8102E"/>
    <ellipse cx="12" cy="100" rx="6" ry="8" fill="#C8102E"/>
    
    <!-- Number on jersey -->
    <text x="0" y="35" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">7</text>
  </g>
  
  <!-- Scouting radar/stats visualization -->
  <g id="radar" transform="translate(520, 180)">
    <!-- Pentagon shape for stats -->
    <polygon points="0,-50 47,-15 29,41 -29,41 -47,-15" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6"/>
    <polygon points="0,-35 33,-10 20,29 -20,29 -33,-10" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.4"/>
    
    <!-- Stat labels -->
    <text x="0" y="-65" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">Pace</text>
    <text x="60" y="-5" font-size="11" fill="#FFFFFF" text-anchor="start" font-family="Arial, sans-serif">Tech</text>
    <text x="40" y="58" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">Physicality</text>
    <text x="-50" y="58" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">Positional</text>
    <text x="-60" y="-5" font-size="11" fill="#FFFFFF" text-anchor="end" font-family="Arial, sans-serif">Vision</text>
  </g>
  
  <!-- Academy badge/crest element -->
  <g id="academy-badge" transform="translate(120, 320)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#F6EB61" stroke-width="2"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.6"/>
    <text x="0" y="5" font-size="10" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">ACADEMY</text>
  </g>
  
  <!-- Title text -->
  <text x="400" y="410" font-size="18" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">Academy Graduate Scouting Report</text>
  
  <!-- Decorative corner elements -->
  <line x1="90" y1="50" x2="120" y2="50" stroke="#C8102E" stroke-width="2"/>
  <line x1="90" y1="50" x2="90" y2="80" stroke="#C8102E" stroke-width="2"/>
  
  <line x1="710" y1="370" x2="740" y2="370" stroke="#F6EB61" stroke-width="2" opacity="0.7"/>
  <line x1="710" y1="370" x2="710" y2="340" stroke="#F6EB61" stroke-width="2" opacity="0.7"/>
</svg>