<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative pitch lines -->
  <line x1="400" y1="0" x2="400" y2="420" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="210" r="60" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.2"/>
  <circle cx="400" cy="210" r="8" fill="#C8102E" opacity="0.3"/>
  
  <!-- Left player silhouette (source) -->
  <g id="player-left">
    <!-- Head -->
    <circle cx="120" cy="80" r="25" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <!-- Body -->
    <rect x="105" y="110" width="30" height="60" fill="none" stroke="#C8102E" stroke-width="2.5" rx="3"/>
    <!-- Arms -->
    <line x1="105" y1="125" x2="70" y2="100" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="135" y1="125" x2="170" y2="100" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="115" y1="170" x2="110" y2="230" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="125" y1="170" x2="130" y2="230" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Jersey number -->
    <text x="120" y="145" font-size="16" font-weight="bold" fill="#C8102E" text-anchor="middle" opacity="0.6">7</text>
  </g>
  
  <!-- Directional arrows showing transfer movement -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#C8102E"/>
    </marker>
  </defs>
  
  <!-- Main transfer arrow -->
  <path d="M 250 100 Q 400 80 550 100" fill="none" stroke="#F6EB61" stroke-width="3" marker-end="url(#arrowhead)" stroke-dasharray="8,4"/>
  
  <!-- Secondary curved arrows -->
  <path d="M 260 150 Q 400 200 540 150" fill="none" stroke="#C8102E" stroke-width="2" marker-end="url(#arrowhead-red)" opacity="0.6" stroke-dasharray="5,3"/>
  <path d="M 270 260 Q 400 290 530 260" fill="none" stroke="#C8102E" stroke-width="2" marker-end="url(#arrowhead-red)" opacity="0.5" stroke-dasharray="5,3"/>
  
  <!-- Right player silhouette (destination - Anfield) -->
  <g id="player-right">
    <!-- Head -->
    <circle cx="680" cy="80" r="25" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <!-- Body -->
    <rect x="665" y="110" width="30" height="60" fill="none" stroke="#FFFFFF" stroke-width="2.5" rx="3"/>
    <!-- Arms -->
    <line x1="665" y1="125" x2="630" y2="100" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="695" y1="125" x2="730" y2="100" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="675" y1="170" x2="670" y2="230" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="685" y1="170" x2="690" y2="230" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Liverpool kit -->
    <rect x="665" y="110" width="30" height="60" fill="#C8102E" opacity="0.2" rx="3"/>
  </g>
  
  <!-- Fee/cost indicator -->
  <g id="fee-box">
    <rect x="320" y="320" width="160" height="70" fill="none" stroke="#F6EB61" stroke-width="2" rx="5"/>
    <text x="400" y="345" font-size="14" fill="#F6EB61" text-anchor="middle" font-weight="bold">TRANSFER FEE</text>
    <text x="400" y="370" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="bold">€50-70M</text>
  </g>
  
  <!-- Anfield badge/label -->
  <g id="anfield-label">
    <circle cx="680" cy="310" r="35" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    <text x="680" y="305" font-size="12" fill="#C8102E" text-anchor="middle" font-weight="bold">ANFIELD</text>
    <text x="680" y="325" font-size="11" fill="#F6EB61" text-anchor="middle">BOUND</text>
  </g>
  
  <!-- Title -->
  <text x="400" y="40" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">TRANSFER TARGET</text>
  
  <!-- Decorative corner elements -->
  <rect x="10" y="10" width="60" height="3" fill="#C8102E"/>
  <rect x="10" y="10" width="3" height="60" fill="#C8102E"/>
  <rect x="730" y="10" width="60" height="3" fill="#F6EB61"/>
  <rect x="787" y="10" width="3" height="60" fill="#F6EB61"/>
  
  <!-- Stats/info panel -->
  <g id="info-panel">
    <rect x="20" y="330" width="240" height="80" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.5" rx="3"/>
    <text x="30" y="355" font-size="11" fill="#FFFFFF" font-weight="bold">• Age: 24-28</text>
    <text x="30" y="375" font-size="11" fill="#FFFFFF" font-weight="bold">• Position: Midfield/Attack</text>
    <text x="30" y="395" font-size="11" fill="#FFFFFF" font-weight="bold">• Contract: 2026</text>
  </g>
</svg>