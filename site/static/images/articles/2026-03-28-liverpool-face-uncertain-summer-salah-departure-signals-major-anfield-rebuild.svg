<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative pitch lines -->
  <line x1="0" y1="210" x2="800" y2="210" stroke="#F6EB61" stroke-width="2" opacity="0.3" stroke-dasharray="10,10"/>
  <circle cx="400" cy="210" r="60" fill="none" stroke="#F6EB61" stroke-width="1" opacity="0.2"/>
  
  <!-- Left player silhouette (staying) -->
  <g opacity="0.7">
    <!-- Head -->
    <circle cx="150" cy="80" r="25" fill="none" stroke="#C8102E" stroke-width="2"/>
    <!-- Body in Liverpool red -->
    <rect x="135" y="110" width="30" height="60" fill="#C8102E" opacity="0.8" rx="3"/>
    <!-- Arms -->
    <line x1="135" y1="125" x2="90" y2="105" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    <line x1="165" y1="125" x2="210" y2="105" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="142" y1="170" x2="130" y2="240" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
    <line x1="158" y1="170" x2="170" y2="240" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Center player silhouette (departing) - darker/fading -->
  <g opacity="0.5">
    <!-- Head -->
    <circle cx="400" cy="100" r="28" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="4,4"/>
    <!-- Body -->
    <path d="M 380 135 Q 380 155 385 185 Q 400 185 415 185 Q 420 155 420 135 Z" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="4,4"/>
    <!-- Arms -->
    <line x1="380" y1="145" x2="330" y2="120" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4,4"/>
    <line x1="420" y1="145" x2="470" y2="120" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4,4"/>
    <!-- Legs -->
    <line x1="390" y1="185" x2="370" y2="260" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4,4"/>
    <line x1="410" y1="185" x2="430" y2="260" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4,4"/>
  </g>
  
  <!-- Right player silhouette (potential departure) -->
  <g opacity="0.6">
    <!-- Head -->
    <circle cx="650" cy="85" r="26" fill="none" stroke="#F6EB61" stroke-width="2"/>
    <!-- Body in gold outline -->
    <rect x="636" y="115" width="28" height="55" fill="none" stroke="#F6EB61" stroke-width="2" rx="2"/>
    <!-- Arms -->
    <line x1="636" y1="130" x2="595" y2="110" stroke="#F6EB61" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="664" y1="130" x2="705" y2="110" stroke="#F6EB61" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="642" y1="170" x2="630" y2="245" stroke="#F6EB61" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="658" y1="170" x2="670" y2="245" stroke="#F6EB61" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Directional arrows showing departures -->
  <!-- Arrow from center to right (potential departure) -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
    <marker id="arrowhead-white" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FFFFFF"/>
    </marker>
  </defs>
  
  <!-- Arrow from center departing player -->
  <path d="M 440 160 Q 520 160 590 140" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-dasharray="5,5" marker-end="url(#arrowhead-white)" opacity="0.7"/>
  
  <!-- Arrow showing exit -->
  <path d="M 430 180 L 520 320" fill="none" stroke="#F6EB61" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.8"/>
  
  <!-- Question mark for uncertainty -->
  <text x="520" y="280" font-size="48" fill="#F6EB61" opacity="0.6" font-weight="bold" text-anchor="middle" font-family="Arial, sans-serif">?</text>
  
  <!-- Title text -->
  <text x="400" y="360" font-size="28" font-weight="bold" fill="#C8102E" text-anchor="middle" font-family="Arial, sans-serif">TRANSFER DEPARTURES</text>
  
  <!-- Subtitle -->
  <text x="400" y="390" font-size="14" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" opacity="0.8">Outgoings &amp; Contract Situations</text>
  
  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="15" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.5"/>
  <circle cx="770" cy="390" r="15" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.5"/>
</svg>