<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative sketch elements -->
  <circle cx="700" cy="80" r="60" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  <circle cx="100" cy="350" r="45" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  
  <!-- Head -->
  <circle cx="400" cy="100" r="45" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="390" cy="95" r="6" fill="#FFFFFF"/>
  <circle cx="410" cy="95" r="6" fill="#FFFFFF"/>
  <path d="M 400 110 Q 395 115 400 120 Q 405 115 400 120" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Curly hair sketch -->
  <path d="M 360 75 Q 355 60 370 55 Q 380 50 400 48 Q 420 50 430 55 Q 445 60 440 75" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 365 70 Q 360 65 375 62" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <path d="M 425 70 Q 430 65 415 62" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Body - Liverpool Red Kit -->
  <rect x="340" y="145" width="120" height="100" rx="8" fill="none" stroke="#C8102E" stroke-width="3"/>
  <rect x="350" y="150" width="100" height="90" fill="#C8102E" opacity="0.15"/>
  
  <!-- Vertical stripe down center -->
  <line x1="400" y1="145" x2="400" y2="245" stroke="#FFFFFF" stroke-width="3"/>
  
  <!-- Shoulders/arms -->
  <line x1="340" y1="160" x2="280" y2="210" stroke="#C8102E" stroke-width="4" stroke-linecap="round"/>
  <line x1="460" y1="160" x2="520" y2="210" stroke="#C8102E" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Left arm/hand -->
  <circle cx="270" cy="220" r="12" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- Right arm/hand -->
  <circle cx="530" cy="220" r="12" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- Legs -->
  <line x1="370" y1="245" x2="360" y2="340" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <line x1="430" y1="245" x2="440" y2="340" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Boots -->
  <rect x="350" y="340" width="20" height="25" rx="3" fill="none" stroke="#000000" stroke-width="2"/>
  <rect x="430" y="340" width="20" height="25" rx="3" fill="none" stroke="#000000" stroke-width="2"/>
  
  <!-- Football at feet -->
  <circle cx="400" cy="375" r="16" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="384" y1="375" x2="416" y2="375" stroke="#FFFFFF" stroke-width="1.5"/>
  <path d="M 400 359 Q 395 375 400 391" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Sketch hatching details on kit -->
  <line x1="355" y1="170" x2="365" y2="180" stroke="#C8102E" stroke-width="1.5" opacity="0.6"/>
  <line x1="435" y1="170" x2="425" y2="180" stroke="#C8102E" stroke-width="1.5" opacity="0.6"/>
  <line x1="380" y1="200" x2="390" y2="210" stroke="#C8102E" stroke-width="1.5" opacity="0.6"/>
  <line x1="420" y1="200" x2="410" y2="210" stroke="#C8102E" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Name text -->
  <text x="400" y="290" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#F6EB61" text-anchor="middle" letter-spacing="2">DARWIN</text>
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">NUNEZ</text>
  
  <!-- Decorative lines -->
  <path d="M 180 310 Q 200 320 220 310" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <path d="M 580 110 Q 600 120 620 110" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Small accent circles -->
  <circle cx="150" cy="150" r="3" fill="#F6EB61" opacity="0.8"/>
  <circle cx="670" cy="280" r="3" fill="#C8102E" opacity="0.8"/>
  <circle cx="120" cy="100" r="2" fill="#FFFFFF" opacity="0.6"/>
</svg>