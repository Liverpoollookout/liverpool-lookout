<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2a3a" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="420" fill="url(#grid)" opacity="0.3"/>
  
  <!-- Head -->
  <circle cx="400" cy="100" r="35" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- Hair detail -->
  <path d="M 365 100 Q 365 70 400 65 Q 435 70 435 100" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Face features -->
  <circle cx="390" cy="95" r="4" fill="#FFFFFF"/>
  <circle cx="410" cy="95" r="4" fill="#FFFFFF"/>
  <path d="M 385 110 Q 400 115 415 110" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Neck -->
  <line x1="395" y1="135" x2="395" y2="155" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="405" y1="135" x2="405" y2="155" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- Liverpool kit - torso -->
  <ellipse cx="400" cy="200" rx="50" ry="60" fill="none" stroke="#C8102E" stroke-width="3"/>
  
  <!-- Kit details - vertical stripe -->
  <line x1="400" y1="145" x2="400" y2="270" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
  
  <!-- Collar -->
  <path d="M 375 155 L 385 145 L 400 145 L 415 145 L 425 155" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Left arm -->
  <path d="M 350 170 Q 310 180 290 220" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Left hand -->
  <circle cx="280" cy="230" r="12" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <path d="M 275 240 L 270 255 M 285 240 L 290 255" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Right arm -->
  <path d="M 450 170 Q 490 180 510 220" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Right hand -->
  <circle cx="520" cy="230" r="12" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <path d="M 515 240 L 510 255 M 525 240 L 530 255" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Left leg -->
  <path d="M 375 270 Q 360 320 355 380" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Left foot -->
  <ellipse cx="355" cy="395" rx="15" ry="12" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- Right leg -->
  <path d="M 425 270 Q 440 320 445 380" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Right foot -->
  <ellipse cx="445" cy="395" rx="15" ry="12" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- Goalkeeper gloves accent on right hand -->
  <circle cx="520" cy="230" r="16" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.8"/>
  <path d="M 512 225 L 520 235 M 528 225 L 520 235" stroke="#F6EB61" stroke-width="1" opacity="0.8"/>
  
  <!-- Player number 1 accent -->
  <circle cx="400" cy="200" r="28" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Name label background -->
  <rect x="200" y="320" width="400" height="70" fill="#0a1628" stroke="#C8102E" stroke-width="2.5" rx="5"/>
  
  <!-- Decorative corners -->
  <path d="M 210 330 L 220 330 L 220 340" fill="none" stroke="#F6EB61" stroke-width="2"/>
  <path d="M 590 330 L 580 330 L 580 340" fill="none" stroke="#F6EB61" stroke-width="2"/>
  <path d="M 210 375 L 220 375 L 220 365" fill="none" stroke="#F6EB61" stroke-width="2"/>
  <path d="M 590 375 L 580 375 L 580 365" fill="none" stroke="#F6EB61" stroke-width="2"/>
  
  <!-- Player name -->
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#C8102E" text-anchor="middle" letter-spacing="2">ALISSON</text>
  <text x="400" y="385" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">BECKER</text>
</svg>