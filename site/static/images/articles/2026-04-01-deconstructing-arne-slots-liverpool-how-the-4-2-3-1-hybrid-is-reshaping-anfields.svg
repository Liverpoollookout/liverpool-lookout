<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch outline -->
  <rect x="80" y="40" width="640" height="340" fill="none" stroke="#2d5016" stroke-width="2"/>
  
  <!-- Center line -->
  <line x1="400" y1="40" x2="400" y2="380" stroke="#2d5016" stroke-width="2"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="50" fill="none" stroke="#2d5016" stroke-width="2"/>
  
  <!-- Center spot -->
  <circle cx="400" cy="210" r="4" fill="#2d5016"/>
  
  <!-- Penalty areas -->
  <rect x="80" y="110" width="100" height="200" fill="none" stroke="#2d5016" stroke-width="2"/>
  <rect x="620" y="110" width="100" height="200" fill="none" stroke="#2d5016" stroke-width="2"/>
  
  <!-- Goal areas -->
  <rect x="80" y="150" width="50" height="120" fill="none" stroke="#2d5016" stroke-width="2"/>
  <rect x="670" y="150" width="50" height="120" fill="none" stroke="#2d5016" stroke-width="2"/>
  
  <!-- Title text -->
  <text x="400" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#C8102E" text-anchor="middle">Slot 4-2-3-1 System</text>
  
  <!-- Left side - 4 defenders with pressed positioning -->
  <!-- GK -->
  <circle cx="110" cy="210" r="8" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="110" y="235" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">GK</text>
  
  <!-- Left back -->
  <circle cx="160" cy="140" r="7" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Center back 1 -->
  <circle cx="160" cy="210" r="7" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Center back 2 -->
  <circle cx="160" cy="280" r="7" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Right back -->
  <circle cx="190" cy="210" r="7" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Defensive midfielders (pressing trigger) -->
  <circle cx="280" cy="170" r="7" fill="#F6EB61" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="280" cy="250" r="7" fill="#F6EB61" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="280" y="320" font-family="Arial, sans-serif" font-size="10" fill="#F6EB61" text-anchor="middle">DM Pressing</text>
  
  <!-- Attacking midfielders/wingers -->
  <circle cx="360" cy="120" r="6" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <circle cx="360" cy="210" r="6" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <circle cx="360" cy="300" r="6" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  
  <!-- Striker -->
  <circle cx="480" cy="210" r="7" fill="#C8102E" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Pressing arrows from defensive midfielders -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <!-- Pressing trigger lines (dashed) -->
  <line x1="290" y1="170" x2="340" y2="150" stroke="#F6EB61" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>
  <line x1="290" y1="250" x2="340" y2="270" stroke="#F6EB61" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>
  
  <!-- Formation label -->
  <text x="50" y="395" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">4-2-3-1 Formation</text>
  
  <!-- Tactical notes -->
  <text x="500" y="395" font-family="Arial, sans-serif" font-size="11" fill="#F6EB61">Pressing Trigger: DM</text>
  
  <!-- Decorative sketch lines -->
  <path d="M 70 50 Q 75 55 70 60" stroke="#C8102E" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 730 50 Q 735 55 730 60" stroke="#C8102E" stroke-width="1" fill="none" opacity="0.5"/>
</svg>