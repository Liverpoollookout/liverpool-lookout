<svg viewBox="0 0 800 420" class="article-svg" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative top accent line -->
  <line x1="0" y1="20" x2="800" y2="20" stroke="#C8102E" stroke-width="3"/>
  
  <!-- Stylised pitch diagram -->
  <g opacity="0.3">
    <rect x="80" y="60" width="640" height="300" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="80" y1="210" x2="720" y2="210" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="400" cy="210" r="40" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="400" cy="210" r="3" fill="#FFFFFF"/>
    <!-- Penalty boxes -->
    <rect x="80" y="130" width="100" height="160" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <rect x="620" y="130" width="100" height="160" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <!-- Goal areas -->
    <rect x="80" y="160" width="60" height="100" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <rect x="660" y="160" width="60" height="100" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>
  
  <!-- Large statistical visualization elements -->
  <!-- Bar chart representation -->
  <g>
    <!-- Bar 1 -->
    <rect x="150" y="140" width="35" height="140" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.8"/>
    <line x1="150" y1="195" x2="185" y2="195" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
    
    <!-- Bar 2 -->
    <rect x="230" y="100" width="35" height="180" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.8"/>
    <line x1="230" y1="155" x2="265" y2="155" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
    
    <!-- Bar 3 -->
    <rect x="310" y="120" width="35" height="160" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.8"/>
    <line x1="310" y1="175" x2="345" y2="175" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
    
    <!-- Bar 4 -->
    <rect x="390" y="80" width="35" height="200" fill="none" stroke="#F6EB61" stroke-width="2.5" opacity="0.9"/>
    <line x1="390" y1="135" x2="425" y2="135" stroke="#F6EB61" stroke-width="2" opacity="0.7"/>
    
    <!-- Bar 5 -->
    <rect x="470" y="110" width="35" height="170" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.8"/>
    <line x1="470" y1="165" x2="505" y2="165" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
    
    <!-- Bar 6 -->
    <rect x="550" y="130" width="35" height="150" fill="none" stroke="#C8102E" stroke-width="2.5" opacity="0.8"/>
    <line x1="550" y1="190" x2="585" y2="190" stroke="#C8102E" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Sketch-style data points and connections -->
  <g stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.6">
    <circle cx="200" cy="100" r="4" fill="#F6EB61"/>
    <circle cx="290" cy="85" r="4" fill="#F6EB61"/>
    <circle cx="380" cy="70" r="4" fill="#F6EB61"/>
    <circle cx="470" cy="80" r="4" fill="#F6EB61"/>
    <circle cx="560" cy="95" r="4" fill="#F6EB61"/>
    <polyline points="200,100 290,85 380,70 470,80 560,95"/>
  </g>
  
  <!-- Decorative stat icons -->
  <g stroke="#C8102E" stroke-width="2" fill="none">
    <!-- Goal icon -->
    <circle cx="680" cy="100" r="12"/>
    <circle cx="680" cy="100" r="6"/>
    
    <!-- Performance indicator -->
    <path d="M 680 140 L 690 150 L 680 160 L 670 150 Z"/>
    <line x1="680" y1="140" x2="680" y2="160"/>
  </g>
  
  <!-- Main title text -->
  <text x="400" y="380" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">
    PLAYER STATISTICS DEEP DIVE
  </text>
  
  <!-- Subtitle accent -->
  <text x="400" y="405" font-size="14" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" opacity="0.9">
    Performance Analysis Dashboard
  </text>
  
  <!-- Decorative corner elements -->
  <g stroke="#C8102E" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 30 30 L 50 30 L 50 50"/>
    <path d="M 770 30 L 750 30 L 750 50"/>
  </g>
  
  <!-- Bottom accent line -->
  <line x1="0" y1="420" x2="800" y2="420" stroke="#F6EB61" stroke-width="2"/>
</svg>