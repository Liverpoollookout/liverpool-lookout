<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative corner elements -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  <circle cx="750" cy="370" r="30" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  
  <!-- Main player silhouette -->
  <g id="player-figure">
    <!-- Head -->
    <circle cx="250" cy="100" r="25" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    
    <!-- Body in Liverpool red -->
    <ellipse cx="250" cy="170" rx="35" ry="50" fill="#C8102E" opacity="0.9"/>
    
    <!-- Arms -->
    <line x1="215" y1="150" x2="150" y2="130" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="285" y1="150" x2="350" y2="130" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Hands -->
    <circle cx="150" cy="130" r="8" fill="#FFFFFF"/>
    <circle cx="350" cy="130" r="8" fill="#FFFFFF"/>
    
    <!-- Legs -->
    <line x1="235" y1="220" x2="225" y2="310" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="265" y1="220" x2="275" y2="310" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Feet -->
    <line x1="225" y1="310" x2="210" y2="320" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="275" y1="310" x2="290" y2="320" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Jersey number detail -->
    <text x="250" y="180" font-size="24" fill="#F6EB61" text-anchor="middle" font-weight="bold">?</text>
  </g>
  
  <!-- Directional transfer arrows -->
  <!-- Arrow pointing right (incoming) -->
  <g id="arrow-right">
    <line x1="420" y1="150" x2="550" y2="150" stroke="#F6EB61" stroke-width="3"/>
    <polygon points="550,150 535,140 540,150 535,160" fill="#F6EB61"/>
    <text x="485" y="135" font-size="12" fill="#F6EB61" text-anchor="middle" font-weight="bold">ANFIELD</text>
  </g>
  
  <!-- Arrow pointing left (comparison/alternatives) -->
  <g id="arrow-left">
    <line x1="420" y1="250" x2="550" y2="250" stroke="#C8102E" stroke-width="3" stroke-dasharray="5,5"/>
    <polygon points="550,250 535,240 540,250 535,260" fill="#C8102E"/>
  </g>
  
  <!-- Fee box -->
  <g id="fee-box">
    <rect x="580" y="100" width="180" height="80" fill="none" stroke="#FFFFFF" stroke-width="2" rx="5"/>
    <text x="670" y="125" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">TRANSFER FEE</text>
    <text x="670" y="155" font-size="18" fill="#F6EB61" text-anchor="middle" font-weight="bold">€60-80M</text>
  </g>
  
  <!-- Link/Connection icon -->
  <g id="connection-links">
    <circle cx="670" cy="240" r="20" fill="none" stroke="#C8102E" stroke-width="2"/>
    <line x1="650" y1="240" x2="690" y2="240" stroke="#C8102E" stroke-width="2"/>
    <line x1="670" y1="220" x2="670" y2="260" stroke="#C8102E" stroke-width="2"/>
    <text x="670" y="330" font-size="12" fill="#FFFFFF" text-anchor="middle">Player Links</text>
    <text x="670" y="350" font-size="11" fill="#F6EB61" text-anchor="middle">Previous Teams</text>
  </g>
  
  <!-- Title section -->
  <g id="title">
    <text x="400" y="390" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold">TRANSFER TARGET 2024</text>
  </g>
  
  <!-- Decorative sketchy lines -->
  <line x1="50" y1="380" x2="200" y2="380" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  <line x1="600" y1="40" x2="750" y2="40" stroke="#C8102E" stroke-width="1.5" opacity="0.5"/>
</svg>