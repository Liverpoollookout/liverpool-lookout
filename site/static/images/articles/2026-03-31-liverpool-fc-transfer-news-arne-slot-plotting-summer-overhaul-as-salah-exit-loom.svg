<svg viewBox="0 0 800 420" class="article-svg" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative pitch lines -->
  <line x1="0" y1="210" x2="800" y2="210" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="210" r="60" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.2"/>
  
  <!-- Left side - Player figure in Liverpool red -->
  <g id="player">
    <!-- Head -->
    <circle cx="150" cy="90" r="25" fill="none" stroke="#C8102E" stroke-width="2.5"/>
    
    <!-- Body -->
    <path d="M 150 115 L 150 180" stroke="#C8102E" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Liverpool shirt -->
    <path d="M 130 130 L 170 130 L 175 160 L 125 160 Z" fill="#C8102E" opacity="0.7"/>
    
    <!-- Arms -->
    <path d="M 150 135 L 110 160" stroke="#C8102E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 150 135 L 190 160" stroke="#C8102E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Legs -->
    <path d="M 140 180 L 135 230" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 160 180 L 165 230" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Boots -->
    <circle cx="135" cy="235" r="8" fill="#000000" opacity="0.6"/>
    <circle cx="165" cy="235" r="8" fill="#000000" opacity="0.6"/>
  </g>
  
  <!-- Directional arrows showing transfer movement -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <!-- Arrow 1 - Incoming -->
  <path d="M 250 100 Q 350 80 450 100" stroke="#F6EB61" stroke-width="3" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  
  <!-- Arrow 2 - Outgoing -->
  <path d="M 250 250 Q 350 270 450 250" stroke="#FFFFFF" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5" opacity="0.7"/>
  
  <!-- Right side - Target figure silhouette -->
  <g id="target-player">
    <!-- Head -->
    <circle cx="600" cy="90" r="22" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Body -->
    <path d="M 600 112 L 600 170" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Arms -->
    <path d="M 600 130 L 565 155" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 600 130 L 635 155" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Legs -->
    <path d="M 590 170 L 585 225" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 610 170 L 615 225" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Question mark for mystery target -->
    <text x="600" y="290" font-size="48" fill="#F6EB61" text-anchor="middle" font-weight="bold" opacity="0.8">?</text>
  </g>
  
  <!-- Fee estimate box -->
  <rect x="30" y="310" width="200" height="80" fill="none" stroke="#C8102E" stroke-width="2" rx="5"/>
  <text x="130" y="335" font-size="14" fill="#F6EB61" text-anchor="middle" font-weight="bold">TRANSFER FEE</text>
  <text x="130" y="365" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="bold">£ ESTIMATE</text>
  
  <!-- Anfield link box -->
  <rect x="570" y="310" width="200" height="80" fill="none" stroke="#F6EB61" stroke-width="2" rx="5"/>
  <text x="670" y="335" font-size="14" fill="#C8102E" text-anchor="middle" font-weight="bold">ANFIELD LINK</text>
  <text x="670" y="365" font-size="16" fill="#FFFFFF" text-anchor="middle">Squad Target</text>
  
  <!-- Title -->
  <text x="400" y="40" font-size="28" fill="#C8102E" text-anchor="middle" font-weight="bold">TRANSFER TARGET</text>
  
  <!-- Decorative corner elements -->
  <circle cx="50" cy="30" r="8" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
  <circle cx="750" cy="390" r="8" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.5"/>
</svg>