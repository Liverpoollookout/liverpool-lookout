<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch outline -->
  <rect x="80" y="40" width="640" height="340" fill="none" stroke="#2d5016" stroke-width="2"/>
  
  <!-- Center line -->
  <line x1="400" y1="40" x2="400" y2="380" stroke="#2d5016" stroke-width="2"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="50" fill="none" stroke="#2d5016" stroke-width="2"/>
  
  <!-- Center spot -->
  <circle cx="400" cy="210" r="3" fill="#2d5016"/>
  
  <!-- Penalty areas -->
  <rect x="80" y="120" width="100" height="180" fill="none" stroke="#2d5016" stroke-width="1.5"/>
  <rect x="620" y="120" width="100" height="180" fill="none" stroke="#2d5016" stroke-width="1.5"/>
  
  <!-- Goal areas -->
  <rect x="80" y="160" width="50" height="100" fill="none" stroke="#2d5016" stroke-width="1.5"/>
  <rect x="670" y="160" width="50" height="100" fill="none" stroke="#2d5016" stroke-width="1.5"/>
  
  <!-- Formation title -->
  <text x="400" y="30" font-size="20" font-weight="bold" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">SLOT 4-2-3-1 SYSTEM</text>
  
  <!-- Defensive line (back 4) -->
  <g stroke="#C8102E" stroke-width="2.5" fill="none">
    <!-- Left back -->
    <circle cx="130" cy="140" r="12"/>
    <text x="130" y="165" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">LB</text>
    
    <!-- Left center back -->
    <circle cx="200" cy="120" r="12"/>
    <text x="200" y="145" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">CB</text>
    
    <!-- Right center back -->
    <circle cx="600" cy="120" r="12"/>
    <text x="600" y="145" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">CB</text>
    
    <!-- Right back -->
    <circle cx="670" cy="140" r="12"/>
    <text x="670" y="165" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">RB</text>
  </g>
  
  <!-- Midfield double pivot (2) -->
  <g stroke="#C8102E" stroke-width="2.5" fill="none">
    <!-- Left midfielder -->
    <circle cx="280" cy="210" r="12"/>
    <text x="280" y="235" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">DM</text>
    
    <!-- Right midfielder -->
    <circle cx="520" cy="210" r="12"/>
    <text x="520" y="235" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">DM</text>
  </g>
  
  <!-- Attacking midfield three (3-1) -->
  <g stroke="#C8102E" stroke-width="2.5" fill="none">
    <!-- Left attacking mid -->
    <circle cx="200" cy="280" r="12"/>
    <text x="200" y="305" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">AM</text>
    
    <!-- Center attacking mid -->
    <circle cx="400" cy="290" r="12"/>
    <text x="400" y="315" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">AM</text>
    
    <!-- Right attacking mid -->
    <circle cx="600" cy="280" r="12"/>
    <text x="600" y="305" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">AM</text>
  </g>
  
  <!-- Forward/Striker -->
  <g stroke="#C8102E" stroke-width="2.5" fill="none">
    <circle cx="400" cy="360" r="12"/>
    <text x="400" y="385" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">ST</text>
  </g>
  
  <!-- Pressing trigger arrows (red accent lines) -->
  <g stroke="#F6EB61" stroke-width="2" fill="none" stroke-dasharray="3,3" opacity="0.8">
    <!-- Pressing line from front -->
    <path d="M 350 350 Q 400 310 450 350"/>
    <!-- Pressing pressure indicator -->
    <path d="M 300 250 L 350 300"/>
    <path d="M 500 250 L 450 300"/>
  </g>
  
  <!-- Pressing trigger annotation -->
  <text x="680" y="65" font-size="13" fill="#F6EB61" font-family="Arial, sans-serif" font-weight="bold">PRESSING</text>
  <text x="680" y="82" font-size="13" fill="#F6EB61" font-family="Arial, sans-serif" font-weight="bold">TRIGGER</text>
  
  <!-- Small pressure wave indicators -->
  <circle cx="150" cy="100" r="8" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.6"/>
  <circle cx="150" cy="100" r="14" fill="none" stroke="#C8102E" stroke-width="1" opacity="0.3"/>
  
  <circle cx="650" cy="100" r="8" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.6"/>
  <circle cx="650" cy="100" r="14" fill="none" stroke="#C8102E" stroke-width="1" opacity="0.3"/>
  
  <!-- Goalkeeper position -->
  <circle cx="95" cy="210" r="10" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="95" y="225" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">GK</text>
  
  <!-- Sketch effect with subtle lines -->
  <g stroke="#FFFFFF" stroke-width="0.5" opacity="0.1">
    <line x1="150" y1="50" x2="170" y2="70"/>
    <line x1="700" y1="100" x2="720" y2="120"/>
    <line x1="120" y1="350" x2="140" y2="370"/>
  </g>
</svg>