<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Football pitch -->
  <rect x="50" y="40" width="700" height="340" fill="#1a472a" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Center line -->
  <line x1="400" y1="40" x2="400" y2="380" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="50" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Center spot -->
  <circle cx="400" cy="210" r="4" fill="#FFFFFF"/>
  
  <!-- Penalty areas -->
  <rect x="50" y="120" width="80" height="180" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <rect x="670" y="120" width="80" height="180" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Goal areas -->
  <rect x="50" y="155" width="35" height="110" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <rect x="715" y="155" width="35" height="110" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Sketched player 1 - attacking position (red kit) -->
  <g id="player1">
    <circle cx="280" cy="180" r="20" fill="none" stroke="#C8102E" stroke-width="2"/>
    <line x1="280" y1="200" x2="280" y2="260" stroke="#C8102E" stroke-width="2"/>
    <line x1="280" y1="220" x2="250" y2="240" stroke="#C8102E" stroke-width="2"/>
    <line x1="280" y1="220" x2="310" y2="240" stroke="#C8102E" stroke-width="2"/>
    <line x1="280" y1="260" x2="260" y2="310" stroke="#C8102E" stroke-width="2"/>
    <line x1="280" y1="260" x2="300" y2="310" stroke="#C8102E" stroke-width="2"/>
    <text x="280" y="340" font-size="12" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">SHOT</text>
  </g>
  
  <!-- Sketched player 2 - midfield (red kit) -->
  <g id="player2">
    <circle cx="450" cy="150" r="20" fill="none" stroke="#C8102E" stroke-width="2"/>
    <line x1="450" y1="170" x2="450" y2="230" stroke="#C8102E" stroke-width="2"/>
    <line x1="450" y1="190" x2="420" y2="210" stroke="#C8102E" stroke-width="2"/>
    <line x1="450" y1="190" x2="480" y2="210" stroke="#C8102E" stroke-width="2"/>
    <line x1="450" y1="230" x2="430" y2="280" stroke="#C8102E" stroke-width="2"/>
    <line x1="450" y1="230" x2="470" y2="280" stroke="#C8102E" stroke-width="2"/>
    <text x="450" y="310" font-size="12" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">PASS</text>
  </g>
  
  <!-- Sketched player 3 - defense (red kit) -->
  <g id="player3">
    <circle cx="600" cy="250" r="20" fill="none" stroke="#C8102E" stroke-width="2"/>
    <line x1="600" y1="270" x2="600" y2="330" stroke="#C8102E" stroke-width="2"/>
    <line x1="600" y1="290" x2="570" y2="310" stroke="#C8102E" stroke-width="2"/>
    <line x1="600" y1="290" x2="630" y2="310" stroke="#C8102E" stroke-width="2"/>
    <line x1="600" y1="330" x2="580" y2="360" stroke="#C8102E" stroke-width="2"/>
    <line x1="600" y1="330" x2="620" y2="360" stroke="#C8102E" stroke-width="2"/>
    <text x="600" y="310" font-size="11" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">SLOT</text>
  </g>
  
  <!-- Tactical arrows showing movement -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F6EB61"/>
    </marker>
  </defs>
  
  <!-- Attack flow arrows -->
  <path d="M 280 180 Q 350 170 450 150" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,3"/>
  <path d="M 450 150 Q 520 160 600 180" stroke="#F6EB61" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,3"/>
  
  <!-- Match Report title -->
  <text x="400" y="25" font-size="20" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">MATCH REPORT</text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="8" fill="none" stroke="#F6EB61" stroke-width="1.5"/>
  <circle cx="700" cy="350" r="8" fill="none" stroke="#F6EB61" stroke-width="1.5"/>
  
  <!-- Corner flags style markers -->
  <line x1="50" y1="40" x2="70" y2="40" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="750" y1="40" x2="770" y2="40" stroke="#FFFFFF" stroke-width="2"/>
</svg>