<svg viewBox="0 0 800 420" class="article-svg" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Subtle pitch lines in background -->
  <line x1="400" y1="0" x2="400" y2="420" stroke="#1a2f4a" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="210" r="60" fill="none" stroke="#1a2f4a" stroke-width="2" opacity="0.3"/>
  
  <!-- Head sketch -->
  <circle cx="400" cy="100" r="45" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- Hair/head details -->
  <path d="M 360 70 Q 360 50 400 45 Q 440 50 440 70" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Face features - simplified sketch style -->
  <circle cx="385" cy="95" r="4" fill="#FFFFFF"/>
  <circle cx="415" cy="95" r="4" fill="#FFFFFF"/>
  <path d="M 390 110 Q 400 115 410 110" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Neck -->
  <line x1="385" y1="143" x2="385" y2="165" stroke="#FFFFFF" stroke-width="3"/>
  <line x1="415" y1="143" x2="415" y2="165" stroke="#FFFFFF" stroke-width="3"/>
  
  <!-- Liverpool red jersey body -->
  <ellipse cx="400" cy="220" rx="55" ry="70" fill="#C8102E"/>
  
  <!-- Jersey outline sketch -->
  <path d="M 355 165 L 345 250 Q 345 280 365 300 L 435 300 Q 455 280 455 250 L 445 165" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Jersey detail lines -->
  <line x1="385" y1="165" x2="380" y2="280" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <line x1="415" y1="165" x2="420" y2="280" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Liverpool crest circle accent -->
  <circle cx="400" cy="210" r="18" fill="none" stroke="#F6EB61" stroke-width="2"/>
  
  <!-- Left arm -->
  <path d="M 355 185 L 310 240" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Right arm -->
  <path d="M 445 185 L 490 240" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Gloved hands (goalkeeper) -->
  <circle cx="305" cy="248" r="12" fill="#C8102E" stroke="#F6EB61" stroke-width="2"/>
  <circle cx="495" cy="248" r="12" fill="#C8102E" stroke="#F6EB61" stroke-width="2"/>
  
  <!-- Glove details -->
  <line x1="300" y1="240" x2="300" y2="255" stroke="#F6EB61" stroke-width="1"/>
  <line x1="310" y1="240" x2="310" y2="255" stroke="#F6EB61" stroke-width="1"/>
  <line x1="490" y1="240" x2="490" y2="255" stroke="#F6EB61" stroke-width="1"/>
  <line x1="500" y1="240" x2="500" y2="255" stroke="#F6EB61" stroke-width="1"/>
  
  <!-- Left leg -->
  <line x1="380" y1="290" x2="375" y2="370" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
  
  <!-- Right leg -->
  <line x1="420" y1="290" x2="425" y2="370" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
  
  <!-- Boots -->
  <ellipse cx="375" cy="375" rx="10" ry="8" fill="#000000" stroke="#FFFFFF" stroke-width="1.5"/>
  <ellipse cx="425" cy="375" rx="10" ry="8" fill="#000000" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Player name text -->
  <text x="400" y="410" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#F6EB61" text-anchor="middle" letter-spacing="2">ALISSON</text>
  
  <!-- Decorative sketch lines around figure -->
  <path d="M 280 140 Q 270 160 280 180" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,3"/>
  <path d="M 520 140 Q 530 160 520 180" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,3"/>
</svg>