<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Pitch outline -->
  <rect x="80" y="40" width="640" height="340" fill="none" stroke="#2d5016" stroke-width="2"/>
  
  <!-- Center line -->
  <line x1="400" y1="40" x2="400" y2="380" stroke="#2d5016" stroke-width="2"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="210" r="60" fill="none" stroke="#2d5016" stroke-width="2"/>
  
  <!-- Center spot -->
  <circle cx="400" cy="210" r="4" fill="#2d5016"/>
  
  <!-- Goal areas -->
  <rect x="80" y="120" width="80" height="180" fill="none" stroke="#2d5016" stroke-width="2"/>
  <rect x="640" y="120" width="80" height="180" fill="none" stroke="#2d5016" stroke-width="2"/>
  
  <!-- Penalty areas -->
  <rect x="80" y="80" width="120" height="260" fill="none" stroke="#2d5016" stroke-width="2"/>
  <rect x="600" y="80" width="120" height="260" fill="none" stroke="#2d5016" stroke-width="2"/>
  
  <!-- Data visualization bars - Player Statistics -->
  <!-- Bar 1 - Passes -->
  <g>
    <rect x="150" y="280" width="40" height="80" fill="none" stroke="#C8102E" stroke-width="2"/>
    <rect x="150" y="300" width="40" height="60" fill="#C8102E" opacity="0.7"/>
    <text x="150" y="375" font-size="12" fill="#FFFFFF" font-family="system-ui">Passes</text>
  </g>
  
  <!-- Bar 2 - Goals -->
  <g>
    <rect x="220" y="280" width="40" height="80" fill="none" stroke="#C8102E" stroke-width="2"/>
    <rect x="220" y="320" width="40" height="40" fill="#C8102E" opacity="0.7"/>
    <text x="220" y="375" font-size="12" fill="#FFFFFF" font-family="system-ui">Goals</text>
  </g>
  
  <!-- Bar 3 - Assists -->
  <g>
    <rect x="290" y="280" width="40" height="80" fill="none" stroke="#C8102E" stroke-width="2"/>
    <rect x="290" y="330" width="40" height="30" fill="#C8102E" opacity="0.7"/>
    <text x="290" y="375" font-size="12" fill="#FFFFFF" font-family="system-ui">Assists</text>
  </g>
  
  <!-- Bar 4 - Tackles -->
  <g>
    <rect x="360" y="280" width="40" height="80" fill="none" stroke="#C8102E" stroke-width="2"/>
    <rect x="360" y="305" width="40" height="55" fill="#C8102E" opacity="0.7"/>
    <text x="360" y="375" font-size="12" fill="#FFFFFF" font-family="system-ui">Tackles</text>
  </g>
  
  <!-- Bar 5 - Saves -->
  <g>
    <rect x="430" y="280" width="40" height="80" fill="none" stroke="#C8102E" stroke-width="2"/>
    <rect x="430" y="310" width="40" height="50" fill="#C8102E" opacity="0.7"/>
    <text x="430" y="375" font-size="12" fill="#FFFFFF" font-family="system-ui">Saves</text>
  </g>
  
  <!-- Liverpool emblem simplified -->
  <circle cx="600" cy="120" r="45" fill="none" stroke="#C8102E" stroke-width="2"/>
  <circle cx="600" cy="120" r="35" fill="none" stroke="#F6EB61" stroke-width="1.5"/>
  
  <!-- Eternal Flames (Shankly Gates reference) -->
  <path d="M 580 95 L 585 85 L 590 95" fill="none" stroke="#F6EB61" stroke-width="1.5"/>
  <path d="M 610 95 L 615 85 L 620 95" fill="none" stroke="#F6EB61" stroke-width="1.5"/>
  
  <!-- YNWA text representation as bars -->
  <line x1="565" y1="125" x2="635" y2="125" stroke="#FFFFFF" stroke-width="1"/>
  <text x="565" y="150" font-size="14" fill="#F6EB61" font-family="system-ui" font-weight="bold">YOU'LL NEVER</text>
  <text x="565" y="167" font-size="14" fill="#F6EB61" font-family="system-ui" font-weight="bold">WALK ALONE</text>
  
  <!-- Title -->
  <text x="400" y="30" font-size="28" fill="#FFFFFF" font-family="system-ui" font-weight="bold" text-anchor="middle">Player Statistics Deep Dive</text>
  
  <!-- Decorative sketch lines -->
  <path d="M 50 100 Q 70 110 90 100" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.6"/>
  <path d="M 720 280 Q 740 290 760 280" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Sketchy effect elements -->
  <circle cx="100" cy="60" r="3" fill="#C8102E" opacity="0.4"/>
  <circle cx="700" cy="380" r="3" fill="#F6EB61" opacity="0.4"/>
</svg>