<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Anfield pitch outline - subtle -->
  <rect x="50" y="60" width="700" height="300" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  <line x1="400" y1="60" x2="400" y2="360" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="210" r="40" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  
  <!-- Shankly Gates accent -->
  <g opacity="0.2">
    <line x1="100" y1="80" x2="120" y2="80" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="100" y1="85" x2="120" y2="85" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="100" y1="90" x2="120" y2="90" stroke="#FFFFFF" stroke-width="3"/>
  </g>
  
  <!-- Legendary Player Figure - Kenny Dalglish style -->
  <g>
    <!-- Head -->
    <circle cx="350" cy="130" r="25" fill="none" stroke="#C8102E" stroke-width="2"/>
    
    <!-- Body -->
    <line x1="350" y1="155" x2="350" y2="230" stroke="#C8102E" stroke-width="3"/>
    
    <!-- Liverpool shirt outline -->
    <path d="M 330 165 Q 330 170 340 172 L 360 172 Q 370 170 370 165 L 370 220 Q 360 225 350 225 Q 340 225 330 220 Z" 
          fill="none" stroke="#C8102E" stroke-width="2.5"/>
    
    <!-- Shirt stripes suggestion -->
    <line x1="340" y1="172" x2="340" y2="215" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="360" y1="172" x2="360" y2="215" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Arms -->
    <line x1="330" y1="172" x2="300" y2="190" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="370" y1="172" x2="400" y2="190" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Hands -->
    <circle cx="295" cy="192" r="5" fill="none" stroke="#C8102E" stroke-width="2"/>
    <circle cx="405" cy="192" r="5" fill="none" stroke="#C8102E" stroke-width="2"/>
    
    <!-- Legs -->
    <line x1="340" y1="225" x2="335" y2="290" stroke="#0a1628" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="360" y1="225" x2="365" y2="290" stroke="#0a1628" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Feet -->
    <circle cx="335" cy="295" r="6" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="365" cy="295" r="6" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Ball at feet -->
    <circle cx="355" cy="305" r="8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 350 305 Q 355 302 360 305" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  </g>
  
  <!-- Motion lines - kicking action -->
  <g stroke="#F6EB61" stroke-width="1.5" opacity="0.5" stroke-linecap="round">
    <line x1="380" y1="300" x2="450" y2="310"/>
    <line x1="385" y1="310" x2="455" y2="320"/>
    <line x1="380" y1="320" x2="450" y2="330"/>
  </g>
  
  <!-- Dramatic light rays -->
  <g stroke="#F6EB61" stroke-width="1" opacity="0.2">
    <line x1="400" y1="0" x2="350" y2="150"/>
    <line x1="400" y1="0" x2="450" y2="150"/>
  </g>
  
  <!-- Player name - Kenny Dalglish -->
  <text x="500" y="180" font-family="Arial, sans-serif" font-size="36" font-weight="bold" 
        fill="#C8102E" opacity="0.9" letter-spacing="2">KENNY</text>
  <text x="500" y="220" font-family="Arial, sans-serif" font-size="36" font-weight="bold" 
        fill="#C8102E" opacity="0.9" letter-spacing="2">DALGLISH</text>
  
  <!-- Subtitle -->
  <text x="500" y="250" font-family="Arial, sans-serif" font-size="14" 
        fill="#FFFFFF" opacity="0.7">King of Anfield</text>
  
  <!-- Decorative corner accent -->
  <g stroke="#F6EB61" stroke-width="2" opacity="0.4">
    <line x1="50" y1="50" x2="80" y2="50"/>
    <line x1="50" y1="50" x2="50" y2="80"/>
  </g>
  
  <g stroke="#F6EB61" stroke-width="2" opacity="0.4">
    <line x1="750" y1="370" x2="720" y2="370"/>
    <line x1="750" y1="370" x2="750" y2="340"/>
  </g>
</svg>