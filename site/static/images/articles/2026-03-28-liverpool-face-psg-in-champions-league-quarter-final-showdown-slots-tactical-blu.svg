  <circle cx="140" cy="300" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="140" y="322" font-size="10" fill="#FFFFFF" text-anchor="middle">RB</text>
  
  <circle cx="180" cy="165" r="11" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="180" y="187" font-size="10" fill="#FFFFFF" text-anchor="middle">CB</text>
  
  <!-- Midfielders -->
  <circle cx="280" cy="100" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="280" y="120" font-size="10" fill="#FFFFFF" text-anchor="middle">CM</text>
  
  <circle cx="280" cy="210" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="280" y="230" font-size="10" fill="#FFFFFF" text-anchor="middle">CM</text>
  
  <circle cx="280" cy="320" r="10" fill="#C8102E" stroke="#FFFFFF" stroke-width="1.5"/>
