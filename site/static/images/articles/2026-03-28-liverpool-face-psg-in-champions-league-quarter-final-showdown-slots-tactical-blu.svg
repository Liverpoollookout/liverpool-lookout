  <!-- Midfielders -->
  <circle cx="520" cy="150" r="10" fill="none" stroke="#F6EB61" stroke-width="1.5"/>
  <text x="520" y="170" font-size="10" fill="#F6EB61" text-anchor="middle">DM</text>
  
  <circle cx="520" cy="270" r="10" fill="none" stroke="#F6EB61" stroke-width="1.5"/>
  <text x="520" y="290" font-size="10" fill="#F6EB61" text-anchor="middle">DM</text>
  
  <!-- Attacking midfielders -->
  <circle cx="440" cy="80" r="10" fill="none" stroke="#F6EB61" stroke-width="1.5"/>
  <text x="440" y="100" font-size="10" fill="#F6EB61" text-anchor="middle">AM</text>
  
  <circle cx="440" cy="210" r="10" fill="none" stroke="#F6EB61" stroke-width="1.5"/>
  <text x="440" y="230" font-size="10" fill="#F6EB61" text-anchor="middle">AM</text>
  
  <circle cx="440" cy="340" r="10" fill="none" stroke="#F6EB61" stroke-width="1.5"/>
  <text x="440" y="360" font-size="10" fill="#F6EB61" text-anchor="middle">AM</text>
  
  <!-- Forward -->
  <circle cx="540" cy="210" r="11" fill="none" stroke="#F6EB61" stroke-width="1.5"/>
  <text x="540" y="230" font-size="10" fill="#F6EB61" text-anchor="middle">ST</text>
  
  <!-- Key battle indicators -->
  <line x1="280" y1="210" x2="520" y2="210" stroke="#F6EB61" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Title -->
  <text x="400" y="410" font-size="16" fill="#F6EB61" text-anchor="middle" font-weight="bold">MATCH PREVIEW - TACTICAL LINEUP</text>
  
  <!-- Legend -->
  <circle cx="70" cy="395" r="5" fill="#C8102E"/>
  <text x="85" y="400" font-size="11" fill="#FFFFFF">Liverpool</text>
  
