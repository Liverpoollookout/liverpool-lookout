<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Decorative corner elements -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#F6EB61" stroke-width="2" opacity="0.3"/>
  <circle cx="750" cy="370" r="25" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.3"/>
  
  <!-- Player figure - sketched style -->
  <!-- Head -->
  <circle cx="400" cy="100" r="35" fill="none" stroke="#C8102E" stroke-width="3"/>
  
  <!-- Hair/Head details -->
  <path d="M 375 95 Q 365 75 385 65 Q 400 60 415 65 Q 435 75 425 95" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Facial features - sketch style -->
  <circle cx="390" cy="95" r="4" fill="#FFFFFF"/>
  <circle cx="410" cy="95" r="4" fill="#FFFFFF"/>
  <path d="M 400 110 L 400 115" stroke="#C8102E" stroke-width="2"/>
  <path d="M 385 125 Q 400 130 415 125" fill="none" stroke="#C8102E" stroke-width="2"/>
  
  <!-- Body - Liverpool kit -->
  <rect x="365" y="140" width="70" height="95" rx="5" fill="none" stroke="#C8102E" stroke-width="3"/>
  
  <!-- Jersey detail lines -->
  <line x1="400" y1="140" x2="400" y2="235" stroke="#C8102E" stroke-width="2"/>
  <path d="M 375 160 Q 400 165 425 160" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Liverpool crest suggestion -->
  <circle cx="400" cy="175" r="12" fill="none" stroke="#F6EB61" stroke-width="2"/>
  <line x1="400" y1="168" x2="400" y2="182" stroke="#F6EB61" stroke-width="1.5"/>
  
  <!-- Left arm -->
  <path d="M 365 155 Q 330 160 310 200" fill="none" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Left hand -->
  <circle cx="305" cy="210" r="12" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- Right arm -->
  <path d="M 435 155 Q 470 160 490 200" fill="none" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Right hand -->
  <circle cx="495" cy="210" r="12" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- Left leg -->
  <path d="M 380 235 Q 375 280 370 330" fill="none" stroke="#0a1628" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- Right leg -->
  <path d="M 420 235 Q 425 280 430 330" fill="none" stroke="#0a1628" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- Left foot/boot -->
  <rect x="360" y="330" width="20" height="15" rx="2" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Right foot/boot -->
  <rect x="420" y="330" width="20" height="15" rx="2" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  
  <!-- Dynamic sketch lines for motion -->
  <path d="M 320 120 Q 310 130 305 145" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.6" stroke-dasharray="3,3"/>
  <path d="M 480 120 Q 490 130 495 145" fill="none" stroke="#F6EB61" stroke-width="1.5" opacity="0.6" stroke-dasharray="3,3"/>
  
  <!-- Name plate background -->
  <rect x="200" y="360" width="400" height="50" rx="8" fill="none" stroke="#F6EB61" stroke-width="2.5"/>
  
  <!-- Player name -->
  <text x="400" y="388" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">
    TSIMIKAS
  </text>
  
  <!-- Decorative dots -->
  <circle cx="220" cy="378" r="3" fill="#C8102E"/>
  <circle cx="780" cy="378" r="3" fill="#C8102E"/>
  
  <!-- Bottom accent line -->
  <line x1="150" y1="410" x2="650" y2="410" stroke="#C8102E" stroke-width="2.5"/>
</svg>