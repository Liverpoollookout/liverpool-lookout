<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" class="article-svg">
  <!-- Dark navy background -->
  <rect width="800" height="420" fill="#0a1628"/>
  
  <!-- Title -->
  <text x="400" y="35" font-size="28" font-weight="bold" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">
    PLAYER STATISTICS
  </text>
  <text x="400" y="60" font-size="16" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" opacity="0.8">
    Deep Dive Analysis
  </text>
  
  <!-- Pitch outline (sketched style) -->
  <rect x="80" y="100" width="640" height="260" fill="none" stroke="#2d5016" stroke-width="2" stroke-dasharray="3,3" opacity="0.6"/>
  
  <!-- Center line -->
  <line x1="80" y1="230" x2="720" y2="230" stroke="#2d5016" stroke-width="2" opacity="0.5"/>
  
  <!-- Center circle (sketched) -->
  <circle cx="400" cy="230" r="45" fill="none" stroke="#2d5016" stroke-width="2" opacity="0.5"/>
  <circle cx="400" cy="230" r="3" fill="#2d5016" opacity="0.5"/>
  
  <!-- Left penalty area -->
  <rect x="80" y="170" width="80" height="120" fill="none" stroke="#2d5016" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Right penalty area -->
  <rect x="640" y="170" width="80" height="120" fill="none" stroke="#2d5016" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Goal areas -->
  <rect x="80" y="200" width="40" height="60" fill="none" stroke="#2d5016" stroke-width="1.5" opacity="0.5"/>
  <rect x="680" y="200" width="40" height="60" fill="none" stroke="#2d5016" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Sketched player figure - left side -->
  <g id="player1">
    <!-- Head -->
    <circle cx="150" cy="140" r="12" fill="none" stroke="#C8102E" stroke-width="2"/>
    <!-- Body -->
    <line x1="150" y1="152" x2="150" y2="200" stroke="#C8102E" stroke-width="2"/>
    <!-- Arms -->
    <line x1="150" y1="165" x2="130" y2="180" stroke="#C8102E" stroke-width="2"/>
    <line x1="150" y1="165" x2="170" y2="180" stroke="#C8102E" stroke-width="2"/>
    <!-- Legs -->
    <line x1="150" y1="200" x2="135" y2="240" stroke="#C8102E" stroke-width="2"/>
    <line x1="150" y1="200" x2="165" y2="240" stroke="#C8102E" stroke-width="2"/>
  </g>
  
  <!-- Sketched player figure - right side -->
  <g id="player2">
    <!-- Head -->
    <circle cx="650" cy="160" r="12" fill="none" stroke="#C8102E" stroke-width="2"/>
    <!-- Body -->
    <line x1="650" y1="172" x2="650" y2="220" stroke="#C8102E" stroke-width="2"/>
    <!-- Arms -->
    <line x1="650" y1="185" x2="630" y2="200" stroke="#C8102E" stroke-width="2"/>
    <line x1="650" y1="185" x2="670" y2="200" stroke="#C8102E" stroke-width="2"/>
    <!-- Legs -->
    <line x1="650" y1="220" x2="635" y2="255" stroke="#C8102E" stroke-width="2"/>
    <line x1="650" y1="220" x2="665" y2="255" stroke="#C8102E" stroke-width="2"/>
  </g>
  
  <!-- Data visualization bars -->
  <g id="stats">
    <!-- Bar 1 -->
    <rect x="250" y="310" width="30" height="60" fill="none" stroke="#C8102E" stroke-width="2"/>
    <rect x="250" y="330" width="30" height="40" fill="#C8102E" opacity="0.7"/>
    <text x="250" y="385" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">Goals</text>
    
    <!-- Bar 2 -->
    <rect x="310" y="310" width="30" height="60" fill="none" stroke="#C8102E" stroke-width="2"/>
    <rect x="310" y="315" width="30" height="55" fill="#C8102E" opacity="0.7"/>
    <text x="310" y="385" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">Assists</text>
    
    <!-- Bar 3 -->
    <rect x="370" y="310" width="30" height="60" fill="none" stroke="#C8102E" stroke-width="2"/>
    <rect x="370" y="318" width="30" height="52" fill="#C8102E" opacity="0.7"/>
    <text x="370" y="385" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">Passes</text>
    
    <!-- Bar 4 -->
    <rect x="430" y="310" width="30" height="60" fill="none" stroke="#C8102E" stroke-width="2"/>
    <rect x="430" y="325" width="30" height="45" fill="#C8102E" opacity="0.7"/>
    <text x="430" y="385" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">Tackles</text>
    
    <!-- Bar 5 -->
    <rect x="490" y="310" width="30" height="60" fill="none" stroke="#C8102E" stroke-width="2"/>
    <rect x="490" y="320" width="30" height="50" fill="#C8102E" opacity="0.7"/>
    <text x="490" y="385" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">Rating</text>
  </g>
  
  <!-- Accent lines (sketched style) -->
  <line x1="50" y1="100" x2="80" y2="100" stroke="#F6EB61" stroke-width="2"/>
  <line x1="50" y1="360" x2="80" y2="360" stroke="#F6EB61" stroke-width="2"/>
  <line x1="720" y1="100" x2="750" y2="100" stroke="#F6EB61" stroke-width="2"/>
  <line x1="720" y1="360" x2="750" y2="360" stroke="#F6EB61" stroke-width="2"/>
  
  <!-- Liverpool FC badge elements (simplified) -->
  <circle cx="750" cy="390" r="18" fill="none" stroke="#F6EB61" stroke-width="1.5"/>
  <text x="750" y="395" font-size="12" font-weight="bold" fill="#F6EB61" text-anchor="middle" font-family="Arial, sans-serif">LFC</text>
</svg>