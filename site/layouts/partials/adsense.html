{{/* AdSense Ad Unit Partial
     Usage: {{ partial "adsense.html" (dict "slot" .Site.Params.adsenseSlotLeaderboard "format" "horizontal") }}
*/}}
{{ with .site.Params.adsensePublisher }}
<div class="ad-unit {{ $.class }}" aria-label="Advertisement">
  <p class="ad-label">Advertisement</p>
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="{{ . }}"
       data-ad-slot="{{ $.slot }}"
       data-ad-format="{{ default "auto" $.format }}"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
{{ end }}
