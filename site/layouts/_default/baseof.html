<!DOCTYPE html>
<html lang="en-GB">
<head>
  {{- partial "head.html" . -}}
</head>
<body>
  {{- partial "header.html" . -}}
  <main id="main-content">
    {{- block "main" . }}{{- end }}
  </main>
  {{- partial "footer.html" . -}}
  {{/* AdSense init — loads asynchronously, won't block render */}}
  {{ with .Site.Params.adsensePublisher }}
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ . }}"
       crossorigin="anonymous"></script>
  {{ end }}
</body>
</html>
